<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>心理学検定対策マスタークイズ（A領域全5章対応）</title>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 20px; color: #2c3e50; }
        #app { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.12); width: 100%; max-width: 650px; }
        h1 { font-size: 1.4rem; text-align: center; color: #2980b9; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-bottom: 25px; }
        .btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border: none; border-radius: 12px; cursor: pointer; font-size: 1.05rem; transition: 0.2s; font-weight: bold; }
        .category-btn { background: #3498db; color: white; text-align: left; padding-left: 25px; box-shadow: 0 4px #2980b9; }
        .category-btn:hover { background: #2980b9; transform: translateY(-2px); }
        .choice-btn { background: #fff; border: 2px solid #dfe6e9; text-align: left; padding-left: 20px; }
        .choice-btn:hover { background: #f0f7ff; border-color: #3498db; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60 !important; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b !important; }
        .hidden { display: none; }
        #stats { text-align: right; color: #7f8c8d; font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; }
        #feedback-area { margin-top: 25px; padding: 18px; border-radius: 10px; display: none; }
        .feedback-title { font-weight: bold; font-size: 1.25rem; margin-bottom: 10px; text-align: center; }
        .explanation-text { font-size: 0.95rem; line-height: 1.6; color: #34495e; background: #f9f9f9; padding: 12px; border-left: 5px solid #3498db; border-radius: 4px; }
        .menu-desc { text-align: center; font-weight: bold; margin-bottom: 20px; color: #555; }
    </style>
</head>
<body>

<div id="app">
    <h1>心理学検定2級対策：マスター問題集</h1>
    
    <div id="menu">
        <p class="menu-desc">学習する章（項目）を選択してください（各最大20問出題）</p>
        <button class="btn category-btn" onclick="startQuiz('ch1')">第1章：原理・研究法・歴史</button>
        <button class="btn category-btn" onclick="startQuiz('ch2')">第2章：学習・認知・知覚</button>
        <button class="btn category-btn" onclick="startQuiz('ch3')">第3章：発達・教育</button>
        <button class="btn category-btn" onclick="startQuiz('ch4')">第4章：社会・感情・性格</button>
        <button class="btn category-btn" onclick="startQuiz('ch5')">第5章：臨床・障害</button>
    </div>

    <div id="quiz-container" class="hidden">
        <div id="stats"></div>
        <div id="question" style="font-size: 1.15rem; margin: 20px 0; font-weight: bold; line-height: 1.6;"></div>
        <div id="choices"></div>
        
        <div id="feedback-area">
            <div id="feedback-result" class="feedback-title"></div>
            <div id="explanation" class="explanation-text"></div>
            <button id="next-btn" class="btn" style="background:#3498db; color:white; margin-top:20px;" onclick="nextQuestion()">次の問題へ</button>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2>終了！お疲れ様でした</h2>
        <p style="font-size: 1.2rem; margin-top:20px;">あなたのスコア</p>
        <p style="font-size: 4rem; color: #e67e22; font-weight: bold; margin: 10px 0;"><span id="score">0</span> / <span id="total-score">20</span></p>
        <p id="comment" style="font-weight:bold; font-size:1.2rem; color:#2c3e50; margin-bottom:30px;"></p>
        <button class="btn" style="background:#2ecc71; color:white;" onclick="location.reload()">ホームメニューに戻る</button>
    </div>
</div>

<script>
// 送っていただいたExcelデータベースの重要問題を全網羅
const quizData = {
    ch1: [
        { q: "形式科学（数学など）と対比され、現実世界にある事象を扱い理論や法則を導き出す、心理学が属する学問分類は何か。", a: "経験科学", c: ["形式科学", "人文科学", "直観科学"], exp: "心理学は現実のデータや実験、観察に基づいて法則を導き出す「経験科学」に分類されます。" },
        { q: "日本十進分類法（NDC）において、心理学（140番）が属する大分類（類）はどれか。", a: "哲学", c: ["歴史", "社会科学", "自然科学"], exp: "日本の図書館分類では、心理学は伝統的に「1類：哲学」の配下に置かれています。" },
        { q: "「心理学の過去は長いが歴史は短い」という有名な言葉を残し、無意味綴りを用いた記憶研究でも知られるドイツの心理学者は誰か。", a: "エビングハウス", c: ["ヴント", "ワトソン", "ティチェナー"], exp: "1908年の『心理学要論』の冒頭にあるエビングハウスの言葉です。" },
        { q: "法則定立的な自然科学としての心理学が目指すものが「説明」であるのに対し、個性記述的な精神科学が目指すものは何か。", a: "理解", c: ["予測", "統制", "記銘"], exp: "個別の事例や個性を深く掘り下げる精神科学的アプローチでは、対象の「理解」が目的となります。" },
        { q: "1879年、ドイツのライプツィヒ大学に世界初の心理学実験室を創設し、「実験心理学の父」と呼ばれるのは誰か。", a: "ヴント", c: ["ジェームズ", "フェヒナー", "ウェーバー"], exp: "ヴントが実験室を創設した1879年が、近現代の科学的心理学の成立の年とされています。" },
        { q: "ヴントが用いた、訓練された実験参加者に自身の内面的な意識状態を観察・報告させる手法を何というか。", a: "内省法", c: ["自由連想法", "客観的観察法", "投影法"], exp: "自分の心を自分で観察する手法で、「内省（ないせい）法」または内観法と呼ばれます。" },
        { q: "ヴントの心理学（要素主義）をアメリカに導入し、意識の構成要素を研究する「構成主義」を確立したのは誰か。", a: "ティチェナー", c: ["ジェームズ", "ワトソン", "キャッテル"], exp: "ティチェナーはヴントの弟子であり、アメリカで構成主義を厳格に推進しました。" },
        { q: "ティチェナーらの構成主義に対抗し、意識の要素ではなく、環境に適応するための「働き（機能）」を重視したジェームズらの立場を何というか。", a: "機能主義", c: ["行動主義", "ゲシュタルト心理学", "精神分析"], exp: "ウィリアム・ジェームズらが主導した、心の適応的な有用性を重視する立場です。" },
        { q: "意識中心の心理学を批判し、客観的に観察可能な「行動」のみを研究対象とすべきだと主張した、ワトソンが創始した立場は何か。", a: "行動主義", c: ["構成主義", "機能主義", "認知主義"], exp: "ジョン・ワトソンが1913年に提唱した「行動主義」は、のちの心理学に多大な影響を与えました。" },
        { q: "環境刺激（S）とそれに対する生体の反応（R）の結びつきのみを重視する、初期のワトソンらの行動主義モデルを何というか。", a: "S-R理論", c: ["S-O-R理論", "オペラント理論", "場理論"], exp: "刺激（Stimulus）と反応（Response）の直接的な連合を重視したため「S-R理論」と呼ばれます。" },
        { q: "ワトソンらのS-Rモデルの間に、生体（Organism）の内面的な認知や動機づけ（O）を挟み込んだトールマンやハルらの立場を何というか。", a: "新行動主義", c: ["新構成主義", "精神分析学", "ゲシュタルト学派"], exp: "生体内部の変数を認めたため、S-O-R理論、または「新行動主義」と呼ばれます。" },
        { q: "ネズミの迷路学習実験から、報酬がなくても頭の中に地図が形成される「潜在学習」や「認知地図」を提唱した心理学者は誰か。", a: "トールマン", c: ["スキナー", "パヴロフ", "ワトソン"], exp: "トールマンは、生体が単なる機械的反応ではなく、内部に地図（認知地図）を持つことを示しました。" },
        { q: "徹底的行動主義を掲げ、スキナー箱を用いた実験からオペラント条件づけの理論を体系化したアメリカの心理学者は誰か。", a: "スキナー", c: ["ハル", "ソーンダイク", "パヴロフ"], exp: "B.F.スキナーは、自発的な行動が環境からの強化によって学習される仕組みを明らかにしました。" },
        { q: "ウェルトハイマー、コフカ、ケーラーらが創始した、心の本質は要素の足し算ではなく、全体のまとまり（形態）にあるとする心理学派は何か。", a: "ゲシュタルト心理学", c: ["行動主義", "精神分析", "構成主義"], exp: "「全体は部分の総和以上のもの（ゲシュタルト）」とするドイツ発祥の心理学派です。" },
        { q: "静止した2つの光点を交互に素早く点滅させると、光が移動して見えるような、ゲシュタルト心理学の出発点となった現象を何というか。", a: "仮現運動", c: ["誘導運動", "自動運動", "残像現象"], exp: "ウェルトハイマーが研究した運動視の錯覚で、映画などの原理でもある「仮現運動（およその運動）」です。" },
        { q: "チンパンジーの迷路やバナナ箱を使った実験から、試行錯誤ではなく、状況をパッと見通すことで問題解決が起こる「洞察学習」を提唱したのは誰か。", a: "ケーラー", c: ["コフカ", "ウェルトハイマー", "ソーンダイク"], exp: "ケーラーはカナリア諸島での実験を通じ、閃きによる解決を「洞察（インサイト）」と呼びました。" },
        { q: "人の行動は個人の特性（P）と環境（E）の相互作用（関数）によって決まるとする「場理論」を提唱したゲシュタルト心理学者は誰か。", a: "レヴィン", c: ["コフカ", "ケーラー", "トールマン"], exp: "クルト・レヴィンは B = f(P, E) という有名な数式で心理学的な場を表現しました。" },
        { q: "チョムスキーの言語獲得理論やナイサーの著書により定着した、人間の心を「情報処理システム」として捉える近代心理学のアプローチは何か。", a: "認知心理学", c: ["深層心理学", "新行動主義", "構成心理学"], exp: "1950〜60年代の「認知革命」を経て、現在の心理学の主流となった「認知心理学」です。" },
        { q: "実験において、研究者が意図的に操作・変更する条件（原因となる変数）のことを何というか。", a: "独立変数", c: ["従属変数", "剰余変数", "媒介変数"], exp: "研究者が自由に決める原因変数を「独立変数」、その結果として測定される変数を「従属変数」と呼びます。" },
        { q: "実験の結果として測定される、独立変数の影響を受けて変化する変数（結果となる変数）のことを何というか。", a: "従属変数", c: ["独立変数", "統制変数", "環境変数"], exp: "独立変数に「従属」して決まる測定データであるため「従属変数」と呼ばれます。" }
    ],
    ch2: [
        { q: "イヌにメトロノームの音を聞かせた後に餌を与えることを繰り返し、音だけで唾液を分泌させた、パヴロフが発見した学習原理は何か。", a: "古典的条件づけ", c: ["オペラント条件づけ", "試行錯誤学習", "洞察学習"], exp: "レスポンデント条件づけとも呼ばれ、生得的な反射と中性刺激を結びつける学習です。" },
        { q: "古典的条件づけにおいて、条件づけをしなくても生得的に引き起こされる、餌に対する唾液分泌のような反応を何というか。", a: "無条件反応", c: ["条件反応", "オペラント反応", "自発的反応"], exp: "生まれつき備わっている反応を「無条件反応（UR）」、その原因となる餌などを「無条件刺激（US）」と呼びます。" },
        { q: "古典的条件づけが成立した後、報酬（無条件刺激）を与えずに条件刺激だけを提示し続けると、条件反応が次第に消失していく現象を何というか。", a: "消去", c: ["自発的回復", "般化", "弁別"], exp: "条件刺激（音）のあとに無条件刺激（餌）が来ない状態が続くと、反応が失われる「消去」が起こります。" },
        { q: "消去によって一度消えた条件反応が、一定の休憩時間を置いた後に、条件刺激を提示するだけで一時的に復活する現象を何というか。", a: "自発的回復", c: ["般化", "再条件づけ", "脱抑制"], exp: "記憶が完全に消えたわけではないことを示す現象で、「自発的回復」と呼ばれます。" },
        { q: "特定の条件刺激（ベルの音）だけでなく、それに類似した別の刺激（ブザーの音）に対しても条件反応が生じるようになる現象を何というか。", a: "般化", c: ["弁別", "消去", "遮断"], exp: "刺激の共通性に応じて反応が広がる現象を「般化（はんか）」と呼びます。" },
        { q: "特定の条件刺激には報酬を与え、類似した別の刺激には報酬を与えないことで、2つの刺激を区別して反応させる手続きを何というか。", a: "弁別", c: ["般化", "シェイピング", "消去"], exp: "違いを見分けて異なる反応をすることを「弁別（べんべつ）」と言います。" },
        { q: "ソーンダイクが提唱した、猫のパズルボックス実験に基づく「満足をもたらす行動は反復され、不快をもたらす行動は減少する」という法則は何か。", a: "効果の法則", c: ["練習の法則", "準備性の法則", "強化の法則"], exp: "のちのスキナーのオペラント条件づけの基礎となった、ソーンダイクの「効果の法則」です。" },
        { q: "レバーを押すと餌が出る箱（スキナー箱）に入れられたネズミが、自発的にレバーを押す頻度を増やすような学習を何というか。", a: "オペラント条件づけ", c: ["古典的条件づけ", "潜在学習", "模倣学習"], exp: "道具的条件づけとも呼ばれ、生体の自発的な行動（オペラント）とその結果によって成立する学習です。" },
        { q: "オペラント条件づけにおいて、行動のあとに好ましい刺激（報酬）が出現することで、その行動の発生頻度が高まることを何というか。", a: "正の強化", c: ["負の強化", "正の罰", "負の罰"], exp: "刺激の「出現（正）」によって、行動が「増える（強化）」ため「正の強化」と言います。" },
        { q: "行動のあとに嫌悪刺激（不快な音など）が消失・除去されることで、その行動の発生頻度が高まることを何というか。", a: "負の強化", c: ["正の強化", "正の罰", "負の罰"], exp: "刺激の「除去（負）」によって、行動が「増える（強化）」ため「負の強化」と言います。お風呂に入って不快な汚れが落ちるからお風呂好きになる、といった例です。" },
        { q: "記憶の3つのプロセスとは、情報を覚える「記銘」、とどめておく「保持（貯蔵）」と、もう一つは何か。", a: "想起", c: ["リハーサル", "精緻化", "符号化"], exp: "記憶は、記銘（符号化）➔ 保持（貯蔵） ➔ 想起（検索）の3段階から成り立ちます。" },
        { q: "心理学者のミラーが提唱した、人間が短期記憶で一度に保持できる情報の限界容量（7±2）の単位を何というか。", a: "chunk（チャンク）", c: ["bit（ビット）", "word（ワード）", "item（アイテム）"], exp: "情報を意味のあるまとまりにした最小単位を「チャンク」と呼びます。" },
        { q: "短期記憶の情報を忘れないように、頭の中で何度も復唱・復唱する行為を何というか。", a: "リハーサル", c: ["チャンキング", "符号化", "プライミング"], exp: "単に繰り返す「維持リハーサル」と、意味を結びつける「精緻化リハーサル」があります。" },
        { q: "アトキンソンらが提唱した、記憶を「感覚記憶」「短期記憶」「長期記憶」の3つの貯蔵庫の連続として捉えるモデルを何というか。", a: "二重貯蔵モデル", c: ["作動記憶モデル", "処理レベルモデル", "網羅モデル"], exp: "時間の長さに応じた複数の貯蔵庫を仮定する、もっとも古典的で強固な「二重貯蔵モデル」です。" },
        { q: "自分の過去の思い出や体験に関する、言葉で表現できる長期記憶の分類を何というか。", a: "エピソード記憶", c: ["意味記憶", "手続き的記憶", "プライミング"], exp: "「いつ、どこで、誰が」といったコンテキストを含む個人の思い出は「エピソード記憶」に分類されます。" },
        { q: "「日本の首都は東京である」といった、個人の体験とは切り離された知識や事実に関する長期記憶を何というか。", a: "意味記憶", c: ["エピソード記憶", "手続き的記憶", "潜在記憶"], exp: "言葉の定義や一般的な知識は「意味記憶」と呼ばれ、エピソード記憶とともに「宣言的記憶」に属します。" },
        { q: "自転車の乗り方や楽器の演奏など、体で覚えた、言葉で説明しにくい長期記憶の分類を何というか。", a: "手続き的記憶", c: ["意味記憶", "エピソード記憶", "宣言的記憶"], exp: "繰り返しによって獲得され、意識せずに実行できる記憶を「手続き的記憶（非宣言的記憶）」と言います。" },
        { q: "文字リストを記憶して思い出す際、最初の方の単語の正答率が高くなる現象（長期記憶への転送を反映）を何というか。", a: "初頭効果", c: ["新近性効果", "ハロー効果", "カクテル効果"], exp: "リストの最初（初頭）が有利になる現象を「初頭効果」と呼びます。" },
        { q: "文字リストを思い出す際、最後の方（直前）に提示された単語の正答率が高くなる現象（短期記憶の残存を反映）を何というか。", a: "新近性効果", c: ["初頭効果", "バーナム効果", "残像効果"], exp: "リストの最後（直近）の成績が良い現象を「新近性（しんきんせい）効果」と言います。" },
        { q: "周囲が騒がしい場所でも、自分の名前や興味のある話題は自然と聞き取れる知覚の選択的注意現象を何というか。", a: "カクテルパーティー効果", c: ["マガーク効果", "傍観者効果", "ピグマリオン効果"], exp: "脳が必要な情報に選択的に注意を向けるため、特定の音だけを際立たせて聴取できる現象です。" }
    ],
    ch3: [
        { q: "ヒトの赤ちゃんは、運動機能は未熟だが感覚器官は開いた状態で生まれる特徴を、ポルトマンは何と呼んだか。", a: "二次的就巣性", c: ["離巣性", "生理的早産", "レディネス"], exp: "鳥類の「留巣性（就巣性）」と「離巣性」のハイブリッドのような、ヒト特有の未熟性を「二次的就巣性」と呼びます。" },

        { q: "人間の知能のうち、新しい環境や想定外の局面に臨機応変に対応する能力（20代前半をピークに加齢で低下しやすい）を何というか。", a: "流動性知能", c: ["結晶性知能", "多重知能", "言語性知能"], exp: "キャッテルが提唱。脳の生物学的な処理能力に近いものが「流動性知能」です。" },
        { q: "人間の知能のうち、長年の学習や経験の蓄積によって結晶化し、高齢になっても上昇・安定しやすい知能を何というか。", a: "結晶性知能", c: ["流動性知能", "一般因子知能", "動作性知能"], exp: "お年寄りの知恵や語彙力、専門知識などが該当する「結晶性知能」です。" },

    document.getElementById('quiz-container').classList.remove('hidden');
    
    // 選択された章からランダムに最大20問抽出する
    const all = [...quizData[category]];
    currentQuestions = all.sort(() => Math.random() - 0.5).slice(0, 20);
    
    currentIndex = 0;
    score = 0;
    showQuestion();
}

function showQuestion() {
    const q = currentQuestions[currentIndex];
    
    // 【修正箇所1】ここでHTMLの構造を壊さないように、直接テキストだけを書き換える
    document.getElementById('stats').innerHTML = `問題 ${currentIndex + 1} / ${currentQuestions.length}`;
    
    document.getElementById('question').innerText = q.q;
    document.getElementById('feedback-area').style.display = "none";
    
    const choicesDiv = document.getElementById('choices');
    choicesDiv.innerHTML = "";
    
    // 正解とダミーをシャッフルして4択を生成
    const allChoices = [q.a, ...q.c].sort(() => Math.random() - 0.5);
    allChoices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'btn choice-btn';
        btn.innerText = choice;
        btn.onclick = () => checkAnswer(btn, choice, q.a, q.exp);
        choicesDiv.appendChild(btn);
    });
}

function checkAnswer(btn, selected, correct, exp) {
    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach(b => b.disabled = true);
    
    const resDiv = document.getElementById('feedback-result');
    const expDiv = document.getElementById('explanation');
    
    if (selected === correct) {
        btn.classList.add('correct');
        resDiv.innerText = "⭕ 正解！";
        resDiv.style.color = "#2ecc71";
        score++;
    } else {
        btn.classList.add('wrong');
        resDiv.innerText = "❌ 不正解...";
        resDiv.style.color = "#e74c3c";
        // 正解の選択肢をハイライト
        btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
    }
    
    expDiv.innerText = exp;
    document.getElementById('feedback-area').style.display = "block";
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-container').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    
    const total = currentQuestions.length;
    
    // 【修正箇所2】安全にスコア表示部分のテキストを書き換える
    document.getElementById('score').innerText = score;
    document.getElementById('total-score').innerText = total;
    
    let comment = "";
    const rate = score / total;
    if (rate === 1) comment = "完璧です！検定1級・特1級も狙える知識量です！🏆";
    else if (rate >= 0.8) comment = "素晴らしい！2級合格圏内に完全に達しています！✨";
    else if (rate >= 0.6) comment = "合格ライン線上です！解説の用語をもう一度確認しましょう。";
    else comment = "伸び代がたくさんあります！一問一答のデータベースを繰り返し解いてみましょう。";
    document.getElementById('comment').innerText = comment;
}
</script>
</body>
</html>
