
<!DOCTYPE html>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: #eef2f5; display: flex; justify-content: center; padding: 15px; color: #2c3e50; margin: 0; }
        #app { background: white; padding: 1.5rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { font-size: 1.3rem; text-align: center; color: #34495e; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; margin-top: 0; }

        .category-btn { background: #3498db; color: white; box-shadow: 0 4px #2980b9; text-align: left; padding-left: 15px; }

        .choice-btn { background: #fff; border: 2px solid #dfe6e9; text-align: left; padding-left: 15px; line-height: 1.4; font-weight: normal; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60 !important; font-weight: bold; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b !important; font-weight: bold; }
        .hidden { display: none; }
        #stats { text-align: right; color: #7f8c8d; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; }
        #feedback-area { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }

    </style>
</head>
<body>

<div id="app">
    <h1>心理学検定 究極マスター</h1>
    
    <div id="menu-screen">
        <p style="text-align:center; font-weight:bold; color:#555; font-size:0.9rem; margin-bottom:15px;">学習する章を選択してください<br>（ランダム20問）</p>

        <div id="stats">問題 <span id="q-num">1</span> / <span id="q-total">20</span></div>

<script>
const database = {"第1章_原理・研究法・歴史": [{"q": "形式科学と経験科学という二分法に基づくと、心理学はどちらに属するか。", "a": "経験科学", "exp": "形式科学は数学に代表されるように、公理から抽象論理で進められていく学問である。一方で経験科学は、現実世界にあることを扱い、その理論や法則を導き出していく。"}, {"q": "日本の図書館で広く用いられている日本十進分類法において、心理学が属する類は、哲学、歴史、社会科学、自然科学のうちのどれか。", "a": "哲学（1類の哲学に含まれる）", "exp": "1類の哲学に含まれ、第2区分では140が心理学である。現在では140〜146になっている。ただし、実際には36（社会）、37（教育）、49（医学、薬学）など、心理学に関連する図書の本も多い。"}, {"q": "「心理学の過去は長いが歴史は短い」と表現して、心を研究しようとしての古くからの取組みと、自然科学の影響を受けつつ学問として成立した心理学とを区別する視点を提供したドイツの心理学者は誰か。", "a": "エビングハウス（Ebbinghaus, H.）", "exp": "エビングハウスは、無意味綴りを用いた記憶実験や、そこから得られた忘却曲線で有名。この言葉は、1908年に公刊された『心理学要論』の冒頭にある。"}, {"q": "個性記述的な精神科学がめざすのは理解であることに対して、法則定立的な自然科学としての心理学がめざすのは何であると考えられるか。", "a": "説明", "exp": "個性記述的／法則定立という用語は、新カント学派の哲学者ヴィンデルバント（Windelband, W.）による。法則定立的な自然科学は、現象から一般的な法則を導き、適切な説明概念を用いての説明を図る。"}, {"q": "心理学でしばしば用いられる、法則定立的な立場から、一般的な法則から導かれた仮説について実証的に検証する研究手法を何と呼ぶか。", "a": "仮説演繹法", "exp": "仮説を置いて、それを演繹的に検証することから、仮説演繹法という表現となる。経験科学であるため、現実のデータを集めて実証すると見ると帰納的だが、統計的検定などを用いることで、演繹的な検証が可能となる。"}, {"q": "インタビューを書き起こしたもののように、少なくともそのままでは量として集計しての分析ができないデータについて論じて示唆を得る研究を、量的研究に対して何と呼ぶか。", "a": "質的研究", "exp": "このような質的研究は、病理学や心理臨床の事例研究、ナラティブアプローチなどで見られる。なお、定定量的な研究に対する表現の場合は、定性的研究となる。"}, {"q": "ヒトを含む生物がある機能を持つ理由への問いに対する答え方の次元が整理された、ティンバーゲン（Tinbergen, N.）の「4つのなぜ」とは、至近要因、究極要因、発達要因ともう一つは何か。", "a": "系統進化要因（系統発生）", "exp": "ティンバーゲンは、鳥類の比較行動学的な研究でノーベル賞を得た。「4つのなぜ」は、「○○はなぜ××するのか」というタイプの問いを解明する方向性を考えるうえで有用で、このうち系統進化要因は、そのような機能に至った進化の歩みを理由として考えるものである。"}, {"q": "心理学の実証研究を、実験的研究と相関的研究とに分ける場合、変数に対する操作の有無を基準として分けるか。", "a": "変数に対する操作の有無（操作があれば実験的、操作がなく関連性を見るなら相関的）", "exp": "ここでの操作とは、独立変数を実験者が意図した状態に変えること。哲学の操作主義という操作とは異なる。"}, {"q": "分析モデル of 観点からは、相関的研究は共分散構造モデルに対応するのに対して、実験的研究はどのようなモデルに対応すると考えられるか。", "a": "因果モデル", "exp": "実験的研究は、独立変数が従属変数に対して影響を与えるという因果関係の検証を図る。"}, {"q": "実験研究において、実験者が直接に操作を加える変数を何と呼ぶか。", "a": "独立変数", "exp": "他とは独立に操作されることからこの名がある。また、回帰分析の説明変数も、独立変数と呼ばれることがある。"}, {"q": "勉強中に流す背景音楽を何種類か用意し、その種類によって学習成績が影響を受けるかどうかを実験で検討する場合、学習成績は独立変数、従属変数のどちらであるか。", "a": "従属変数", "exp": "ここでは、学習成績は直接には操作されず、背景音楽によって影響を受けるかどうかが検討されるので、背景音楽が独立変数、学習成績が従属変数となる。"}, {"q": "2種類の課題条件を実験参加者内計画で比較するため、右表のように2グループで実施順序を反転させ、順序効果を相殺する組み方を何と呼ぶか。\n[ 第1セッション：A群 課題①、B群 課題② ➔ 第2セッション：A群 課題②、B群 課題① ]", "a": "カウンターバランス", "exp": "先と後とでは実験への慣れや疲労などによる影響が異なるので、順序を反転させた2群で相殺する必要がある。3種以上の課題がある場合にはラテン方格を用いるとよい。どの列とも、どの行とも、同じ番号は1回ずつ配置されている。"}, {"q": "睡眠不足が学習成績に与える影響を調べるために、普通に睡眠を取る実験参加者のグループと、睡眠の妨害を受けるグループとで比較を行う場合、前者は実験群、統制群のどちらであるか。", "a": "統制群（コントロール群、比較対照群）", "exp": "統制群のほうには、実験操作を加えない。実験操作を加えた実験群との間で従属変数に差が認められた場合、操作の影響があったと判断できる。なお、別々の群を用意しない、実験参加者内計画での比較では、それぞれ統制条件、実験条件と呼ばれる。"}, {"q": "実験結果を右図のように棒グラフの形で表現するとき、独立変数は縦軸、横軸のどちらに置かれるか。\n[図：縦軸＝従属変数、横軸＝独立変数を示す棒グラフ]", "a": "横軸", "exp": "心理学では、棒グラフはほぼ例外なく縦向きに立てる形をとり、横軸を独立変数とする。縦軸が従属変数で、一般には各群または各条件の平均値を、グラフとして示すことになる。横軸が連続量の場合に用いられることが多い折れ線グラフでも、こういった示し方は同様となる。"}, {"q": "質問紙調査でよく用いられる、「とても好き」「やや好き」「どちらでもない」「やや嫌い」「とても嫌い」のような、複数段階の言語表現から最もよく当てはまるものを選択させる回答方式は、提案者の名前を取って何と呼ばれているか。", "a": "リッカート法（リッカート尺度）", "exp": "リッカート（Likert, R.）は、民主的管理システムであるシステム4の有用性を説いた組織心理学者。リッカート法は、評定尺度法とも呼ばれ、統計処理に関しては議論があるものの、心理学の内外で広く用いられる。"}, {"q": "「仕事や家庭生活に満足していますか」のように、一つの項目でやや異なる複数の事項について尋ねることになる質問を何と呼ぶか。", "a": "ダブルバーレル質問", "exp": "このような質問では、仕事のみ、あるいは家庭生活のみに満足を感じる場合にどう答えるかがはっきりせず、妥当性が落ちる。バーレルとは銃身や砲身のこと。"}, {"q": "質問紙尺度の信頼性を確認するために、同じ人に同じ尺度を、期間をしばらく空けて2回実施し、同様の結果が得られるか確認する方法を何と呼ぶか。", "a": "再検査法（再テスト法）", "exp": "このようにして確認される信頼性を、再検査信頼性と呼ぶ。知能やパーソナリティのような、安定性の高い構成概念を扱う場合は、数か月を空けて検証することも多い。一方、気分など不安定なものを測る尺度には適さない。"}, {"q": "質問紙のみによって、要因操作を伴う実験的研究を行うことはできるか。", "a": "できる", "exp": "たとえば、「〜のようなとき、あなたはどうしますか」と尋ねる場面想定法では、複数の場面を取り上げること柄で、これを独立変数とした操作が成立する。"}, {"q": "集合調査、面接調査、電話調査のうち、調査対象者を幅広い地域から得たい場合に最も実施しやすい手法はどれか。", "a": "電話調査", "exp": "このような場合には、調査者にも回答者にも物理的な移動を要しない電話調査や郵送調査が使いやすい。"}, {"q": "標本抽出の際に、まず母集団をいくつかのクラスターに分け、そこから無作為抽出されたクラスターのみから対象者を抽出するなど、複数段階に分けて抽出を行う方法を何と呼ぶか。", "a": "多段抽出法", "exp": "複数の段階に分けて抽出することからこう呼ばれる。全国調査で、全対象者からいきなり無作為抽出で決めることはむしろ困難で、多段抽出を用いるのが現実的である。"}, {"q": "オズグッドら（Osgood, C. E. et al.）が言葉の内包的意味を把握するために開発し、今日ではさまざまな対象の感性評価に用いられている測定法は何呼ぶか。", "a": "SD法（意味微分法、セマンティック・ディファレンシャル法）", "exp": "対義語になる形容詞対を多数用い、リッカート法による双極尺度で測定していく。活動性、評価性、力量性からなる3次元構造が得られやすいことが知られている。"}, {"q": "組織的観察法のうち、観察者自身が観察対象に加わり、関わりの中や内からの視点で見えてくるものに迫ることをねらう観察法を何と呼ぶか。", "a": "参与観察法（参加観察法）", "exp": "アプローチや社会学などでも広く用いられる観察法である。ほぼ確実に質的研究として行われ、進め方の自由度も高いが、それだけ研究者としてのセンスも問われる。"}, {"q": "他の人から見られているとわかることによって、観察される側の行動に変化が生じるという観察者効果が現れたことで知られる、メイヨー（Mayo, G. E.）らが行った一連の実験を、研究フィールドとなった工場の名前を取って何と呼ばれるか。", "a": "ホーソン実験", "exp": "米国イリノイ州にあったウェスタン・エレクトリック社のホーソン工場で行われた実験で、部屋の照明や温度などを上下させてみても、それと連動しない能率向上が見られるなどの想定外の知見が続いた。"}, {"q": "観察期間を細かい時間単位に区切り、各単位内において生起した行動を記録していく方法を何と呼ぶか。", "a": "時間見本法（タイムサンプリング法）", "exp": "時間見本法では、統計処理に適したデータを得やすい。他には、目当ての行動が生じやすい場面を単位として見ていく場面見本法、起こった事象の内容を見る事象見本法といった手法もある。"}, {"q": "マウスなどのげっ歯類を、正方形または円形のまったく何もない場に放ち、活動性や新奇環境に慣れていく過程やその個体差を観察する方法を何と呼ぶか。", "a": "オープンフィールドテスト", "exp": "身を隠すことのできない斬新な場で、不安反応や探索行動などが起こり、その後だんだんと馴化していく様子を見ることができる。"}, {"q": "動物の知性を考えるうえで、「より低次の心的能力の結果として解釈できるのであれば、より高次の心的能力を持ち出して解釈するべきではない」とする考え方は、提唱したイギリスの心理学者の名前を取って何と呼ばれるか。", "a": "モーガンの公準（モーガンの節約律）", "exp": "モーガン（Morgan, C. L.）が唱えたこの考え方は、実験による比較心理学や動物心理学の発展につながった。説明のための仮定は少なくすべきだという、科学論におけるオッカムのかみそりの考え方にも通じる。"}, {"q": "直接に測定された変数にたいして、いろいろな課題からなる知能検査を用いて、個々の課題の得点から知能全体を表す得点を推定する場合、知能全体の得点は測定変数、潜在変数のどちらに当たるか。", "a": "潜在変数（構成概念、仮説構成概念）", "exp": "直接に測定された変数が測定変数で、潜在変数はそこから統計的手法で推定される。モデル図では、□と○とで描き分ける。知能のような、直接に見ることのできない仮説構成概念は、潜在変数としてとらえることになる。"}, {"q": "ウェクスラー式知能検査において得られる偏差知能指数は、平均および標準偏差がそれぞれいくつになるように作られているか。", "a": "平均：100、標準偏差：15", "exp": "正規分布では、平均値から±1標準偏差の範囲に約68％が入る。すると、たとえば偏差知能指数が115であれば、集団内の上位5分の1に入っていると推測される。"}, {"q": "面接法による検査で、尋ねていく内容や順序が一定程度決まってはいるが、構造化面接ほど固定的ではなく、面接者の自由度も確保されているような面接を何と呼ぶか。", "a": "半構造化面接", "exp": "心理学では、手続きがひととおり固まっていることを構造化と表現する。面接者の裁量で自由に展開できる面接は非構造化面接、ないしは自由面接と呼ばれる。"}, {"q": "面接者の性別や年齢、外見などが、被面接者の回答に影響し、本来得られるべき結果に歪みを生じてしまうことがあるが、この歪みを何と呼ぶか。", "a": "面接者バイアス", "exp": "年齢を持たない面接者は存在しないからも、面接の時点でこのバイアスをゼロにすることは難しいとわかるが、面接結果の解釈で注意することになる。"}, {"q": "質問紙において、社会的望ましさに沿う方向へ回答が歪む傾向を検出するために質問項目の中に混ぜる、一般には当てはまる人がめったにいないはずの内容をあえて問う尺度を何と呼ぶか。", "a": "虚偽尺度（L尺度、虚構尺度、ライスケール）", "exp": "たとえば、「新聞の社説は毎日読む」や「今まで一度も風邪を引いたことがない」に○で答えると、よいことだがそれが事実である人はごくわずかであるはずなので、社会的望ましさの表れとして採点されることになる。"}, {"q": "ロールシャッハテスト、絵画統覚検査、バウムテスト、P-Fスタディ、SCTといった心理検査によって代表される心理検査の種類は、質問紙法、投影法、作業検査法のうちどれに当たるか。", "a": "投影法（投影法検査）", "exp": "曖昧で自由度の高い課題への反応から、パーソナリティや深層心理に迫るのが投影法で、絵を描く、物語を作るなど、さまざまな手法のものがある。質問紙法に比べて、検査の意図が見えにくいため歪曲されにくいが、検査者の熟練を要し、時間も長くかかるものが多い。"}, {"q": "臨床場面においては、クライエントに対してより深く多角的な理解を得るため、同一の対象者に性質の異なる複数の心理検査を組み合わせて実施することが多いが、このような組み合わせを何と呼ぶか。", "a": "テストバッテリー（検査バッテリー）", "exp": "このバッテリーは、野球のバッテリーと同じ語で、ひとまとまりの集まったものを意味する。測定される意識水準やとらえ方が異なる検査を、必要に即して過不足なく組み合わせるところに臨床家のセンスが問われる。"}, {"q": "得られたデータそのものを整理、要約して特徴を示す統計手法を記述統計と呼ぶのに対して、データから母集団の特徴を推測する統計手法を何と呼ぶか。", "a": "推測統計（推計統計）", "exp": "心理学では、知りたい母集団は「人間」や「子育て中の女性」のようにほぼ無限の大きさを持つため、全員を調べて母統計量を得ることは不可能で、そこでの統計的仮説検定などの推測統計が必要になる。"}, {"q": "t検定やF検定といった、母集団に特定の分布を仮定する検定と、カイ二乗検定やフィッシャー（Fisher, R. A.）の直接確率計算といった、そうでない検定とを、それぞれ何と呼ぶか。", "a": "パラメトリック検定／ノンパラメトリック検定", "exp": "心理学では、母集団に正規分布を仮定することが比較的に自然なものが扱われやすく、t検定や、F検定を用いた分散分析が多く使われる。"}, {"q": "t検定において、帰無仮説が正しい場合のt分布が下図のようである場合に、有意であると判断されるのは、得られた検定統計量tが臨界値-A〜Aまでの範囲の内側に入ったときと、外側に出た場合のどちらであるか。\n[図：t分布曲線。両端の領域-A以下、A以上が赤く塗られている]", "a": "外側に出た場合（有意水準未満の確率でしか起こらない範囲に入った場合）", "exp": "一般に、統計的仮説検定では、なんらかの統計量について帰無仮説が正しい場合の理論分布を得て、事前に決めた有意水準よりも低い確率でしか起こらない範囲をその分布の外側に定め、標本から計算した統計量がその範囲に入るなら帰無仮説を棄却し、対立仮説を採択する。この状態を、有意と表現する。"}, {"q": "ある学年の生徒全体について、体重と心理的健康度の得点との積率相関係数を算出したところ0であった場合、体重と心理的健康度との間には関係がまったくないということはできるか。", "a": "できない（線形関係がない、ということしか言えない）", "exp": "積率相関係数は、線形関係の程度を知ることに適し、そうでない場合には注意を要する。たとえばU字型のパターンの場合は、明らかに両者に関係性があるが、相関係数は0になる。"}, {"q": "スティーブンス（Stevens, S. S.）による尺度水準の4分類を情報量の多い順に並べたとき、A・Bに入るのはそれぞれ何か。\n[ 比率尺度 ➔ ( A ) ➔ ( B ) ➔ 名義尺度 ]", "a": "A：間隔尺度（距離尺度）\nB：順序尺度（序数尺度）", "exp": "四則演算がすべて成立する比率尺度、加減算は可能な間隔尺度、大小関係はあるが通常の演算は意味を持たない順序尺度、同一かどうかのみ判断可能な名義尺度の4水準に区分される。統計ソフトウェアSPSSでは、比率尺度と間隔尺度は「スケール」としてまとめられる。"}, {"q": "検査の信頼性のうち内的一貫性の程度を推定するためによく用いられる、項目の総数、全体の分散、個々の項目の分散から算出される指標は何か。", "a": "クロンバックのα係数（アルファ係数）", "exp": "内的一貫性とは、検査を構成する項目がすべて同じものを測れる方向に向かってそろっている度合いである。αの上限は1で、一般には0.8くらいあれば十分であるとされる。"}, {"q": "優れている項目が多く、実施に手間の価値がかかる既存の心理検査に対して、簡便な短縮版を新たに開発した場合に、同じ集団から既存のものでの検査得点と短縮版の得点との両方を得て、その間の相関が高いことをもって確認される妥当性は何と呼ばれるか。", "a": "併存的妥当性", "exp": "妥当性は、測定したい対象が適切にとらえられている程度であり、測定の精度である信頼性とともに、心理検査が備えるべき重要な特性である。併存的妥当性のほかに、理論的にあるべき形で他の検査結果と対応するという構成概念妥当性、項目の中身を概念的に精査して確認する内容的妥当性など、さまざまなものがある。"}, {"q": "発達の最近接領域の概念や、独り言をめぐるピアジェ（Piaget, J.）との論争などで知られるが、欧米ではしばらく顧みられず1980年代になって再評価が進んだ心理学者は誰か。", "a": "ヴィゴツキー（Vygotsky, L. S.）", "exp": "ソヴィエト連邦で活躍したヴィゴツキーは、唯物弁証法を背景に、社会文化的アプローチの考え方を拓いた。37歳で早世するが、1980年代に西側で「ヴィゴツキー・ルネサンス」と呼ばれる再評価の動きが起きた。"}, {"q": "ビルタランフィ（Bertalanffy, L. v.）らによる、互いに作用し合う要素からなり部分に還元することのできない「システム」の概念を提唱し、心理学では特に家族療法に大きな影響を与えた理論は何か。", "a": "一般システム論", "exp": "システムの考え方は、科学哲学から制御工学、組織科学など、幅広い分野へつながる。心理学では、システム論的家族療法として、家族の誰かに現れている問題を、家族システム全体の病理と見て介入する技法を生み出した。"}, {"q": "客観的な事実よりも、ある人が持つ世界として語られる物語や意味に注目し理解を図るアプローチを何と呼ぶか。", "a": "ナラティブアプローチ（ナラティブ心理学）", "exp": "ナラティブとは語り、物語のこと。個性記述的な研究で特に有用なアプローチである。"}, {"q": "範囲を成人までで区切らず、老いて亡くなるまでの人生すべてを対象とする立場をとる発達心理学の立場を何と呼ぶか。", "a": "生涯発達心理学", "exp": "発達とは本来、子どもが大人になっていくことであったが、発達課題や発達段階の考え方には、ライフサイクル全体にわたって発達的変化があるとする立場も多い。"}, {"q": "研究実施時に、参加者に対してその目的や想定されるリスク等について事前に説明し、参加への同意を確認することを何と呼ぶか。", "a": "インフォームド・コンセント（インフォームド・コンセント手続き）", "exp": "医学から始まった考え方で、ヒトを対象とする医学研究の倫理を扱ったヘルシンキ宣言でも分量が割かれている。なお、「説明と同意」や、医療場面向けの「納得診療」といった意識もある。"}, {"q": "実験の真の目的に気づかれることが実験結果に影響することを防ごうと、うその目的を告げて実験を実施する場合には、実験終了後に事後的に説明を行う必要があるが、この説明を何と呼ぶか。", "a": "デブリーフィング", "exp": "たとえば、予想外の事態へのとっさの判断を見たい実験では、事前に知られていては予想外にならなくなるため、もっともらしいカバーストーリーで隠して行う。実験におけるこのような「だまし」をディセプションと呼び、必ず後で十分な説明を行うことが求められる。"}, {"q": "1971年にジンバルドー（Zimbardo, P. G.）の指導の下で行われたが、実験参加者に脱落や異常な行動が現れ出したことで中止され、研究倫理をめぐって議論を招いたことで知られる実験は何と呼ばれるか。", "a": "スタンフォード監獄実験", "exp": "スタンフォード大学に監獄に似せたリアルな実験場を作り、看守と囚人との役に分けられた実験参加者が、与えられた役割に従っていくさまを見るねらいの実験だったが、むしろ従い方が予想以上に強く出てしまって危険な展開となり、2週間の予定が6日で中止された。"}, {"q": "動物実験においてとるべき方向性である、非動物技術への代替、被験体数の削減、生じる苦痛の最小化の3指針は、英語の頭文字に由来してどのように呼ばれるか。", "a": "3R（3つのR）", "exp": "3指針は英語でそれぞれ、Replacement, Reduction, Refinementと表現されることから、3Rと呼ばれる。日本では、動物愛護法41条に相当する規定がある。"}, {"q": "ある研究知見について、同じ手法で同じことを実施し、同様の結果が発現されるかどうかを検証することを何と呼ぶか。", "a": "追試（再現性の検証）", "exp": "心理学では発明品や化石のような物証が残りにくく、追試での再確認の意義が大きい。他の人が追試できるように、研究の手続きを論文にて明示することも重要である。"}, {"q": "1949年に開催され、臨床心理学の教育訓練プログラムとして科学者-実践家モデルを選択した会議を、開催地名を取って何と呼ぶか。", "a": "ボルダー会議", "exp": "米国コロラド州ボルダーで開かれたこの会議を通して、臨床心理学の専門家の教育は、科学者としての心理学研究者と、臨床現場の実践者としての両方の訓練を兼ね備えることが求められるようになった。"}, {"q": "クライエントから得られた秘密について、心理臨床家個人が一切口外できないのではなく、対象者を援助するチームないしは組織内から外には出さないという、図のような形での守秘義務を何と呼ぶか。\n[図：クライエント ➔ 心理臨床家× ➔ 援助チーム全員で共有]", "a": "集団的守秘義務", "exp": "守秘義務は、秘密保持義務とも呼ばれ、たとえば公認心理師法41条は、次のように定める。「公認心理師は、正当な理由がなく、その業務に関して知り得た人の秘密を漏らしてはならない。公認心理師でなくなった後においても、同様とする。」国家資格ではない資格や専門職でも、同様の倫理規定がある。スクールカウンセラーや医療現場の臨床心理技術者などは、集団的守秘義務の形をとるのが普通である。"}, {"q": "心理臨床家がより優れた臨床家から指導や助言を受ける活動であるスーパービジョンにおいて、助言をする側と受ける側とはそれぞれ何と呼ばれるか。", "a": "助言をする側：スーパーバイザー\n助言を受ける側：スーパーバイジー", "exp": "スーパービジョンを受けることは、臨床家としてのさらなる資質向上に不可欠である。なお、異なる分野の専門家への助言は、コンサルテーションと呼ばれる。"}, {"q": "心理学的な支援は、必ずしも病気を抱えた人に対してとは限らないことから、個々について症例という表現はあまり好まれず、何と呼ぶか。", "a": "事例（ケース）", "exp": "英語ではいずれもcaseだが、分野や問題意識によって表現が異なる。やや似た例に、カウンセリングでは対象者が患者ではなくクライエントと呼ばれることがある。"}, {"q": "臨床研究や臨床実践では、対象者との間に研究または実践による以外の関係を作ってはならず、それ以前から他の関係性を持っている人物は対象としてはならないという原則を、何の禁止と呼ぶか。", "a": "多重関係の禁止（二重関係の禁止）", "exp": "ユング（Jung, C. G.）の女性患者との性的関係の例はあるが、支援のための関係性への害、利己的な利用になる危険性などから、今日では禁止である。ただし、学級担任が実施する教育相談、事例研究として自分の論文にまとめることを意識した臨床活動などは認める立場もある。"}, {"q": "公認心理師法42条1項を下記のように示した場合、空欄に入る語句は何か。\n「公認心理師は、その業務を行うに当たっては、その担当する者に対し、保健医療、福祉、教育等が密接な（ A ）の下で総合的かつ適切に提供されるよう、これらを提供する者その他の関係者等との（ B ）を保たなければならない。」", "a": "A：連携\nB：連携", "exp": "心理学の専門職には、さまざまな形での連携が求められる。学校心理学ではコラボレーションとも呼ばれる。基礎となる心理学の理論、具体的な援助技術、関連分野への理解のいずれもが重要となる。\n[図1.6 学校心理学の3本柱（心理学的基盤、学校教育の理論と方法、心理教育的援助サービスの方法）]"}, {"q": "生物と無生物とは、霊魂（プシュケー）を持つかどうかで区別し、人間と他の動物とは、理性を用いるかどうかで区別されると主張した、古代ギリシアの哲学者は誰か。", "a": "アリストテレス（Aristotelēs）", "exp": "アリストテレスは、生物と無生物とを区別し、生物を感覚と運動能力のある動物と、ない植物とに区分することを試みた。また、理性をいる人間の本質は、知を愛することにあるとした。"}, {"q": "人間を物質としての体と、心の働きとしての精神との二面に分けてとらえる心身二元論（物心二元論）を唱えたフランスの哲学者は誰か。", "a": "デカルト（Descartes, R.）", "exp": "プラトン（Platon）にも似た着想が見られ、哲学に古くからある考え方である。生気論、精神物理学、意識主義といった形で、草創期の心理学へと結びつく。"}, {"q": "観念は経験を積むことで作られていくと考え、心は「タブラ・ラサ」という白紙の状態から始まると主張したイギリスの哲学者は誰か。", "a": "ロック（Locke, J.）", "exp": "ロックは、イギリス経験論や感覚主義を代表する哲学者。ワトソン（Watson, J. B.）の「1ダースの子ども」という発言に象徴される、行動主義の考え方の基盤となった。"}, {"q": "ライプツィヒ大学に世界初となる心理学実験室を開設し、実験心理学を創始した、1879年が心理学発祥の年とされるきっかけとなったドイツの生理学者は誰か。", "a": "ヴント（Wundt, W. M.）", "exp": "ヴントは、意識を構成要素に分解して分析する要素主義や、自らの心の状態を観察して報告させる内省法（実験的内省法）を用いたことで知られる。さらに、実験室では扱えない高次の精神プロセスを扱うために『民族心理学』を著した。"}, {"q": "ヴントの心理学実験室に留学し、アメリカへその手法を持ち帰って構成主義心理学を確立させた心理学者は誰か。", "a": "ティチェナー（Titchener, E. B.）", "exp": "ティチェナーは、ヴントの要素主義の立場をより厳密に進め、心を純粋な意識要素とその結合として分析する構成主義（構造主義）を唱えた。しかし、この厳格すぎる内省法は、後の行動主義やゲシュタルト心理学からの批判を招くことになった。"}, {"q": "著書『心理学原理』などで知られ、意識は静止した要素の集まりではなく、絶えず変化し流れるものであるとして「意識の流れ」という概念を提唱したアメリカの心理学者は誰か。", "a": "ジェームズ（James, W.）", "exp": "ジェームズは、意識の構成要素を分析する構成主義に対して、意識がどのような機能や目的を持つのかを重視する機能主義心理学の基盤を築いた。彼の思想はプラグマティズム哲学とも深く結びついている。"}, {"q": "シカゴ大学を中心に機能主義心理学を発展させ、刺激と反応を固定的に分ける「反射弓の概念」を批判して、有機体の適応行動全体をとらえるべきだと主張したアメリカの哲学者・教育心理学者は誰か。", "a": "デューイ（Dewey, J.）", "exp": "デューイは、心理学の知見を教育実践へと応用し、機能主義をシカゴ学派の思想として確立させた。彼の適応行動への着目は、その後の行動主義への橋渡しとなった。"}, {"q": "フランスで催眠研究を行い、ヒステリーの症状が催眠によって人工的に再現・消去できることから、精神疾患の背後には潜在意識（無意識）の解離が存在すると主張した精神医学者は誰か。", "a": "ジャネ（Janet, P.）", "exp": "ジャネの解離の概念は、同じくヒステリーを研究していたフロイトの精神分析の形成にも大きな影響を与え、現代のトラウマ研究や解離性障害の臨床の基礎となっている。"}, {"q": "「私の手は動かない」というような、解剖学的な神経支配の経路を無視して生じるヒステリーの転換症状から、心理的な原因が身体症状に転換されるメカニズムを発見し、精神分析の基礎を築いたのは誰か。", "a": "フロイト（Freud, S.）", "exp": "フロイトはシャルコーやジャネの催眠研究に学び、アンナ・Oの治療経験などを通じて、抑圧された無意識の葛藤が身体の麻痺などの症状として現れる「転換」の機序を見出した。"}, {"q": "生命現象はすべて物理的、化学的な過程に還元されうると、ヘルムホルツやデュボワ＝レイモン（Du Bois-Raymond, E.）などがとった立場を何と呼ぶか。", "a": "機械論（生体機械論）", "exp": "生命現象には物理化学等過程に還元されない不可思議な力が働いているとする生気論と呼び、ミュラーはこの立場を取ったが、その弟子であるヘルムホルツなどの機械論に取って代わられた。機械論は、心身二元論を否定する。"}, {"q": "ヘッケル（Haeckel, E.）が、進化論の影響を受けて唱えた反復説の考え方を、「個体発生は（　）を反復する」と表現したとき、空欄に入る用語は何か。", "a": "系統発生", "exp": "ヘッケルは、系統発生つまり進化の考え方を、個体発生に結びつけてとらえた。一方、個人差を進化に基づき「優秀」で解釈するなどの誤解にもつながった。"}, {"q": "ウェーバー（Weber, E. H.）によるウェーバーの法則に基づくと、200gのおもりの重さをだんだん増していって205gに達したときに重さの変化に気づいたとすると、400gのおもりから増していった場合に気づくのは何g増えたときか。", "a": "10g", "exp": "ウェーバーの法則は、基準刺激の強度を$I$、そこから強度を変化させた場合に変化に気づくことのできる強度変化の最小値を$\\Delta I$と置くと、以下の式で表現される。$\\Delta I / I = k$（$k$は同じ感覚であれば$I$の値にかかわらず一定：ウェーバー比）。本問では205gで気づいたので$\\Delta I = 5$、基準$I = 200$より、ウェーバー比は$5 / 200 = 1 / 40 = 0.025$となる。基準が400gであれば、$400 \\times 0.025 = 10$g となる。"}, {"q": "フェヒナー（Fechner, G. T.）が精神と身体との関係を追究する学問として着想した学問は何か。", "a": "精神物理学", "exp": "精神物理学は、物理学の一分野ではなく、精神の世界の心理量と、物理的な世界の物理量との関数関係を扱う。"}, {"q": "ウェーバー＝フェヒナーの法則で、刺激の物理量と心理量との関係はどのような関数で表現されるか。", "a": "対数関数（心理量は物理量の対数に比例する）", "exp": "ウェーバーの法則を積分するという着想から、心理量が物理量の対数関数で表現される法則が導出された。"}, {"q": "極限法、恒常法、調整法のうち、だんだん小さい環境へと進めていって切れ目の向きがわからなくなるまで行う視力検査のやり方に最も近いのはどれか。", "a": "極限法", "exp": "ランドルト環による視力検査は、容易なものから始め、弁別不可能になるまで進めて閾値を得る極限法に相当する。恒常法、調整法とともに、フェヒナーの時代からある測定法である。"}, {"q": "マグニチュード推定法を用いた知見から、べき関数によって物理量と心理量との関係が表現されるべきと主張した米国の心理学者は誰か。", "a": "スティーブンス（Stevens, S. S.）", "exp": "スティーブンスは音響心理学を専門とし、べき法則のほか、4種の尺度水準の考え方の提唱でも知られている。"}, {"q": "1879年にヴント（Wundt, W。）が世界初の心理学実験室を開設した大学はどこか。", "a": "ライプツィヒ大学", "exp": "大学において学問分野としての心理学の位置が認められたといえることから、これを心理学の始まりと考えることが多い。心理学発祥の地として知られる。"}, {"q": "ヴントの生理学的心理学で用いられた、意識内容を実験参加者自身で観察、分析する研究手法を何と呼ぶか。", "a": "内省法（実験的内省法）", "exp": "ヴントは、意識を構成要素に分解して分析する要素主義や、自らの心の状態を観察して報告させる内省法（実験的内省法）を用いた。"}, {"q": "ブレンターノ（Brentano, F。）が提唱した、意識の内容よりも過程を重視し、指向性などの概念を見だした心理学の分野を何と呼ぶか。", "a": "作用心理学", "exp": "ブレンターノは、心的内容を研究するのは心理学ではなく現象学であると考えて、心的内容へ向かう過程としての心的作用への関心を向けた。"}, {"q": "ブレンターノの影響を受けて、思考を実験的手法で研究したことに特徴のある、キュルペ（Külpe, O。）やアッハ（Ach, N。）による学派を何と呼ぶか。", "a": "ヴュルツブルク学派", "exp": "ヴュルツブルク大学に心理学実験室を開設したキュルペを中心に始まったことからこの名がある。思考研究を適切に行うため、当時にしては珍しく、実験者と実験参加者とが別であるような実験手法を用いた（系統的実験的内省法）。"}, {"q": "ヴントが、高次の精神機能や文化、あるいは動物や幼児の内面的過程は実験心理学的には扱えないと考えて、その代わりに用いるべきとした人文学的な手法による心理学を何と呼ぶか。", "a": "民族心理学", "exp": "今日の視点から見れば、心理学というよりは文化人類学に近い手法である。なお、文化人類学の誕生は1922年とされることが多く、これはヴントの没後である。"}, {"q": "キュルペ、ティチナー（Titchener, E. B.）、ホール（Hall, G. S.）、エビングハウス、ウィトマー（Witmer, L.）、ベヒテレフ（Bekhterev, V. M.）、松本亦太郎のうち、ヴントの下で学んだとはいえないのは誰か。", "a": "エビングハウス", "exp": "ヴントの下には遠く米国や日本からも人材が集まり、世界中へ心理学を広めていった。臨床心理学のウィトマー、発達心理学のホール、広告心理学のスコット（Scott, W. D.）など、心理学の新たな領域を開拓した者も数多い。ヴントが「心理学の父」とされるのはこのような寄与にもよる。"}, {"q": "神経学者シャルコー（Charcot, J.-M.）が医長となり、神経疾患や生体磁気説に基づく催眠の研究を展開した病院はどこか。", "a": "サルペトリエール病院（サルペトリエール学派）", "exp": "シャルコーは、パリにあるこの病院で神経学を発展させ、催眠研究ではサルペトリエール学派を形成した。フロイトも訪れてシャルコーから催眠療法を学んだ。後に、隣に移転していた病院と合併し、改称している。"}, {"q": "幻覚や麻痺などの症状に苦しみ、内科医ブロイアー（Breuer, J.）の治療を通して軽快したことが、フロイト（Freud, S.）が精神分析を着想する手がかりとなったとされる、当時21歳の女性の症例の名前は何か。", "a": "アンナ・O（アンナ・Oの症例）", "exp": "この症例は、フロイトとブロイラーとの共著である『ヒステリー研究』で報告された。無意識内容の意識化に治療効果があると考えたことが、自由連想法の開発へとつながったと考えられている。"}, {"q": "睡眠中に形を変えて現れる、無意識へと抑圧されたものの解釈について論じた、1900年に公刊されたフロイトの著書は何か。", "a": "『夢判断』（『夢解釈』）", "exp": "事例研究から、夢に無意識の願望が充足される機能があると主張し、このような夢分析は精神分析の主要な技法の一つとして発展した。"}, {"q": "フロイトが、自殺の精神分析学的理解や第一次世界大戦の影響のために考案した、死へと向かおうとする欲動の概念を何というか。", "a": "死の欲動（タナトス、デストルドー）", "exp": "フロイトは当初、エロスと表現した生の欲動を、自我を動かすものとして考えていたが、対になる死の欲動を足して、二元論的な思想へと発展させた。"}, {"q": "フロイトと親交のあった精神科医で、国際精神分析協会の初代会長となるものの数年で精神分析から離反し、錬金術や曼荼羅に注目して独自の心理学を作り上げたのは誰か。", "a": "ユング（Jung, C. G.）", "exp": "ユングの拓いた世界は精神分析学とは区別され、分析心理学、あるいはそのままユング心理学と呼ばれる。日本には河合隼雄が、箱庭療法と関連づけつつ定着させた。"}, {"q": "アンナ・フロイト（Freud, A.）とクライン（Klein, M.）との間で起こり、イギリスの精神分析界を二分するほどとなった論争で、論点になったのは何の方法論についてか。", "a": "児童分析", "exp": "アンナ・フロイトは、幼児に通常の精神分析的な解釈は適さないとし、親子並行面接を行ったが、クラインは遊びを自由連想に相当すると見て乳幼児への介入を行うべきであると主張した。"}, {"q": "鏡像段階、対象a、シェーマLなどの独自の述語や数式風の表現を用いた理論を唱え、フロイトの正統な後継者だと主張したフランスの現代思想家は誰か。", "a": "ラカン（Lacan, J.）", "exp": "ラカンは、「フロイトに還れ」と唱え、自我心理学などの流派を批判しつつ、精神分析学を構造主義的な発説から解釈し、フランス現代思想に大きな影響を与えた。"}, {"q": "1890年に公刊された、ジェームズ（James, W.）の心理学としての主著で、心理学的な自己や自我、習慣、意識の流れなどが論じられた著書は何か。", "a": "『心理学原理』", "exp": "『心理学原理』は、ヨーロッパですら心理学が始まったばかりの頃に書かれたものである。ジェームズは後に、同じく米国のデューイ（Dewey, J.）などとともに、プラグマティズムの哲学者として活躍することになる。"}, {"q": "クラーク大学の総長であったホール（Hall, G. S.）が設立の呼びかけに参加して初代会長となった、1892年に設立された学会は何か。", "a": "アメリカ心理学会（APA）", "exp": "アメリカ心理学会は、1892年に約30名の会員で発足し、今では会員数12万人を抱える世界最大の心理学の学会となっている。"}, {"q": "ヴントに学んだティチナーの、意識を要素へと還元することをめざす構成心理学に対して、同時代のアメリカ心理学の主流であった、意識の適応性や習慣に関心を向ける心理学の分野は何と呼ばれるか。", "a": "機能心理学（機能主義心理学）", "exp": "ティチナーは、米国に渡ってヴントの心理学を推し進めたが、主流にはなれなかった。機能心理学は、適応行動への関心から、行動主義が誕生し定着していく下地を作った。"}, {"q": "動機づけ（ないしは覚醒のレベル）と学習成績との関係は、難易度に応じて下図のように描かれるとした法則を、考案者2名の名前を取って何と呼ぶか。\n[図：逆U字型の曲線グラフ。最適な覚醒水準が、難しい課題では低く、簡単な課題では高い位置にある図]", "a": "ヤーキス＝ドッドソンの法則", "exp": "ヤーキス（Yerkes, R. M.）は、チンパンジーやゴリラを対象とした比較心理学的研究や、常初の非言語性の知能検査を含む陸軍知能検査の開発を行った。社会的促進・社会的抑制の説明に用いられる。"}, {"q": "試行錯誤学習の研究でも知られるソーンダイク（Thorndike, E. L.）が主導した、児童への学習指導の効果を定量化して用いていこうという運動を何と呼ぶか。", "a": "教育測定運動（心理測定運動）", "exp": "ソーンダイクは、シカゴ学派と並ぶ機能心理学の主要な学派であるコロンビア学派に属し、学習研究を行った。問題箱と呼ばれる装置を用いての試行錯誤学習の研究や、教育効果や適応性を定量化して活用することを推進した。"}, {"q": "パヴロフ（Pavlov, I. P.）が消化腺の研究を行う中で、今日でいうレスポンデント条件づけを発見したのは、どのような動物でのことか。", "a": "イヌ", "exp": "餌と音との対提示を反復することで、音のみに対して消化液の一種である唾液が分泌されるようになることを発見した。ヒト以外の動物も等しく研究できる。"}, {"q": "動物の弁別学習の手続きで、弁別の難易度をほぼ不可能なレベルまで上げていくと、異常行動が生じ条件反射が損なわれる現象は何と呼ばれるか。", "a": "実験神経症", "exp": "当時は、精神病ほどには重くない心の問題を神経症と呼んで区分していたが、パヴロフはこの現象を、ヒトの神経症に相当する問題であると考えた。ヒトの精神疾患を他の動物で報告する動物モデルの考え方の先駆である。"}, {"q": "論文「行動主義者のみた心理学」を1913年に発表し、科学としての心理学は客観的に観察可能な行動を研究対象とすべきだと論じた心理学者は誰か。", "a": "ワトソン（Watson, J. B.）", "exp": "ワトソンはこの論文で、自然科学としての心理学は内観ではなく客観的な行動を扱うべきとし、行動の予測と制御を目標に位置づけ、ヒト以外の動物も等しく研究対象としていくことなどを論じた。"}, {"q": "操作主義の思想の影響を受けて現れた新行動主義の考え方で、刺激と反応との関係を下図のように表現した場合、Oがさすものは何か。\n[ 刺激（S） ➔ O（有機体） ➔ 反応（R） ]", "a": "有機体（生活体）", "exp": "物理学者ブリッジマン（Bridgman, P. W.）による操作主義によれば、操作的定義を与えれば直接に見えないものも科学の対象となる。ここから、観察可能なものの相関によるS-R図式ではなく、organismの頭文字からOと表記される、生活体内に仮定される概念を組み入れたS-O-R図式を用いる新行動主義を発展した。"}, {"q": "新行動主義のうち、反射のような微視的な行動とは区別して、大きな意味での行動をとらえようとしたトールマン（Tolman, E. C.）の立場を何と呼ぶか。", "a": "目的的行動主義", "exp": "トールマンは、従来の行動主義の想定よりも巨視的な、目的へと向かう行動に焦点を当てた。迷路学習実験から、サイン・ゲシュタルト説を唱えた。"}, {"q": "著書『生体の行動』でオペラントという用語を導入し、オペラント条件づけをレスポンデント条件づけと区別したのは誰か。", "a": "スキナー（Skinner, B. F.）", "exp": "スキナーは、刺激に誘発されるレスポンデント行動と、自発されるオペラント行動とを区別し、後者に関する条件づけの研究を、理論的にも実践的にも発展させた。"}, {"q": "ゲシュタルト心理学は大きく2学派に分かれるが、ウェルトハイマーらが属したベルリン学派と、もう一つは何か。", "a": "グラーツ学派", "exp": "ベルリン大学のウェルトハイマー（Wertheimer, M.）などによることからこの名がある。"}, {"q": "心理学にゲシュタルトという用語を導入した、グラーツ学派の代表的な心理学者は誰か。", "a": "エーレンフェルス（Ehrenfels, C.）", "exp": "当時オーストリアのグラーツにいたエーレンフェルスが、1890年に公刊された論文で初めて用いたとされる。ゲシュタルトとは、ドイツ語で形を意味する。"}, {"q": "プレグナンツの原理による知覚のゲシュタルト要因のうち、下図で同じ色のものどうしが斜め方向にそれぞれまとまって見えることに対応する要因は何か。\n[図：赤と黒のドットが斜め格子状に並び、同色がグループに見える図]", "a": "類同の要因", "exp": "ベルリン学派による視知覚の研究は、さまざまな知覚のゲシュタルト要因を見いだした。同じようなものどうしがまとまる類同の要因、距離の近いものどうしがまとまる接近の要因、閉じた形になるようにまとまる閉合の要因などがある。\n[図1.11 閉合の要因（カッコ記号 [ ] や ( ) がペアに見える図）]"}, {"q": "ケーラー（KÖhler, W.）がチンパンジーの実験で見い出した、行動主義の考え方では説明しにくい学習は何か。", "a": "洞察学習", "exp": "ケーラーは、チンパンジーなどの問題解決行動を研究し、『類人猿の知能試験』にまとめた。洞察学習は、試行錯誤を経ずに一度で起こり、行動主義とはなじみにくい。"}, {"q": "ケーラーの心理物理同型説、レヴィン（Lewin, K.）の生活空間理論や集団力学に影響を与えた、理論物理学者マックスウェル（Maxwell, J. C.）などによる物理学の考え方は何か。", "a": "場理論（場の古典論）", "exp": "19世紀には電界と磁界とが電磁場という形で物理理論上で統一された。場理論は、人間の内外の世界を科学的に整理するために、しばしば心理学にも援用されてきた。"}, {"q": "行動は人と環境との関数であるとして、$B=f(P \\cdot E)$ という式に表現したゲシュタルト心理学者は誰か。", "a": "レヴィン（Lewin, K.）", "exp": "考案者の名からレヴィンの式とも呼ばれる。行動$B$はその人の内的要因$P$と周囲の環境$E$との相互作用によることを示した。"}, {"q": "鎖につながれていた精神病者の解放や人道療法に取り組む、「近代精神医学の父」とされることもあるフランスの精神医学者は誰か。", "a": "ピネル（Pinel, P.）", "exp": "ピネルは、精神病者が犯罪人や浮浪者などとともに精神障害施設に収容されていた時代に、人道的治療の改革を推し進めた。"}, {"q": "クレペリン（Kraepelin, E.）によって確立された、外面に現れる徴候を子細に観察し、体系的な分類や予後の把握へつなげる精神医学の立場を何と呼ぶか。", "a": "記述精神医学", "exp": "クレペリンはこのような立場から、今日でいう統合失調症と双極性障害とに当たる区分を導いた。「近代精神医学の父」という表現は、クレペリンをさすこともある。"}, {"q": "ウィトマーが、1896年にペンシルヴァニア大学に設立した機関と、1907年に創刊して「臨床心理学」という用語を初めて冠した論文を載せた学術誌との名称は同一であるが、何という名前か。", "a": "心理学的クリニック（心理クリニック）", "exp": "ウィトマーはヴントの教え子であるが、米国へ帰国し、子どもの問題に対する支援を行う中で、臨床心理学という用語を用いて、思弁や実験室ではない、臨床現場からの心理学を唱えた。"}, {"q": "精神病院への入院体験を『わが魂にあうまで』にまとめたビアーズ（Beers, C. W.）によって始められた、精神病者の理解や処遇改善を求める運動は何か。", "a": "精神衛生運動", "exp": "『わが魂にあうまで』は広く読まれ、ジェームズやホールなど、有力な心理学者からの支援の下で、コネチカット州精神衛生協会の設立に至った。ここから、精神衛生運動は世界へと広がっていった。"}, {"q": "第一次世界大戦において、身体的負傷はないにもかかわらず精神的な不調を来す兵士の報告が増加したが、この症状をマイヤーズ（Myers, C. S.）は何と呼んだか。", "a": "砲弾ショック", "exp": "当時は、砲弾の爆発による衝撃が神経系などに悪影響を生じたものと理解されていた。心的外傷後ストレス障害という診断名が登場したのは、ベトナム戦争を経て、1980年に発表されたDSM-IIIでのことである。"}, {"q": "カウンセリングの源流となったと考えられている、米国における3種の運動は、精神衛生運動、教育測定運動と、もう一つは何か。", "a": "職業指導運動", "exp": "職業選択を支援しようと展開された。ロジャーズ（Rogers, C. R.）のものと異なり、指示的カウンセリングに相当する形をとった。"}, {"q": "日本において、精神病者を「座敷牢」に監置することを禁じ、戦後の精神保健福祉の出発点となった法律は何か。", "a": "精神衛生法", "exp": "制定当時は福祉の観点は薄く、後の改正で精神保健法、精神保健福祉法と変わるにつれて、精神保健福祉の体制が整えられていくことになる。"}, {"q": "遺伝や能力の個人差の研究に幅広く取り組み、相関係数の概念を考案したことでも知られるイギリスの人類学者は誰か。", "a": "ゴールトン（Galton, F.）", "exp": "ゴールトンは統計的な手法でさまざまな研究を行った。今日では単に相関係数と表現されることの多い積率相関係数を考案したピアソン（Pearson, K.）は教え子である。"}, {"q": "ロンブローゾ（Lombroso, C.）が唱えた、犯罪者には頭蓋骨の形状などに類人猿寄りの特徴があり、彼らは劣った形質ゆえに文明社会に適応できず、なるべくして犯罪者になるといる説は何か。", "a": "生来性犯罪者説（生来的犯罪人説）", "exp": "ロンブローゾは、進化論を取り入れての犯罪者研究を行った。実際に頭蓋骨の測定を行うなどして実証を図ったが、この説は後世の研究によって否定されている。"}, {"q": "芸術家や政治家など、傑出した才能を発揮した歴史上の人物について、精神病理の観点からその創造性の解釈を図る学問は何か。", "a": "病跡学", "exp": "作品や事績をたどり、精神病理は単なる悪ではなく、他の大多数の人が得られない創造性をもたらす側面があることを浮かび上がらせる人文学的な研究領域である。"}, {"q": "ビネーとシモン（Binet, A. & Simon, T.）が1905年に発表したビネー・シモン式知能検査で、結果として示される数値は何か。", "a": "精神年齢", "exp": "この検査は、何歳程度の知的能力があるかを測定した。これと実際の年齢である生活年齢との比から、知能指数が計算されるようになったのは、米国でスタンフォード・ビネー式知能検査へと改訂されてからである。"}, {"q": "近代を迎えた人々が、付和雷同し衝動や感情に流され、断言や反復を用いる為政者に操られるさまを描いた、1895年に公刊されたフランスの心理学者ル・ボン（Le Bon, G.）の著書は何か。", "a": "『群衆心理』", "exp": "医師でもあったル・ボンは、フランス革命の混乱などを分析し、群衆の無限定性や凶暴さ、感染と表現される影響過程を批判的に描き出した。"}, {"q": "社会心理学の初めての実験とされるトリプレット（Triplett, N.）の実験は、今日では何と呼ばれている現象を扱ったものか。", "a": "社会的促進", "exp": "他者の存在が課題遂行を促進するのが社会的促進で、成績を落とす方向に生じる場合は社会的抑制と呼ばれる。"}, {"q": "マクドゥーガル（McDougall, W.）による集団の考え方を、オールポート（Allport, F. H.）が批判して呼んだのは何か。", "a": "集団意識（集団心）", "exp": "オールポートは、集団が形成されても意識は個々人にしかないとして、集団そのものが心を持つようにとらえる集団心の考え方は誤りだと論じた。"}, {"q": "応用心理学的な研究を広く行い、1913年に公刊された著書「心理学と産業効率」などから「産業心理学の父」とされることのある心理学者は誰か。", "a": "ミュンスターベルク", "exp": "ミュンスターベルクは、ヴントの教え子であるが、人材選抜や仕事効率などの産業心理学的なテーマを多く扱った。目撃証言の信用性に関する初期の研究者でもある。"}, {"q": "レヴィンらによるアイオワ研究で、民主型、専制型、放任型のうち最も好ましい結果が得られたリーダーシップの類型はどれか。", "a": "民主型", "exp": "ベルリン大学の教授であったレヴィンは、ナチス政権の成立を受けて米国へ脱出し、この実験を行った。専制型リーダーも成果を上げるが、士気を保つことが難しく、民主型のほうが優れるという結果を得た。"}, {"q": "欲求や価値、動機づけが知覚に与える影響や、サブリミナル提示などを取り上げ、1950年代に多くの実験が行われた心理学の分野は何と呼ばれるか。", "a": "ニュールック心理学", "exp": "精神分析学が存在を仮定した無意識の世界が実験的に検証できると期待されて流行した。実験社会心理学の発達や認知心理学の登場を準備したと考えられている。"}, {"q": "人工知能のダートマス会議が開催され、ミラー（Miller, G. A.）の認知容量の論文やブルーナー（Bruner, J. S.）の『思考の研究』が公刊されるなどして、「認知革命」の年とされることがある年は西暦何年か。", "a": "1956年", "exp": "1956年夏にダートマス大学で議論を展開した若者たちが、後の認知科学を牽引した。ミラーの論文は、「マジカルナンバー7±2」という表現で知られ、短期記憶の容量をこう明言したように理解されることもある。"}, {"q": "普遍文法の生得性を仮定する変形-生成文法理論を提唱し、言語学の立場から行動主義を批判したのは誰か。", "a": "チョムスキー（Chomsky, N.）", "exp": "ダートマス会議にも参加していたチョムスキーは、言語運用ではなく言語能力に着目し、内的な深層構造を想定する文法理論を生み出して注目されることになる。"}, {"q": "用いる言語によって思考や認識が規定されるという考え方を、提唱した2名の言語学者の名を取って何と呼ぶか。", "a": "サピア＝ウォーフの仮説", "exp": "言語相対性仮説とも呼ばれる。実証研究は、言語が完全に規定するとまではいかないものの、影響を与える面があるという「弱い仮説」には一定の支持を与えている。"}, {"q": "1967年に公刊した著書「認知心理学」で、情報処理的アプローチによる心理学的研究を体系化し、認知心理学という用語を定着させたのは誰か。", "a": "ナイサー（Neisser, U.）", "exp": "認知心理学という表題の書籍は、すでに1939年には出ていたが注目されず、ナイサーによるこちらのものが、内容的にも今日の認知心理学によく当てはまるもので、広く読まれることとなった。"}, {"q": "「心理学」という訳語を初めて用いたのは誰か。", "a": "西周", "exp": "「心理学」は、ヘヴン（Haven, J.）の mental philosophy に対する訳語として考案されたが、後に psychology に対する訳語となり、定着した。"}, {"q": "元良勇次郎が1903（明治36）年に日本初の心理学実験室を設置した大学はどこか。", "a": "東京帝国大学（現在の東京大学）", "exp": "単に帝国大学という学校名だった時代に元良勇次郎が着任し、ジェームズの心理学が伝えられた。戦後の学制改革で東京大学となっている。"}, {"q": "1927（昭和2）年に松本亦太郎が初代会長となって設立された学会は何か。", "a": "日本心理学会", "exp": "日本で最も権威ある心理学の学会とされ、今日では毎年数千人の参加者を集める学会大会のほか、認定心理士の資格制度を運営するなど、広く活動している。"}, {"q": "日本の心理学の学会のうち、第二次世界大戦より前に設立され今なお続いているものは、日本心理学会、日本動物心理学会と、あと一つはどこか。", "a": "日本応用心理学会", "exp": "国内各地域での研究者の集まりに源流があり、日本応用心理学会と名乗っての活動は1936（昭和11）年からである。"}, {"q": "ビネー式知能検査の日本語版は、他に鈴木ビネー、武政ビネーなども作られたが、田中寛一によるものは東日本を中心に広く定着し、現行版は2003年に発行された田中ビネー知能検査Vである。この知能検査の開発者は誰か。", "a": "田中寛一", "exp": "ビネー式知能検査の日本語版は、他に鈴木ビネー、武政ビネーなども作られたが、田中寛一によるものは東日本を中心に広く定着し、現行版は2003年に発行された田中ビネー知能検査Vである。"}], "第2章_学習・認知・知覚": [{"q": "イヌを使った実験で、古典的条件づけと呼ばれる学習を発見したロシアの生理学者は誰か。", "a": "パヴロフ（Pavlov, I. P.）", "exp": "パヴロフは、イヌにメトロノームの音を鳴らした後に餌を与えることを繰り返すと、音を聞いただけで唾液が分泌されることを発見した。これを古典的条件づけ、またはレスポンデント条件づけという。"}, {"q": "古典的条件づけにおいて、イヌが餌に対して唾液を分泌するような、生得的な反応のことを何というか。", "a": "無条件反応（UR）", "exp": "イヌに条件づけをしなくても、餌には唾液を分泌するという条件に反射を引き起こす。このような刺激のことを無条件刺激（US）という。無条件刺激に対する反応を無条件反応という。"}, {"q": "古典的条件づけに関して、イヌが音を聞いただけで唾液分泌をするなど、条件づけで形成された反応のことを何というか。", "a": "条件反応（CR）", "exp": "餌とは無関係な刺激（中性刺激）であるメトロノーム音が、条件づけによって、餌を予告する信号（条件刺激（CS））となる。"}, {"q": "古典的条件づけの形成後、餌を与えずに条件刺激だけを提示し続けると、イヌはやがて唾液分泌をしなくなる。この現象を何というか。", "a": "消去", "exp": "図の(a)の期間が条件づけ、(b)の期間が消去。唾液分泌がなくなるまで古典的条件づけを消去した後も、実験を休止し、その後、再度条件刺激を提示すると、また多少唾液分泌が見られる現象を「自発的回復」という。図の(c)の期間が自発的回復に当たる。"}, {"q": "条件刺激と無条件刺激の組合せにおいて、生得的に条件づけが容易な組合せがある。このことを何というか。", "a": "準備性", "exp": "条件づけが困難な組合せのことを反準備性というのに対し、生得的に条件づけが容易な結合関係が存在する。"}, {"q": "助手のレイナー（Rayner, R.）とともに生後11か月の男児に対する恐怖反応の条件づけを行った米国の心理学者は誰か。", "a": "ワトソン（Watson, J. B.）", "exp": "ワトソンは、生後11か月の男児（アルバート坊や）にネズミを見せ、背後で不意に大きな音を出して泣かせるという条件づけを繰り返した。その後、ネズミを見ると、男児は強い恐怖反応を示すようになった。"}, {"q": "有機体の、特定の誘発刺激がなくても自発した行動に強化刺激を随伴させ、その反応頻度などを変化させる過程や条件づけの操作のことを何というか。", "a": "オペラント条件づけ（道具的条件づけ）", "exp": "オペラント条件づけはソーンダイクによって初めて実験的に検討された。"}, {"q": "バンデューラ（Bandura, A.）は、人形を用いた実験で、他者の行動を直接的に、またはビデオなどで見ることによって、学習が成立することを示した。このような学習を何というか。", "a": "観察学習", "exp": "モデリングとも呼ばれる。バンデューラの古典的な実験では、大人が攻撃的な行動をとるのを直接的に見た、または、大人の攻撃行動を録画した映像を見た子どもは、攻撃行動を多く示すことが見いだされた。"}, {"q": "もともとレパートリーにない、新しいオペラント行動を形成する方法の一つであり、まず、目標とする反応に近い反応を条件づけ、段階的に目標となる反応に近づけていくという方法を何というか。", "a": "シェイピング", "exp": "反応形成ともいう。ネズミにレバー押しを条件づける場合、まず、ネズミがバーのほうに近づく反応を、餌を与えて強化し、次にバーに前足で触れる反応をすれば餌を与えて強化するといった方法で段階的に条件づけを行う。"}, {"q": "トールマン（Tolman, E. C.）は、ネズミの迷路学習の実験において、ネズミは迷路が学習時と変化しても、目的地に到達できたことから、ネズミは（　）という空間関係の表象を形成しているとした。空欄に当てはまる語句は何か。", "a": "認知地図", "exp": "この実験は潜在学習の実験と呼ばれる。潜在学習とは行動の遂行に直接的には表れない学習のことをいう。トールマンとホンジック（Tolman, E. C. & Honzik, C. H.）は、ネズミをゴールに餌を置く第1群と、餌を置かない第2群、初めは餌なしで11日目から餌を置く第3群に分けた。実験の結果、11日目までは、第1群に比べて、第2群と第3群の誤答数は多かったが、12日以降、第3群は第1群と同程度の成績を示した。この結果は、ネズミは餌によって認知地図を学習した成果を示したと解釈された。"}, {"q": "オペラント条件づけにおいて、オペラント行動の自発頻度と比較して、反応に随伴した後続の結果によって、その反応の生起確率が増えた場合の過程、および、操作のことを何というか。", "a": "強化", "exp": "たとえば、イヌに「お手」を教える場合、「お手」という言語刺激に対して、イヌが片方の前足を上げる反応を示せば、餌などの報酬を与える。このとき、餌は強化子といい、前足を挙げることに対して餌を与えること、つまり、特定の反応の頻度を高める操作を強化という。"}, {"q": "オペラント条件づけにおいて、オペラント行動の自発頻度と比較して、反応に随伴した後続の結果によって、その反応の生起確率が減った場合の過程、および、操作のことを何というか。", "a": "弱化（罰）", "exp": "たとえば、いたずらをした子どもを強く叱ることで、いたずらが減っていく操作が挙げられる。"}, {"q": "スキナー（Skinner, B. F.）は、オペラント条件づけにおいて、反応をどのタイミングで強化することで、どのような強化のされ方が生じるかという規則について検討した。この規則のことを何というか。", "a": "強化スケジュール", "exp": "強化スケジュールには、反応がときどきしか強化されない部分強化と反応が毎回強化される連続強化などの種類がある。"}, {"q": "オペラント条件づけは、下表のように4つの型に分類される。①〜④に当てはまる語句は何か。\n[表：行動が増加/減少 × 刺激が提示/除去]", "a": "①：正の強化\n②：正の弱化\n③：負の強化\n④：負の弱化", "exp": "行動が増加する場合は強化、行動が減少する場合は弱化（罰）である。①は、たとえば、ネズミがレバーを押すと餌が与えられる場合が当てはまる。②は、子どもがいたずらをして叱られると、いたずらの頻度が減る場合が当てはまる。③は、テストで良い点を取れば母親から怒られないから、テストで良い点を取れるように勉強するケースが当てはまる。負の強化には、逃避学習と回避学習（逃避行動、回避行動ともいう）がある。④は、子どもがいたずらをしてテレビを見せてもらえなくなると、いたずらをする頻度が減る場合が当てはまる。"}, {"q": "新行動主義者のハル（Hull, C. L.）は、生体は動因によって行動を始め、動因が満たされることで行動を終結し、強化されると考えた。この説を何というか。", "a": "動因低減説", "exp": "ソーンダイクに続く連合理論的な学習理論に、動機づけの概念を取り入れて体系化したのがハルである。ハルは、生命を維持するために、行動を引き起こすものを動因と呼んだ。たとえば、空腹なネズミは飢えの動因が生じており、その動因に駆られて特定の反応を行うと餌がもらえる。そして、餌によって、飢えの動因は低減する。このように、動因の低減を伴った特定の反応は、その低減量の分だけ学習されると、ハルは主張した。"}, {"q": "強化スケジュールは、回数や時間が固定されているのか、それとも変動するのかという点と、強化の反応回数によるものかの組合せによって決定され、下表に示される代表的な4パターンに分類される。下図は各種のスケジュールにおける強化時と消去時の典型的な反応パターンを示している。A〜Dの名称は何か。", "a": "A：変動比率（VR）スケジュール\nB：定比率（FR）スケジュール\nC：変動間隔（VI）スケジュール\nD：定間隔（FI）スケジュール", "exp": "変動比率スケジュールは、反応率が非常に高く、消去しにくいという特徴を持つ。定間隔スケジュールでは強化が近づくと反応が増えていく。強化直後はしばらく反応せず、徐々に反応が増えていく。このような反応の出現にむらがある現象をスカロップという。\n【定比率】一定の決まった反応回数に対して強化が与えられる。たとえば、ネズミが10回レバーを押すごとに、餌が与えられる（FR10と表現される）。\n【変動比率】一定の決まった反応回数に対して強化がえられるのではなく、平均してある回数の反応のたびに強化が与えられ、その回数は不規則に変化する。たとえば、VR10の場合、平均すると10回に1回の割合で強化が与えられる。つまり、10回目に強化される場合もあるし、6回目に強化されることもある。\n【定間隔】前の強化から、一定の決まった時間が経過した後の最初の反応が強化される。たとえば、FI10では、ある反応が強化されてから10分経過した後の最初の反応を強化する。\n【変動間隔】前の強化から、設定した時間間隔が経過してから最初の反応に対して強化を与えるが、その間隔の設定は不規則に変化する。たとえば、VI10では、前の強化から、平均して10分経過した最初の行動を強化する。"}, {"q": "古典的条件づけがなされたイヌは、条件刺激と物理的に似た別の刺激を提示された場合でも唾液を分泌するようになる。この現象を何というか。", "a": "般化（刺激般化）", "exp": "音の高さが異なるメトロノームの音を聞いても、唾液を分泌するようになる。このように、最初の条件づけ時に提示された刺激と異なる刺激に対しても条件づけの効果が広がることを般化という。般化の量は、提示された条件刺激との類似度に比例する（刺激般化勾配）。"}, {"q": "オペラント条件づけにおいて、赤い光が点灯したときにネズミがレバーを押せば餌がもらえるが、緑の光が点灯したときにはレバーを押しても餌がもらえないという手続きを繰り返すと、ネズミは赤い光のときのみレバーを押す反応を示すようになる。これを何というか。", "a": "弁別", "exp": "このような、類似した刺激から、特定の刺激だけに反応するようになることを弁別という。赤い光は弁別刺激と呼ばれる。"}, {"q": "ワトソンが主張した、学習の基本的単位は条件づけによって形成される刺激と反応の連合であるとする理論を何というか。", "a": "S-R理論", "exp": "ワトソンは、心理学は客観的に観察可能な行動のみを対象とすべきだとする行動主義を主張した。"}, {"q": "不適応な行動パターンを変容または除去し、適応的な行動を形成するために、オペラント条件づけ、および、古典的条件づけを、適用した心理療法のことを何というか。", "a": "行動療法", "exp": "行動療法では、不適応行動の背後に、無意識的欲求や抑圧などの存在を仮定せず、行動や行動を強化するような随伴性と環境要因に焦点を当てる。"}, {"q": "古典的条件づけの原理を適用し、不安や恐怖を段階的に消去するウォルピ（Wolpe, J.）が発展させた行動療法の一技法を何というか。", "a": "系統的脱感作法", "exp": "系統的脱感作法では、①クライエントに全身をリラックスする方法を訓練する。②不安階層表と呼ばれる、不安や恐怖を喚起させる状況の段階的なリストを作成する。③不安階層表に従い、不安のレベルが低い場面から順に、不安や恐怖を感じさせる状況や刺激をクライエントにイメージさせたり、提示したりして、その状況でクライエントがリラックスする訓練を行う。このように、不安を喚起させる場面でリラックスできるように条件づけていく。"}, {"q": "行動療法におけるオペラント条件づけの正の強化を応用した技法であり、適切な反応に対して、トークン（代用貨幣）を与え、目標とする行動の生起頻度を高めようとする技法を何というか。", "a": "トークンエコノミー", "exp": "例として、授業中に多動傾向が見られる児童に着席行動を形成する場合を挙げる。まず、授業時間中などの児童が着席すべき場面に10分間着席することができたときに、表に〇をつける。表の〇が10個たまったら、ごほうびとしてシール（トークン）がもらえる。このような手続きで、着席行動の改善を行う。"}, {"q": "古典的条件づけの消去を応用した行動療法の一種で、恐怖症患者を、強い不安や恐怖を生じさせる状況や刺激に、想像上、あるいは実際、さらす方法のことを何というか。", "a": "フラッディング", "exp": "曝露療法（ばくろりょうほう）の一種。曝露療法では、不安や恐怖の対象となる刺激に対して、体系的に直面させる。不安や恐怖を生じさせる刺激に曝露する時間が短すぎると、逆効果になることもある。"}, {"q": "下図のような、オペラント行動における、先行刺激（A）、オペラント行動（B）、結果（C）の関係を何というか。\n[先行刺激(A) → オペラント行動(B) → 結果(C)]", "a": "三項随伴性", "exp": "三項強化随伴性、英語の頭文字を取ってABCともいう。このようにA、B、Cの随伴関係を明らかにすることを行動分析という。授業場面を例に挙げると、教師が「この問題がわかった人は手を挙げてください」と指示することが先行刺激となる。これを受けて、問題を解いた児童が手を挙げて答えるという行動をとる。この行動に対して、教師や他の児童が評価するなどの反応が結果に当たる。この結果によって、同じような状況でその児童が問題を解いて挙手をする行動が安定的に起こる場合、個人と環境の間に良い相互作用が成立しているといえる。"}, {"q": "上記のモデルに基づき、「交差点で青になったら横断歩道を渡る」という行動を分析すると、Aの刺激は「青信号」、Bの行動は「横断歩道を渡る」、Cの強化は「安全に渡ることができる」、という関係がある。「赤信号」の刺激では、行動は強化されない。この例における、青信号と赤信号をそれぞれ何刺激というか。", "a": "青信号：弁別正刺激（S+）\n赤信号：弁別負刺激（S-）", "exp": "正の弁別刺激、負の弁別刺激ともいう。正の弁別刺激は、オペラント条件づけにおいて、ある反応が強化されることを意味する。一方、負の弁別刺激は、強化されないことを意味する刺激である。"}, {"q": "運動技能の獲得のことをさし、単一の行為や、複雑な動作を獲得する過程のことを何というか。", "a": "運動学習", "exp": "人間の学習は、認知的な学習（「わかるようになること」）と運動学習・技能学習（「できるようになること」）の2つに大きく分けることができる。運動学習の例として、自転車に乗ること、パソコンのタッチタイピング、スキーやスケートをすることなどが挙げられる。"}, {"q": "運動学習の研究では、練習の時間配分の影響が検討されてきた。短期的には、（ A ）学習のほうが（ B ）学習よりも遂行がよくなることが明らかにされている。空欄A・Bに当てはまる語句は何か。", "a": "A：分散\nB：集中", "exp": "長期間にわたって少しずつ練習を行う分散学習と、短期間にまとめて行う集中学習がある。分散練習、集中練習ともいう。短期的には、連続して練習するよりも、短い練習の間に休憩をとるほうがよいことが示されているが、長期的には分散学習と集中学習の間の差はなくなるとされる。"}, {"q": "運動学習の獲得のためには、学習者へのフィードバックが有効であり、フィードバックする情報によって、大きく2種類に分けられる。結果の良し悪しについての情報を（ A ）といい、遂行の内容についての情報を（ B ）という。空欄A・Bに当てはまる語句は何か。", "a": "A：結果の知識\nB：遂行の知識", "exp": "結果の知識は、KR（knowledge of results）、遂行の知識はKP（knowledge of performance）と呼ばれる。"}, {"q": "記憶には、下図のように、3つの過程がある。情報を頭に入れる（A）、その情報を保持する（B）、必要に応じてその情報を思い出す（C）の3段階に分けることができる。（A）（B）（C）に当てはまる語句は何か。\n[ A → B → C ]", "a": "A：符号化\nB：貯蔵\nC：検索", "exp": "符号化は記銘、貯蔵は保持、検索は想起と呼ばれることもある。たとえば、符号化とは「1879年に世界初の心理学実験室を開設したのはヴントである」と覚えることで、テストのときにその情報を思い出すのが検索である。覚えたときから思い出すまでの間、その情報が脳内に保持されており、これを貯蔵という。"}, {"q": "実験参加者にいくつかの単語などの刺激を見せ、それを覚えてもらい、その刺激を自由に思い出してもらうテストのことを何というか。", "a": "自由再生テスト", "exp": "自由再生テストに対して、テストの際に「この刺激は先ほど出てきた刺激ですか」と尋ねる場合のテストのことを再認テストという。"}, {"q": "下図のように、記憶テストで、提示された項目のリスト内で何番目に提示されたかによって、その項目の記憶成績が異なる。このような提示順序による効果のことを何というか。\n[図：U字型の位置効果曲線]", "a": "系列位置効果", "exp": "リスト内での提示順序のことを系列位置という。リスト内の最初の方に近い項目の記憶成績が高くなることを初頭効果といい、最後の方の項目の記憶成績が高くなることを新近効果（親近性効果）という。"}, {"q": "記憶を保持時間で区分したアトキンソンとシフリン（Atkinson, R. C. & Shiffrin, R. M.）の記憶のモデルを何というか。", "a": "二重（多重）貯蔵庫モデル", "exp": "アトキンソンとシフリンは、記憶を感覚記憶、短期記憶、長期記憶に区分した。感覚貯蔵庫（感覚登録器）では、保持できる情報は多いが、1秒程度しか保持できない。短期貯蔵庫（短期記憶）では、情報は15〜30秒程度保持されるが、保持できる情報量は限られている（→マジカルナンバー7プラスマイナス2）。長期貯蔵庫（長期記憶）では、長い場合では情報を一生涯保持できるとされる。"}, {"q": "短期貯蔵庫（短期記憶）の情報の保存容量には限界があり、この短時間の間、記憶することができる情報量の数のことを何というか。", "a": "マジカルナンバー7プラスマイナス2", "exp": "数字を何ケタまで保持できるのかをテストしてみると、成人の覚えられる数字のケタ数は、7ケタ±2とされている。つまり、平均7個の情報を短期記憶に保持できるとされる。"}, {"q": "情報をより長く保持させるために、短期記憶内で覚えるべき情報を何度も繰り返すことを何というか。", "a": "リハーサル", "exp": "記憶の二重（多重）貯蔵庫モデルによれば、短期記憶内においてリハーサルされることにより、長期貯蔵庫（長期記憶）に転送される。"}, {"q": "短期記憶を、情報を短期間保持するだけではなく、情報を処理する機能も備えていると考える記憶のモデルを何というか。", "a": "ワーキングメモリ（作動記憶）", "exp": "バドリーとヒッチ（Baddeley, A. D. & Hitch, G. J.）によって最初に提唱された。作動記憶とも呼ばれる。たとえば、本を読むときに、本の中の一部の文章の情報を保持し、長期記憶の知識を使って、その文章がどんな意味なのかを理解する。このように、ワーキングメモリはさまざまな情報処理を行う「作業場」として機能する。"}, {"q": "下図は、バドリー（Baddeley, A. D.）によるワーキングメモリの代表的なモデル図である。図中の空欄( )に当てはまるものは何か。\n[図：最上部にある( )から視空間、エピソード、音韻ループへ矢印]", "a": "中央実行系", "exp": "ワーキングメモリは、言語的・音韻的な情報の保持のための音韻ループ、視覚的情報の保持のための視空間的スケッチパッドが想定されており、それぞれ言語的、非言語的情報の一時的な貯蔵庫（バッファー）として機能するとされている。さらに、ワーキングメモリの中心的な役割を担う中央実行系がある。中央実行系はさまざまな情報処理を支える制御機能を持つ。"}, {"q": "ワーキングメモリにおいて、音韻ループ、視空間的スケッチパッド、長期記憶からの情報、知覚情報をまとまりのあるエピソードに統合することが可能な一時的貯蔵システムであると仮定されるものはどれか。", "a": "エピソードバッファー", "exp": "エピソードバッファーはワーキングメモリの概念が提唱された初期の段階では存在せず、2000年の論文で新たに追加されたシステムである。エピソードバッファーは音韻ループ・視空間的スケッチパッドとは異なり、感覚モダリティ（感覚様相）に依存せず、複数の情報源からの情報を統合し、保持する。つまり、エピソードバッファーは長期記憶とのインターフェイスのような役割を担う。"}, {"q": "長期記憶の一種であり、個人的な経験に関する情報の記憶のことをさす、「いつ」「どこで」という問いに答えられるような記憶のことを何というか。", "a": "エピソード記憶", "exp": "長期記憶の区分の一つに、想起意識があるか否かによる区分もある。想起意識のある記憶を顕在記憶、想起意識のない記憶を潜在記憶という。図2.3に示すように、エピソード記憶は顕在記憶に区分される。"}, {"q": "長期記憶の一種であり、言葉では表現することが難しい記憶のことを何というか。", "a": "手続き記憶（非宣言的記憶）", "exp": "手続き記憶には、暗算や会話などの認知的なものと、水泳や運転などの運動的なものがある。手続き記憶は、潜在記憶に区分される（図2.3）。"}, {"q": "言葉の意味や概念など、一般的な知識の記憶である長期記憶の一種のことを何というか。", "a": "意味記憶", "exp": "意味記憶は、潜在記憶に区分される（図2.3）。長期記憶の区分に、情報が言葉で表現できるかどうかの区分もあり、言語的な表現可能な記憶を宣言的記憶といい、不可能な記憶のことを非宣言的記憶という（図2.4）。意味記憶とエピソード記憶は、宣言的記憶に区分される。"}, {"q": "コリンズとロフタス（Collins, A. M. & Loftus, E. F.）によって提唱された意味記憶についての下記のようなモデルを何というか。\n[図：消防車、火、赤、りんご、さくらんぼなどのネットワーク図]", "a": "連想ネットワークモデル（活性化拡散モデル）", "exp": "このモデルでは、概念どうしが意味的な関連性によって結びついていると仮定する。また、活性化拡散という考え方も取り入れられている。意味記憶内のある概念が処理されると、その概念が活性化し、その概念と関連する他の概念にも活性化のエネルギーが広がっていくとする。"}, {"q": "厳密な条件統制の下で人間の認知過程の仕組みを明らかにしようとする実験室アプローチをとる認知研究に対して、より日常場面に近い状況における認知過程、あるいはその研究のことを何というか。", "a": "日常認知", "exp": "ナイサー（Neisser, U.）は、認知研究における生態学的妥当性の問題を指摘した。生態学的妥当性とは、研究手法や対象、実験状況が日常生活の場面にどの程度類似しているかを示す概念である。ナイサーは、実験室アプローチによる認知研究によって明らかにされてきた認知過程が、必ずしも日常の認知過程を反映しないと主張し、生態学的妥当性を重視した。"}, {"q": "幼少期の出来事や他者との思い出など、個人史上の出来事についての記憶であり、自己や個人のアイデンティティと密接に関連する記憶のことを何というか。", "a": "自伝的記憶", "exp": "生まれてから現在までの間で、どの時期の出来事をどのくらい思い出すかについては、10代後半から20代前半までの出来事を回想する割合が多くなることが報告されている。この現象をレミニッセンス・バンプという。ただし、実験手続きや実験対象者の年齢によってピークの位置が異なる場合もある。"}, {"q": "下図に示すように、3歳以前の自伝的記憶の想起量が非常に少ない現象を何というか。\n[図：3歳以前の想起割合が著しく低い曲線グラフ]", "a": "幼児期健忘", "exp": "シャインゴールドとテニー（Sheingold, K. & Tenney, Y. J.）は、弟や妹の誕生といった印象的な出来事でも、実験参加者が3歳未満のときに弟や妹が誕生した場合は、それはほとんど思い出されないことを報告している。"}, {"q": "人間行動において、あるいは行動しなかったことで生じた誤りのことを（ A ）という。（ A ）には、「アクセルとブレーキを踏み間違えた」という誤りのように、意図と結果が異なる場合の（ B ）や、「各駅停車だと思い込み、間違って快速電車に乗った」というように、意図そのものが状況の誤解などによりすでに誤りである場合の（ C ）などがある。空欄A〜Cに当てはまる語句は何か。", "a": "A：ヒューマンエラー\nB：スリップ\nC：ミステイク", "exp": "リーズン（Reason, J.）は、ヒューマンエラーを図2.5のように、意図しない行為と意図的行為の2つに分類した。ラプスとは、「薬を飲み忘れた」などの、実行段階における「し忘れ」のことをさす。\n【分類】ヒューマンエラー ─ 意図しない行為（スリップ、ラプス）／ 意図的行為（ミステイク）"}, {"q": "文字や図形、音声など、多くの異なった要素によって構成された対象を認識し、同定する能力のことを何というか。", "a": "パターン認識", "exp": "パターン認知ともいう。"}, {"q": "人間の長期記憶内に、パターンの原型を示すものがあり、それと入力された情報との照合によって、認識が生じるとするパターン認識のモデルを何というか。", "a": "雛型照合モデル（テンプレートマッチングモデル）", "exp": "鋳型照合モデルはパターン認識の代表的なモデルである。ただし、認識可能なパターンの数やその変形（大きさや傾き、字体などの変化）の多様性を考えると、膨大な量の鋳型が必要となる。それらすべてについての鋳型が長期記憶内に存在することは不可能であると考えられている。"}, {"q": "情報をいくつかの特徴によって構成されたものとしてとらえ、外部の刺激と、長期記憶内に貯蔵されている外部の刺激パターンの特徴リストが照合され、最も合致した特徴リストを持った情報が認識結果とされるとするパターン認識のモデルを何というか。", "a": "特徴分析モデル", "exp": "代表的な特徴分析モデルに、セルフリッジ（Selfridge, O. G.）のパンデモニウムモデルがある。パンデモニウムとは伏魔殿のことであり、情報処理モジュールを比喩的に示す「デーモン（悪魔）」の分業システムが仮定されている。①イメージデーモン、②特徴デーモン、③認知デーモン、④決定デーモンの4種類のデーモンが文字認識を行うとする。このモデルでは、イメージデーモンから送られてきた情報を、特徴デーモンが一度特徴に分けて分析し、その後、認知デーモンが各特徴を統合する。そして、決定デーモンが最終的な決定を行う。このように、パンデモニウムモデルでは、文字の認知はボトムアップ処理によってなされると仮定されている。"}, {"q": "下図では、中央の文字は縦に読むと13、横に読むとBと読める。このように、人間の情報処理において、知識や期待に基づいて、理解・判断していく情報処理を何というか。\n[図：縦に12,13,14 / 横にA,B,Cと読める中心の曖昧な文字]", "a": "トップダウン処理（概念駆動型処理）", "exp": "概念駆動型処理とも呼ばれる。縦に読む場合は中央の文字が、数字が書かれているという期待から13に見えるが、横に読む場合は、アルファベットが書かれているという期待からBに見える。このような現象を文脈効果という。"}, {"q": "人間の情報処理において、断片的な情報を寄せ集めながら処理をしていく過程のことを何というか。", "a": "ボトムアップ処理（データ駆動型処理）", "exp": "データ駆動型処理とも呼ばれる。入力情報の特徴を分析するという低次レベルの処理が行われ、その後、抽出された特徴を組み合わせてより高次なレベルの処理へと進む。トップダウン処理とは異なり、知識や期待に依存しない。"}, {"q": "意味を持った最小の言語単位のことを何というか。", "a": "形態素", "exp": "たとえば、「たべます」は「たべ / ます」に分けることができる。「たべ」は食べるという動作を、「ます」は丁寧さを表す。"}, {"q": "アルファベットや平仮名などのような、それぞれの音素、音節という音韻情報を表す文字を何というか。", "a": "表音文字", "exp": "アルファベットの「a」「w」や、平仮名の「わ」「ん」は、その音を表すものであり、その文字に意味を持たない。一方、数学記号のように、各文字の意味は明確であるが、読み方が明確でない文字を表意文字という。"}, {"q": "漢字などのような、一つの文字が語、あるいはその要素である形態素に対応する文字を何というか。", "a": "表語文字", "exp": "漢字は、一つの文字に意味を持つ。"}, {"q": "個人の脳内に存在するとされる、語に関する知識の全体のことを何というか。", "a": "メンタル・レキシコン（心的辞書）", "exp": "心的辞書や心内辞書と訳されることもある。メンタル・レキシコンは、発話や文章理解において重要な役割を果たす。"}, {"q": "文字列を視覚的に提示し、それが単語か単語でないかを判断させる課題を何というか。", "a": "語彙判断課題", "exp": "課題では、単語と「ぎてみ」などの非単語（存在しない単語）を提示する。出現頻度の高い単語のほうが、低い単語よりも早く判断される。この現象を単語頻度効果（単語の出現頻度効果）という。"}, {"q": "ある主張や仮説が正しいことを前提としたときに、その前提から論理的に正しい結論を導き出す際の推論のことを（ A ）推論という。一方、観察した個々の事実や事実や事象に基づいて、それらを生じさせている原因や法則を推理することを（ B ）推論という。空欄A・Bに当てはまる語句は何か。", "a": "A：演繹的\nB：帰納的", "exp": "推論とは、ある特定の前提から結論を導くことであり、演繹的推論と帰納的推論に分類される。演繹的推論の例として、数学の定理の証明や三段論法などが挙げられる。帰納的推論は、個々の事実や観察から仮説を生成する過程の根拠となっており、仮説検証の思考において重要な役割を持つ。"}, {"q": "各カードの一面にはアルファベットが、反対の面には数字が書かれており、カードの両面にはある規則が成立している。「もしカードの片面がアルファベットの母音ならば、そのカードの裏面は偶数である」という規則が成立しているかどうかを調べるために、以下の4枚のカードのうち、少なくともどのカードをめくればよいか。\n[ E ] [ K ] [ 4 ] [ 7 ]", "a": "E と 7 の両方のカード", "exp": "この4枚カード問題は、ウェイソン（Wason, P. C.）によって考案された演繹的推論の研究で使用される古典的な課題である。Eのカードの裏面が偶数であった場合、規則が成立していることを確認できる。7の裏が母音であれば、規則が成立せず、反証例となるため、7もめくる必要がある。"}, {"q": "仮説を支持する証拠を探そうとするが、反証（仮説に合わない事例）は探そうとしない傾向のことを何というか。", "a": "確証バイアス", "exp": "4枚カード問題では、参加者の大多数はEと4を選択し、7を選択する参加者はごくわずかであることが知られている。この実験結果は、仮説を支持する証拠を探そうとする傾向に対して、反証を探そうとしない傾向、つまり確証バイアスを反映している。"}, {"q": "証拠に基づく論理的、合理的で偏りのない思考のことを何というか。", "a": "批判的思考（クリティカルシンキング）", "exp": "クリティカルシンキングとも呼ばれる。批判的思考における批判的とは、相手を批判・非難するという意味ではなく、自分の推論過程を意識的に吟味する点で内省的・熟慮的という意味を持つ。"}, {"q": "自己の認知活動をモニタリングし、コントロールするという、自己の認知プロセスについての認知のことを（ A ）という。（ A ）は、認知プロセスについての知識である（ B ）と、認知プロセスのモニタリングとコントロールといった手続き的な側面である（ C ）に分類される。空欄A〜Cに当てはまる語句は何か。", "a": "A：メタ認知\nB：メタ認知的新識（メタ認知的知識）\nC：メタ認知的スキル（メタ認知的活動）", "exp": "メタ認知的知識は、「私は算数が得意である」「暗記には反復が重要である」といった自分や人間一般についての認知特性についての知識と、「時間がないとミスが増える」といった課題についての知識、「比喩は理解を促す」といった方略についての知識に分類される。\n[メタ認知の分類図：メタ認知的知識（人間/課題/方略）、メタ認知的活動（モニタリング/コントロール/スキル）]"}, {"q": "明るさの感覚を受け持ち、網膜上では中心部以外に広く分布する視細胞の一種を何というか。", "a": "桿体（桿体細胞）", "exp": "視細胞とは、網膜上にある光を感知し、電気信号に変換する細胞である。視細胞には、桿体と錐体の2種類がある。桿体は、網膜の中心部（中心窩）を除いて全体に均等に分布する。"}, {"q": "色の感覚を受け持ち、網膜上の中心部に多く存在する視細胞の一種を何というか。", "a": "錐体（錐体細胞）", "exp": "錐体は中心窩付近に分布し、赤、青、緑の光を感じることができる。"}, {"q": "明るい場所から暗い場所に移動すると、しばらく何も見えないが、徐々に目が慣れてきて、ものが見えるようになる。一方、暗い場所から明るい場所に移動すると、一時的な盲目状態になるが、明るさに慣れてくる。このような光刺激に対応して生じる現象をそれぞれ何というか。", "a": "暗順応・明順応", "exp": "順応とは、視覚をはじめとする知覚が環境に応じて適応的に変化することをいう。暗順応の例として、明るいところから、暗い映画館に入るとしばらくは見えにくく、次第に見えてくることが挙げられる。"}, {"q": "明るい領域と暗い領域、あるいは、赤と緑のような2つの刺激が空間的に近接して同時に提示された場合には、単独で提示された場合よりも、その知覚的特性が実際よりも強調される。この現象のことを何というか。", "a": "対比の効果（明るさの対比効果）", "exp": "対比、対比効果ともいう。図2.7では、中心の正方形の明るさは同じであるが、黒で囲まれたほうの正方形のほうが、白で囲まれた正方形よりも明るく見える。これを明るさの対比効果という。"}, {"q": "下図の図1の矢印Aのさす辺りに明るい縦縞があるように見え、一方、矢印Bのさす辺りに暗い縦縞があるように見える。図1は、図2に示すように、明るさが異なる2つの領域の間を単調な明るさの勾配で結んだものである。このように、コントラストの変化が生じる境界線部分において、明るい帯、または暗い帯が見える現象を何というか。", "a": "マッハの帯（マッハ現象）", "exp": "この現象の発見者のマッハ（Mach, E.）の名前頭文字に由来する。マッハ現象とも呼ばれる。マッハの帯は明るさの対比効果による錯視の一種である。図1において、左側の一定だった明るさが低下する矢印A部分では実際よりも明るく見え、一方、右側の明るさの低下が終わり明るさが一定になる矢印B部分では、実際よりも暗く見える。"}, {"q": "暗い場所では青色や緑色が相対的に鮮やかに見えるのに対して、明るい場所では黄色や赤色が鮮やかに見える。このような、同じものでも、その場の明るさによって色の知覚が異なる現象を何というか。", "a": "プルキンエ現象", "exp": "チェコの生理学者プルキンエ（Purkinje, J. E.）が発見した。暗くても見えやすいように、道路標識が青色で作製されるなど、プルキンエ現象は日常生活でも活用されている。"}, {"q": "下表は、色の心理的属性についてまとめたものである。空欄A〜Cに当てはまる語句は何か。\n[ (A) 明るさを表す / (B) 純度を表す / (C) 色の質的な違いを表す ]", "a": "A：明度\nB：彩度\nC：色相", "exp": "知覚された色の心理的属性は、明度、彩度、色相の3次元で説明される。色を分類するときに、「赤、青、緑、…」と分類するが、これが色相である。この3属性が定まると一つの色彩が特定される。"}, {"q": "人はどのように色の違いを識別するのかという色覚のメカニズムに関する仮説として、網膜上にある赤・青・緑の3色に対応する物質があり、この3種類の反応の組合せだけで、色の知覚がなされるとする説を何というか。", "a": "三色説", "exp": "色の知覚のことを色覚という。この説は、三原色、つまり、赤・青・緑の三色の混色によって色が表現できるという事実に適合する。しかしながら、色対比や色残像など三色説では説明が難しい現象も存在する。"}, {"q": "舞台では黄色を作り出すために赤と緑のスポットライトが混色される。このような光の混色のことを何というか。", "a": "加法混色", "exp": "通常、赤・青・緑の3つの色の光を重ねて混色を行う。赤と緑が重なると黄色（イエロー）、緑と青が重なると青緑（シアン）、青と赤が重なると赤紫（マゼンタ）が見える。そして、赤・青・緑の3つの色が重なると、特定の色覚を生じさせない光である無彩色（白）になる。"}, {"q": "絵の具のような物質は、混色によって、その色が次第に黒に近づく。このような物質の混色のことを何というか。", "a": "減法混色", "exp": "減法混色では、通常、シアン・マゼンタ・イエローの3色を混色する。この3色は色料の三原色と呼ばれる。イエローとシアンを混色すると緑、シアンとマゼンタを混色すると青、マゼンタとイエローを混色すると赤が見える。そして、3つを混色すると黒になる。"}, {"q": "ゲシュタルト心理学における、ものごとをできるだけ簡潔にまとまった形で知覚しようとする傾向の原理のことを何というか。", "a": "プレグナンツの原理（プレグナンツの法則）", "exp": "プレグナンツの法則とも呼ばれる。ドイツ語で「プレグナンツ」は簡潔さという意味を表す。"}, {"q": "下図は、図のまとまり方の法則の一例である。AとBのいずれにおいても、丸は2つずつのまとまりとして認識される。こうした認識を導くものとして、空欄に当てはまる語句はそれぞれ何か。\n[図(A)：距離が近い丸どうしがペア / 図(B) 白丸どうし、黒丸どうしがペア]", "a": "A：接近\nB：類同", "exp": "プレグナンツの原理を具体的に示したものがゲシュタルトの法則（ゲシュタルト要因とも呼ばれる）である。(A)では、距離の近いものは、一つにまとまって見える（接近の要因）。(B)では、白丸と黒丸がそれぞれまとまって見えるように、似ているものは、一つにまとまって見える（類同の要因）。"}, {"q": "対象の形の知覚において、輪郭によってまとまりのある形として浮き出て見える部分を（ A ）といい、その背景となる部分を（ B ）という。空欄A・Bに当てはまる語句はそれぞれ何か。", "a": "A：図\nB：地", "exp": "対象の形の知覚には、図と地の分化が必要である。下図は、反転図形（図地反転図形）の一例である。反転図形とは、同一の図形において、図となる領域と地となる領域が交替する図形のことである。図2.8では、黒い部分が図となる場合、二人の横顔が見え、白い部分が図となる場合、一方が図となる場合は、盃が見え、黒い部分が背景となる。\n[図2.8 ルビンの盃]"}, {"q": "下図では、実際には存在しないが、手前に三角形があるように見える。このように、物理的には存在しない形が見える現象を何というか。\n[図：パックマンのような図形を配置すると中央に白い三角形が浮かび上がる図]", "a": "主観的輪郭（視覚的補完）", "exp": "カニッツァ（Kanizsa, G.）の三角形の図版では、手前に三角形があるように見える。このように、実際には存在しないのに、輪郭線が知覚されることを主観的輪郭という。"}, {"q": "下表は運動の知覚についてまとめたものである。空欄A・Bに当てはまる語句は何か。\n[ (A)運動：対象が物理的に運動している状態 ]\n[ (B)運動：対象が実際には運動していないが、見かけ上運動しているように知覚される現象 ]", "a": "A：実際\nB：仮現", "exp": "仮現運動は、広義には、物理的に運動していない対象があたかも運動しているかのように知覚される見かけの運動をさし、運動残効、誘導運動、自動運動などが含まれる。狭義には、対象を連続的に点滅させることによって知覚される見かけの運動のことをさし、β運動、γ運動、α運動などがある。日常生活では、たとえば、夜間に、交差点に点滅する踏切の赤いランプが、一つのライトが往復しているように見える現象が狭義の仮現運動として挙げられる。"}, {"q": "自分が乗っている電車は止まっているのに、隣のホームの電車が動き出すと、自分の電車が動き出したように感じることがある。このような現象を何というか。", "a": "誘導運動", "exp": "流れる雲の合間に月が出ているときに、雲ではなく、実際には動いていない月が動いているように見える例も誘導運動の一種である。このように、静止した対象と動いている対象が同時に存在すると、静止した対象のほうが動いているように感じる現象のことを誘導運動という。"}, {"q": "滝の落下をしばらく見つめた後で、周囲の岩などの静止しているものに目を移すと、それが逆方向に運動するように見える。このような現象を何というか。", "a": "運動残効（滝の錯視）", "exp": "一定方向に運動する対象をしばらく見た後に、静止した別の対象が反対方向へ運動しているように知覚される現象を運動残効という。滝の錯視は、運動残効の典型例である。"}, {"q": "暗い部屋で、固定されている光点を見つめていると、次第に光点がゆらゆら動いて見えるようになる。この現象を何というか。", "a": "自動運動", "exp": "運動の知覚には、部屋の壁など基準となるものが必要となるが、暗闇の中では周りの手がかりから光点の空間的位置を把握することが難しい。そのため、自動運動が生起するとされている。また、自動運動の生起理由としては、眼球運動との関連も挙げられる。"}, {"q": "3次元性の知覚のことを何というか。", "a": "奥行き知覚", "exp": "網膜に映し出される像は2次元の平面像であるが、人は外界を立体的に見ることができる。つまり、人は奥行きのある3次元性の知覚をしている。"}, {"q": "下図は奥行き知覚で用いられる手がかりを分類したものである。空欄A・Bに当てはまる語句は何か。\n[ 奥行き手がかり ─ (A)手がかり(両眼視差) / (B)手がかり(調節/絵画的手がかり[遮蔽、線遠近法、肌理の勾配、陰影]) ]", "a": "A：両眼性\nB：単眼性", "exp": "入力されてきた2次元の情報から、人が3次元の世界として知覚できるのは、さまざまな情報から奥行きを「手がかり」として、利用しているからである。このような奥行きがかりには、その成立に左右両眼視で生じる両眼性手がかりと、単眼視でも生じる単眼性手がかりに分類される。"}, {"q": "同一対象を見るときに、両眼が離れた位置にあることによって、左右の網膜像は同じではなく、ずれが生じる。この網膜像間の差異のことを何というか。", "a": "両眼視差", "exp": "図2.9のように、立方体を両眼で見るとき、右眼の網膜に投影される像と左眼の網膜に投影される像は異なる。"}, {"q": "近い距離にある対象を観察するためには、左右の眼球を内側に回転させる必要がある。こうした眼球の内転運動を何というか。", "a": "輻輳（ふくそう）", "exp": "図2.10のα1、α2のように、軸の角度を輻輳角という。観察対象が遠くに位置するほど、輻輳角が小さくなり、近くに位置するほど輻輳角が大きくなる。輻輳角が大きいほど、左右の眼に投影される像のずれが大きくなり、対象が近くに位置していると認識する。"}, {"q": "網膜上に対象の明確な像を得るためには、対象までの距離に応じて、眼球における水晶体の厚みを適切に変化させる必要がある。この眼球における水晶体の厚みを変化させる機能のことを何というか。", "a": "調節（水晶体の調節機能）", "exp": "図のように、近い対象を観察するときほど、水晶体は厚みを増す。脳は、この水晶体の厚みを奥行き知覚の手がかりに使っているとされる。"}, {"q": "水平線近くに浮かぶ月は、天頂にある月と比べて大きく見える。このような視覚における錯覚のことを何というか。", "a": "錯視", "exp": "月が大きく見えたり小さく見えたりする現象は「月の錯視」と呼ばれている。このように、視覚に関する錯覚のことを錯視という。"}, {"q": "10m前方に立っていた人が5m前方に近づけば、その人の姿の網膜像は2倍の大きさになるが、その人の身長は2倍には見えない。このような現象を視覚の（　）という。空欄に当てはまる語句は何か。", "a": "恒常性（サイズの恒常性）", "exp": "刺激の物理的入力の変化に対して、知覚される内容が一定に保たれる傾向のことを知覚的恒常性という。問題文の例は、その中でも、特に大きさの恒常性と呼ばれる。知覚的恒常性は、視覚ではこのほかに、明るさ、色、形などにおいても普遍的に見られる。\n[図2.11 観察距離d と 網膜像の大きさ の関係図]"}, {"q": "複数の情報から、ある特定の情報を選び出す注意のことを（ A ）注意という。一方、ラジオを聴きながら周囲の状況を気にしつつ運転するような、複数の対象に同時に向ける注意のことを（ B ）注意という。空欄A・Bに当てはまる語句は何か。", "a": "A：選択的\nB：分割的", "exp": "ある情報の処理を優先し、他の情報の処理を抑制する機能を注意という。注意は、1950年代初期の注意研究では、選択的注意と分割的注意に区分される。選択的注意は、さらに聴覚的なものと視覚的なものに分類される。"}, {"q": "パーティーなどの喧騒の中でも、特定の人との会話に注意を向けることができ、他の会話を無視することができる。このような現象を何というか。", "a": "カクテルパーティー現象", "exp": "カクテルパーティー現象は、聴覚の選択的注意の代表例である。1950年代初期の注意研究では、注意が向けられていない情報は処理されないとされていた。しかし、その後の研究によって、たとえば、周囲の横顔が注意していなくても自分の名前には気づくように、少なくとも一部は意味の処理が行われていることが報告されている。"}, {"q": "実験参加者の左右の耳に同時に異なる音声刺激を提示し、一方の耳にのみ注意を向けるように求める課題を何というか。", "a": "両耳分離聴取課題（ダイコティック・リスニング）", "exp": "実験参加者は、無視するように指示された側の耳に提示された音声刺激は、その内容をほとんど理解できないことが報告されている（→初期選択理論・後期選択理論）。"}, {"q": "ブロードベント（Broadbent, D. E.）は、図Aのように注意による選択が、情報の意味処理よりも前になされると主張した。一方、ドイチェ（Deutsch, J. A.）は、図Bのように注意の選択が意味処理後の段階にあると主張した。それぞれ注意の何理論というか。\n[図A：情報 → 感覚記憶 → 注意フィルター → パターン認知 → 反応出力]\n[図B：情報 → 感覚記憶 → パターン認知 → 注意フィルター → 反応出力]", "a": "図A：初期選択理論\n図B：後期選択理論", "exp": "ブロードベントは両耳分離聴取課題の実験結果から、注意のフィルターモデルを提唱した。このモデルは、情報の選択が情報処理過程の初期になされることが仮定されていることから、初期選択理論と呼ばれる。これに対して、両耳分離聴取課題において、無視するように指示された側の耳に提示された自分の名前には反応できるという、初期選択理論では説明できない知見が報告された。このことから、ドイチェは、すべての情報は意味的特徴の分析まで処理がなされ、その後、注意によって情報が選択されると考えた。このような考え方は、情報の選択が情報処理過程の後期になされることが仮定されていることから後期選択理論と呼ばれる。"}, {"q": "カーネマン（Kahneman, D.）は、注意には容量の限界があるとした。この注意のモデルを何というか。", "a": "容量モデル", "exp": "注意の容量モデルでは、一度に処理できる情報の量には制限があるとさる。近年では、初期・後期選択理論と容量モデルの両方の考え方を統合した知覚的負荷理論がラヴィ（Lavie, N.）によって提唱された。"}, {"q": "知覚された音の心理的属性は、音の（ A ）と音の（ B ）と音色の3つの要素によって決定される。空欄A・Bに当てはまる語句はそれぞれ何か。", "a": "A：大きさ\nB：高さ\n（順不同）", "exp": "音の大きさは、音波のエネルギー量が大きいほど、より大きい音として知覚される。一方、音の高さは、音波の周波数が高いほど音が高く知覚される。"}, {"q": "発話している口の形を映した映像と、実際に聴覚に入力された音声が一致しない場合、両者の中間的音声が知覚される効果のことを何というか。", "a": "マガーク効果", "exp": "たとえば、/ga/と発話している映像と、/ba/と発話している音声を同時に提示すると、典型的に/da/の音声が知覚される。この現象は、音声の知覚が視覚情報からの影響を強く受けることを表しており、視覚情報と聴覚情報の相互作用を示すものである。"}, {"q": "腹話術では、腹話術師の口ではなく、人形の口が音源であると錯覚され、人形がしゃべっているように見える。このような、視覚と聴覚など、異なる感覚モダリティ（感覚様相）間の相互作用を含む知覚のことを何というか。", "a": "クロスモーダル知覚（多感覚知覚）", "exp": "音源の定位が、人形などの視覚刺激の存在によって歪められてしまう現象のことを腹話術効果という。クロスモーダルとは、視覚や聴覚などの複数の感覚を統合することを意味する。"}], "第3章_発達・教育": [{"q": "哺乳類は基本的に離巣性と留巣性に区別されるが、ポルトマン（Portmann, A.）は、ヒトはこのいずれにも当てはまらないとして、別の呼び名を用いた。それを何というか。", "a": "二次的就巣性", "exp": "ヒトの赤ん坊は、就巣性の動物のように見かけ上未熟な状態であるものの、感覚器官は発達した状態で生まれてくる。"}, {"q": "ヒトの赤ん坊は、哺乳類が生まれるときに通常達成する水準まで身体が大きくなると難産が予想されるため、十分な発達よりも約1年早く生まれるとされる。この特徴を何というか。", "a": "生理的早産", "exp": "これによってヒトは、発達の早期から感覚器官を通して外界の多様な刺激や情報を受け取ることになる。これが結果的に、非常に重要な学習経験になるとされている。"}, {"q": "ハイイロガンの刷り込み（インプリンティング）実験などで有名な比較行動学者は誰か。", "a": "ローレンツ（Lorenz, K. Z.）", "exp": "ローレンツは、実際に動物の行動を詳細に観察、記述することを通して、比較行動学の基礎を築いた。"}, {"q": "刷り込みなど一部の学習には、学習が成立するための限られた時期が存在する。この時期のことを何というか。", "a": "臨界期（敏感期）", "exp": "臨界期という発想はヒトの発達にも適用されているが、時期の限定が緩やかであり、可逆的である場合も多く、そのような意味で敏感期と呼ぶこともある。"}, {"q": "発達に関する理論で、個人の発達は胎児期から潜在しており、出生以後の環境や経験の役割は少ないとする説を何というか。", "a": "成熟説（遺伝説、生得説）", "exp": "当時の行動主義が環境の重要性を強調したことに対して、ゲゼル（Gesell, A. L.）は子どもの内部条件の重要性を強調した。"}, {"q": "育つ環境から得られる経験によって、個人の発達が大きく規定されるとする説を何というか。", "a": "環境説", "exp": "アルバート坊やの実験などから、人間の発達や個体差は環境によって形成できるとしたワトソン（Watson, J. B.）などが、環境説の立場をとっている。"}, {"q": "「遺伝か環境か」ではなく、遺伝と環境の両方が発達に対して加算的に影響を与え、個人の発達が形成されるとする説を何というか。", "a": "輻輳説", "exp": "輻輳説はシュテルン（Stern, W.）が提唱した理論である。"}, {"q": "発達に関する理論で、個人の持つ潜在的な特徴が実際に発現するためには、一定水準の環境刺激が必要であり、環境刺激は閾値要因として働くとする説を何というか。", "a": "環境閾値説", "exp": "これはジェンセン（Jensen, A. R.）によるものである。発現に必要な水準を上回る環境刺激が与えられればその特徴は発現するが、必要な水準に達しない場合は、発現することはないとされる。"}, {"q": "環境と遺伝の両方を重視するが、両者はそれぞれ独立して作用するのではなく、相互に影響し合うとする説を何というか。", "a": "相互作用説", "exp": "経験主義では環境と遺伝を加算的に扱うのに対し、相互作用説では両者が互いに影響し合うと考える。現在の発達心理学では、基本的に相互作用説の立場がとられている。"}, {"q": "ヒトの身体の発達を4つの機能別に示した発達曲線を作成したのは誰か。", "a": "スキャモン（Scammon, R. E.）", "exp": "スキャモンは一般型、生殖型、神経型、リンパ型について発達曲線を描き、それぞれ異なるペースで発達していくことを示した。"}, {"q": "原始反射の一つで、口の中に指を入れると、それを吸う運動をする反射のことを何というか。", "a": "吸啜（きゅうてつ）反射", "exp": "これは、母乳を飲む際に有用な反射である。"}, {"q": "原始反射の一つで、大きな音や振動などに対して、両手両足を外側に伸ばし、その後ゆっくりと何かを抱え込むような運動が見られる反射のことを何というか。", "a": "モロー反射", "exp": "ドイツのモロー（Moro, E.）により報告された。モロー反射は、出生後3か月頃から消失し始める。このほかの主要な原始反射としては把握反射や原始歩行などがある。こうした原始反射の出現や消失は、発達診断における重要な指標となる。"}, {"q": "ヒトの運動能力はおおむね、まず身体全体のバランスを取るといった大きな運動から、指を使うなどの細かい運動の順番で発達していく。こうしたそれぞれの運動のことを何というか。", "a": "粗大運動・微細運動", "exp": "粗大運動とは、頭を持ち上げる、寝返りを打つ、立つ、歩くなど、胴体や四肢の筋肉を使う運動であり、微細運動は、何かをつまんだり、指さしをしたりするなど、腕と手を使った運動のことである。"}, {"q": "世代が新しくなるにつれて、身体発達が促進される現象を何というか。", "a": "発達加速現象", "exp": "発達加速現象には、身長や体重などの成長速度が加速する成長加速現象と、性的成熟の開始年齢が早期化するなどの成熟前傾現象がある。"}, {"q": "生後25週から50週頃の赤ん坊が発する、「マママ」「ブブブ」などの多様な音声のことを何というか。", "a": "喃語（なんご）", "exp": "喃語以前に見られる、鳴き声や叫び声とは違う、声帯の振動によって発せられる穏やかな音のことはクーイングと呼ばれる。"}, {"q": "1歳前後から見られる1単語からなる発話を何というか。", "a": "1語文", "exp": "「ママ」の1語で「ママがいる」「ママに会いたい」など、さまざまな意味に用いられるのが1語文である。なお、2歳前後から2語文、多語文と徐々に複雑な文章へと発達していく。"}, {"q": "ピアジェ（Piaget, J.）が提唱した認知的発達の4段階をそれぞれ何というか。", "a": "感覚運動期、前操作期、具体的操作期、形式的操作期", "exp": "ピアジェは、子どもの認知発達が感覚運動期（誕生〜2歳頃）、前操作期（2〜7歳頃）、具体的操作期（7〜11歳頃）、形式的操作期（11歳頃〜）という、質の異なる4つの段階をたどるとする理論を提唱した。"}, {"q": "ピアジェは、赤ん坊が環境との相互作用を通して認識を形成していくと考えた。その際に用いられる、思考や行動の様式のことを何というか。", "a": "シェマ", "exp": "子どもは、既存のシェマを用いて情報を取り入れるという同化と、新たな情報や状況に応じて、シェマを変容する調節を行いながら、知能を発揮するとされる。"}, {"q": "何か目の前にある物が、移動や遮蔽（しゃへい）によって見えなくなったとしても、その対象は存在し続けているという認識を何というか。", "a": "対象の永続性", "exp": "母親が見えなくなったとしても、存在しなくなったわけではないという理解などが、対象の永続性である。ピアジェは、8か月頃からこの認識が成立すると考えた。"}, {"q": "生命のない物に対して、生命や意識などを認める幼児の心理的特徴を何というか。", "a": "アニミズム", "exp": "自分の内的な出来事と、外界の出来事との区別が十分にできない前操作期に見られる特徴である。"}, {"q": "ピアジェによる発達段階のうち、3つ山課題や量の保存などの課題が達成できるようになるのはどの段階か。", "a": "具体的操作期", "exp": "人形の視点から何が見えるかを問う3つ山課題や、見た目の変化にとらわれずに、量が一定であることを理解する量の保存は、具体的操作期で達成できるとされる。"}, {"q": "3つ山課題に象徴されるように、ある段階までの子どもは、視点を他者の立場に置いたりするなど、注意の対象が特定の次元のみに限定されるという特徴を持っている。この特徴のことを何というか。", "a": "自己中心性（中心化）", "exp": "前操作期までの子どもは、物事を自分の視点以外の角度から認知することに大きく制約がある。このことを自己中心性という。これは決して利己的であるという意味ではなく、何かを認知するときに注意の対象が特定の次元のみに限定されるという意味を込めて中心化という言い方をすることもある。なお、具体的操作期に入り、中心化から脱することを脱中心化と呼ぶ。"}, {"q": "子どもは、自分の能力よりやや上の水準の課題を、他者から援助を受けることで達成し、成長していく。この他者からの援助のことをヴィゴツキーは何と呼んだか。", "a": "足場（足場かけ）", "exp": "ヴィゴツキーによれば、発達の最近接領域に沿った課題を子どもに課すことで、子どもは大人の手助けを得ながら、自らの能力を発達させていくとされる。"}, {"q": "子どもの言語は、自分自身の思考のために行う内的な言語と、他者に発する言語とに分化していく。これらをそれぞれ何呼ぶか。", "a": "内言・外言", "exp": "内言とは、主として思考の道具としての役割を果たし、本来音声で発生する変化のない言語であるが、幼児期にはまず外言のみが見られ、そこから次第に内言と外言が分化していく。"}, {"q": "幼児の発話には、社会的な目的のない、反復や独り言などがしばしば見られる。こうした発話のことを、ピアジェは何と呼んだか。", "a": "自己中心語", "exp": "ピアジェはこれを、前操作期における自己中心性の表れであると考えた。またヴィゴツキーは、この自己中心語の消失が、内言と外言が分化した結果であると考えた。"}, {"q": "ヴィゴツキーの理論などの影響を受け、生態学的発達理論を提唱したのは誰か。", "a": "ブロンフェンブレンナー（Bronfenbrenner, U.）", "exp": "ブロンフェンブレンナーは、子どもを取り巻く環境を、親子関係などの小さな枠組みから社会・文化のような大きなものまで、4つの水準（マイクロ、メゾ、エクソ、マクロ）でとらえ、そうした環境との相互作用から子どもの発達をとらえようとした。"}, {"q": "発達段階という概念を提唱し、人間の発達段階と各発達段階における発達課題を整理した米国の教育学者は誰か。", "a": "ハヴィガースト（Havighurst, R. J。）", "exp": "ハヴィガーストは、人間の発達を乳幼児期、児童期、青年期、壮年期、中年期、老年期の6つの段階に区分し、各段階に10程度の発達課題があるとした。"}, {"q": "エリクソン（Erikson, E. H.）は、ライフサイクルの視点から人間の心理・社会的発達をとらえている。エリクソンの理論では、発達段階はいくつに区分されているか。", "a": "8つ", "exp": "エリクソンは発達段階を乳児期、幼児期前期、幼児期後期、児童期、青年期、成人前期、成人期、老年期の8段階に区分した。各段階には達成すべき発達課題とその際に生じる心理・社会的危機があるとされる。"}, {"q": "エリクソンの発達理論は、ある既存の理論における発達理論を社会-歴史的な観点からとらえ直したものである。その理論とは何か。", "a": "精神分析（フロイトの精神分析理論）", "exp": "フロイト（Freud, S.）の理論は、心理-性的側面を強調した理論となっている。一方、エリクソンの理論はそれを社会とのかかわりという視点からとらえ直したものである。"}, {"q": "エリクソンの理論のように、発達はあらかじめ決定されているわけではなく、段階ごとに漸次形成されていくという説を何呼ぶか。", "a": "漸成的発達論（漸成説）", "exp": "もともとは生物学の用語である。生物学では後成説とも呼ばれ、近年では原語のままエピジェネシスと呼ばれることが多い。特にエリクソンの理論をさす場合は、区別の目的で「エリクソンの漸成説」と呼ぶこともある。"}, {"q": "エリクソンの発達理論における、幼児後期の心理・社会的危機は何か。", "a": "積極性 対 罪悪感（自発性 対 罪悪感）", "exp": "幼児期後期は、認知・身体両面の発達に伴って、より豊かな活動が可能となる。その中で自分自身の欲求や目標に基づいて自発的に行動していくための積極性と、失敗や挫折による罪悪感の危機を経験するとされる。"}, {"q": "エリクソンの発達理論における、老年期の心理・社会的危機は何か。", "a": "統合 対 絶望", "exp": "エリクソンによれば、老年期は人生の最終段階である。統合とは、自分の人生の責任を受け入れ、人生を全うしていくことをさす。一方、死への恐れや自分の人生を満たさせていくための時間が残っていないという信念などが絶望へとつながる。"}, {"q": "中年期は人生の後半の始まりであり、身体の衰えや子どもの独立などから、心理的危機を経験するとされる。ユング（Jung, C. G.）はこの中年期と成人前期の境を何と呼んだか。", "a": "人生の正午", "exp": "ユングは成人前期と中年期の境がちょうど人生の折り返し地点であると考えた。中年期における心理的危機は中年期の危機と呼ばれ、この危機を通して人間は、自身のあり方を再度問い直すことになるとされる。"}, {"q": "愛着理論の基礎を築き上げたイギリスの精神医学者は誰か。", "a": "ボウルビ（Bowlby, J.）", "exp": "ボウルビは、世界保健機関（WHO）からの委託研究などを通して、愛着理論を構築するに至った。"}, {"q": "生後初期における母子の相互作用の欠如を何と呼ぶか。", "a": "マターナル・デプリベーション（母性剥奪）", "exp": "ホスピタリズムの背景には、栄養面や衛生面の問題だけでなく、母性的な養育が与えられない点があるということが徐々に注目されるようになった。この概念こそが、愛着理論の出発点となっている。"}, {"q": "愛着の質を測定するためのストレンジ・シチュエーション法を開発したのは誰か。", "a": "エインズワース（Ainsworth, M. D. S.）", "exp": "ストレンジ・シチュエーション法とは、母子の相互作用における子どもの行動を観察することで、愛着の質を測定する方法である。"}, {"q": "下表は、ストレンジ・シチュエーション法による愛着の質の分類である。表中のBタイプに該当する型を何と呼ぶか。\n[Aタイプ 回避型 / Bタイプ ( ) / Cタイプ 抵抗型]", "a": "安定型", "exp": "安定型は、最も健全な愛着を形成したと考えられるタイプである。一方回避型は、健全な愛着関係が形成されておらず、母親が愛着対象とみなされていないと考えられるタイプである。また抵抗型は、母親は愛着対象とみなされているものの、十分な安心感の獲得がなされておらず、分離不安が強いとされるタイプである。"}, {"q": "アカゲザルを用いた実験などを通して、親子関係における愛着の重要性を実証的に示した米国の心理学者は誰か。", "a": "ハーロウ（Harlow, H. F.）", "exp": "スキンシップのような愛着行動の重要性を示したハーロウの研究は、行動主義的見方が支配的であった当時において、大きな衝撃を与えた。"}, {"q": "養育者との健全な愛着が形成できるようになると、子どもは養育者と接触していなくても安心感を得ることができるようになり、一人でさまざまな探索活動ができるようになる。このような養育者の役割を何と呼ぶか。", "a": "安全基地", "exp": "この自発的な探索行動が、さまざまな学習を行っていくための重要な経験となる。逆に、抵抗型のように養育者との接近・接触を強く求める子どもは、こうした探索行動を行いづらいとされる。"}, {"q": "成長に伴い、養育者との愛着関係は子どもの中に内在化され、他者とかかわる際の情報処理の基盤となる。これを何というか。", "a": "内的作業モデル（IWM）", "exp": "初期の愛着対象との関係は、この内的作業モデルを通して、その後の人生での人間関係に影響を及ぼすと考えられている。これが、人生初期の養育者との関係が重要視される理由の一つである。"}, {"q": "乳児は、8か月頃からいわゆる人見知りが始まる。これを「8か月不安」として理論化したのは誰か。", "a": "スピッツ（Spitz, R. A.）", "exp": "人見知りは、安心感を持てる見知った人とそうでない人の弁別が可能になるからこそ生じるものである。なおスピッツは、ホスピタリズムの研究でも有名である。"}, {"q": "人見知りの始まる時期から見られるようになる、主たる養育者から離れることに対する不安反応を何というか。", "a": "分離不安", "exp": "分離だけでなく、分離が予想される場面でも不安が示される。その後、一時的な分離は対象の喪失ではないことを理解することで、分離不安は少しずつ緩和されていく。"}, {"q": "乳幼児は、毛布やタオル、ぬいぐるみなどに特別な愛着を寄せることがある。こうした対象をさす言葉を何というか。", "a": "移行対象", "exp": "移行対象は母親の象徴的代理として、分離不安を緩和させる機能を持つ。精神分析医であるウィニコット（Winnicott, D. W.）による言葉である。"}, {"q": "乳幼児の観察を通し、乳幼児との母親の関係性に関する分離-個体化過程を理論化したのは誰か。", "a": "マーラー（Mahler, M.）", "exp": "マーラーの理論は、精神分析的な発達理論を、実証的な観察を通して構築したという点で高く評価されている。"}, {"q": "赤ん坊がREM睡眠時などになんらかの刺激を受けると、微笑行動が見られる。これを何と呼ぶか。", "a": "生理的微笑（新生児微笑、自発的微笑）", "exp": "このように初期の赤ん坊の微笑は、特に社会的な意味を持ったメッセージというわけではない。しかし、微笑に対して周囲が積極的に応答することで、3か月頃には相互的で社会的な意味を持つ、社会的微笑になっていく。"}, {"q": "母親が乳児に話しかける際、声の高さが高くなり、抑揚が誇張されるなどの特徴が見られる。こうした特徴を持つ語りを何と呼ぶか。", "a": "マザリーズ（母親語、育児語）", "exp": "マザリーズは、言語を問わず見られる現象であることが明らかにされている。また、母親のみに見られるわけではないことから、育児語と呼ぶこともある。"}, {"q": "視覚的断崖を用いた実験において、乳児は母親の表情に基づいて、断崖を渡るか否かを判断できることが明らかになっている。こうした現象を何と呼ぶか。", "a": "社会的参照", "exp": "他者から情報を求め、自らの行動を調節することであり、9〜10か月頃から1歳過ぎ以降に見られるようになる。"}, {"q": "パーテン（Parten, M. B.）によれば、幼児が複数いる場面における幼児の遊びの形態は、3歳頃を境に変化する。変化する前後の遊びの形態をそれぞれ何というか。", "a": "平行遊び・連合遊び", "exp": "平行遊びとは、複数で遊んでいるものの、それぞれが独立しておりかかわりのない遊びの状態である。3歳頃からは、互いに影響を及ぼし合う連合遊びが見られるようになる。"}, {"q": "遊ぶ子どもたちの中で共通の目標があり、それぞれの役割が分化している遊びを何というか。", "a": "協同遊び", "exp": "パーテンの分類では平行遊び、連合遊び、協同遊びに加え、何もしていない状態、傍観、一人遊びという6つの状態が存在する。"}, {"q": "小学校の中学年頃に、子どもは同性の仲間を中心に構成される自発的な活動の集団を形成する。こうした特徴を持つ年代のことを何と呼ぶか。", "a": "ギャング・エイジ", "exp": "形成された集団のことをギャング・グループと呼ぶ。ギャング・グループは、仲間どうしの約束事や信頼などさまざまなことを学ぶ場であると考えられている。"}, {"q": "ベラック（Bellack, L.）は、対人距離における接近と回避との葛藤を何と呼んだか。", "a": "ヤマアラシのジレンマ", "exp": "哲学者ショーペンハウエル（Schopenhauer, A.）が用いた寓話がもとになっている。なお、原語は hedgehog's dilemma であり、「ハリネズミのジレンマ」である。"}, {"q": "コールバーグ（Kohlberg, L.）は、人間の道徳性は、大きく3つの水準で発達していくと主張した。その3つの水準とは何か。", "a": "前慣習的水準、慣習的水準、慣習以後の水準（後慣習的水準）", "exp": "前慣習的水準とは、目に見えるものや外的、物理的結果によって道徳的価値が判断される水準である。また、慣習的水準とは、個人ではなく慣習的な秩序や法律などの社会的規範によって道徳的価値が判断される水準であり、慣習以後の水準とは、現実の社会や規範を超え、普遍性を持つ原則を志向する水準である。"}, {"q": "コールバーグが道徳性の発達を明らかにしていく際に、研究で用いた課題を何と呼ぶか。", "a": "モラルジレンマ課題", "exp": "コールバーグは、「妻の命を助けるために、薬を盗む」といった道徳的葛藤場面を提示し、その行為に対する道徳的判断を求めるという形で、道徳性の研究を行った。このような課題をモラルジレンマ課題と呼ぶ。"}, {"q": "コールバーグの道徳性発達の理論が、男性的な価値観に偏ったものであると批判し、女性的な道徳性の発達のあり方を主張したのは誰か。", "a": "ギリガン（Gilligan, C.）", "exp": "ギリガンは、コールバーグのいう道徳性の発達が「正義の原理」を中心としているとして、配慮や思いやりを重視した道徳性の発達を強調した。"}, {"q": "社会的知識は、道徳、社会的慣習、個人という3つの独立した領域から構成されるという領域特殊理論を提唱したのは誰か。", "a": "トゥリエル（Turiel, E.）", "exp": "道徳領域は、ルールや慣習に関係なく、正義や福祉に関する善悪を含む。社会的慣習領域は、規則や社会の秩序に基づく善悪を含む。トゥリエルは、この3つの領域の違いを理解できるよう、子どもにかかわることが重要であると主張した。"}, {"q": "思春期以降心理的な独立が志向され、親や学校、社会との間に葛藤や摩擦が生じるようになる時期を何と呼ぶか。", "a": "第二次反抗期", "exp": "なお、第一次反抗期は2〜3歳頃の自己主張や拒否が多く見られるようになる時期のことである。また、第一次反抗期と第二次反抗期ともに、中核となるのは自立することであり、反抗することが本質であるわけではない。"}, {"q": "青年期における親からの自立は、さまざまな言葉で表される。ブロス（Blos, P.）は、青年の親からの自立を何と呼んだか。", "a": "第二の個体化", "exp": "マーラーの分離-個体化理論の影響を受け、青年期を第二の個体化の過程とした。"}, {"q": "米国の心理学者であるホリングワース（Hollingworth, L. S.）は、青年の親からの自立を何と呼んだか。", "a": "心理的離乳", "exp": "ホリングワースは、幼児期の生理的で肉体的な離乳に対し、青年期の精神的な親離れを心理的離乳と呼んだ。"}, {"q": "青年期は、社会で活躍するための能力を発達させたり、資格を引き受けていくための準備を行ったりする時期である。これれ、社会的な責任や義務がある程度猶予されている、そのような猶予期間のことを何と呼ぶか。", "a": "モラトリアム（心理社会的モラトリアム）", "exp": "もともとは経済学の用語であり、非常時における債務の支払い猶予を意味する。青年期は、身体的には十分に成長した状態である。しかし、十分な社会生活を送るためには、知識や技術の獲得、社会人としての意識や自覚を備える必要がある。そのような準備を行う時期がモラトリアムである。"}, {"q": "危機のエクスペリエンスと人生の重要な領域である活動への傾向という2つの観点から、同一性地位を4つのように分類したのは誰か。\n[同一性達成、同一性拡散、モラトリアム、早期完了]", "a": "マーシャ（Marcia, J. E.）", "exp": "同一性達成とは、自分についてのさまざまな悩みや苦悩などの危機を経たうえで、自らの生き方を選択し、傾向（コミットメント）できている状態である。同一性拡散とは、危機の経験の有無にかかわらず、積極的な傾向ができず、自らの人生について責任ある主体的な選択ができていない状態である。またこの分類によれば、モラトリアムとは、危機を経験しながらも、傾向のための模索をしている状態であるということとなる。マーシャは同一性地位面接という半構造化面接を用いて、このような分類を行った。"}, {"q": "上図のA（経験していない×している）に当てはまる、同一性の状態を何と呼ぶか。\n[図：経験していない×している → 早期完了]", "a": "早期完了", "exp": "早期完了は、親など周囲から与えられた生き方を、不協和を起こすことなく受け入れている状態である。一見同一性達成をしているように見えるものの、マーシャ自身は、この状態を肯定的にはとらえていない。"}, {"q": "動機づけは、動機の源泉のあり方によって、下図のように分類されることがある。空欄A・Bに入る語句は何か。\n[動機づけ ─ (A)的動機づけ[外的・取り入れ的・同一化的・統合的調整] / (B)的動機づけ[内発的調整]]", "a": "A：外発\nB：内発", "exp": "外発的動機づけとは、「報酬がもらえるから」「罰を受けたくないから」のように、外的な要因によってもたらされる動機づけである。一方内発的動機づけとは、「その行動が楽しいから」のように、自分自身の中に動機づけの源泉が存在する動機づけのことである。"}, {"q": "純粋な好奇心や楽しみに基づいて行っている活動に対して、外から報酬を与えると、かえって動機づけが低下することがある。この現象のことを何と呼ぶか。", "a": "アンダーマイニング効果", "exp": "内発的動機づけによる行動に対して、外的な報酬を与えると、内発的動機づけが低下することがある。これをアンダーマイニング効果と呼ぶ。"}, {"q": "セリグマン（Seligman, M. E. P.）は、対処不可能な電気ショックを与え続けることで、イヌが無気力になることを実証的に示した。この現象のことを何と呼ぶか。", "a": "学習性無力感", "exp": "学習性無力感は、制御不可能な状況にさらされ続けることで、対処が不可能であることを学習し、無気力になった状態のことである。"}, {"q": "ワイナー（Weiner, B.）は、失敗や成功に対する原因帰属の仕方が動機づけに影響を与えるとして、帰属を3つの次元によって分類しているが、それぞれ何という次元か。", "a": "原因の所在（内的・外的）、安定性（安定的・不安定的）、統制可能性", "exp": "原因の所在とは、原因が自分にあるのか、自分の外にあるのかという次元であり、安定性とは、その結果が一時期的なものか継続的なものかという次元である。そして統制可能性とは、自分自身でコントロールできるのか否かという次元である。"}, {"q": "デシとライアン（Deci, E. L. & Ryan, R. M.）は、「自律性」「有能さ」「関係性」という3つの要素から人間の動機づけを理論化した。この理論のことを何というか。", "a": "自己決定理論", "exp": "Q064における内発的動機づけと外発的動機づけの分類も、自己決定理論によるものである。自己決定理論では、動機づけが内発的なものか外発的なものかではなく、その動機がどのくらい自律的なものであるかに重きを置いている。"}, {"q": "デュエックら（Dweck, C. S. et al.）は、学業場面などにおける行動や認知、感情は、学習の認知する目標によって影響されることを提唱した。この理論のことを何というか。", "a": "達成目標理論", "exp": "デュエックらは、主な目標として、課題を習得し、能力を高めようとする学習目標と、自分の能力の高さを示し、悪い評価を避けようとする遂行目標の2つを挙げている。"}, {"q": "どのような指導法が有効かは、学習者の特性によって異なる。この現象のことを何と呼ぶか。", "a": "適性処遇交互作用（ATI）", "exp": "クロンバック（Cronbach, L. J.）が提唱した現象である。学習者の持っている知能や性格、認知スタイルなど（適性）によって、指導法（処遇）の効果は異なるとされる。"}, {"q": "子どもに、学習の内容について完全に理解することをめざす考え方を何と呼ぶか。", "a": "完全習得学習", "exp": "これは、ブルーム（Bloom, B. S.）が、キャロル（Carroll, J. B.）の理論を発展させ、提唱したものである。ここから、教育目標の分類や評価の方法などが理論化された。"}, {"q": "ブルーナー（Bruner, J. S.）が「教育の過程」などで提唱した学習法を何と呼ぶか。", "a": "発見学習", "exp": "発見学習とは、ただ課題をこなすだけではなく、学習者自身が問題を考え、発見に至るような思考を身につけるための学習法である。わが国では、仮説実験授業などの形で実践が行われている。"}, {"q": "オーズベル（Ausubel, D. P.）は、単に新しい知識を身につけるだけでなく、それを既に持っている知識構造の領域と結びつける意味づけの意味処理が促進されるとした。このような学習を何と呼ぶか。", "a": "有意言語言語学習（有意味受容学習）", "exp": "オーズベルは、知識の獲得に際し受容という能動的認知過程が重要であるとしている。受容とは、新しい知識を、すでに既に持っている知識構造と結びつけ意味を持たせることであり、自らの知識体系の中に主体的に位置づけることである。"}, {"q": "オーズベルによる学習法において、新たな知識を効果的に受け入れるうえで、その知識に関連する知識構造の領域を活性化させるために、あらかじめ提供される情報を何というか。", "a": "先行オーガナイザー", "exp": "先行オーガナイザーには説明オーガナイザーと比較オーガナイザーとがある。適切な先行オーガナイザーを提供することで、その後の知識の理解は促進される。"}, {"q": "スキナー（Skinner, B. F.）が提唱したプログラム学習における原理のうち、小さな課題を少しずつ出していくとする原理を何と呼ぶか。", "a": "スモールステップの原理", "exp": "プログラム学習では、学習者が主体的に取り組むこと（積極的反応の原理）や、小さな課題を少しずつ出していくこと（スモールステップの原理）、解答に対する正誤などの情報を即時伝えること（即時確認の原理）、学習者自身のペースで学習を進めること（自己ペースの原理）などが重視されている。"}, {"q": "スキナーは直線型のプログラム学習を考案したが、枝分かれ型のプログラム学習を考案したのは誰か。", "a": "クラウダー（Crowder, N. A.）", "exp": "スキナーは、すべての学習者が同じステップで学習を行う直線型プログラムを考案したが、クラウダーはステップでの正誤解答によって、与えられる課題が変化する枝分かれ型プログラムを提唱した。"}, {"q": "評価を行う時期による、教育評価の分類を提唱した米国の教育心理学者は誰か。", "a": "ブルーム（Bloom, B. S.）", "exp": "ブルームは、各教育評価の概念を区別し、その概念や方法を確立した。"}, {"q": "指導を行う前の評価、指導期間の途中で行う評価、指導が完了した後に行う評価をそれぞれ何と呼ぶか。", "a": "診断的評価・形成的評価・総括的評価", "exp": "診断的評価は学習者の事前の準備状態を、形成的評価は指導期間内における学習内容の理解状況を把握することで、指導の工夫・改善に役立てることができる。また総括的評価は、当初の目的がどの程度達成できたかということを評価するものである。"}, {"q": "総括的評価が持つ2つの機能は何か。", "a": "指導機能・管理機能", "exp": "指導機能とは、評価結果を今後の指導計画や指導方法の改善に役立てる機能のことである。一方管理機能とは、評価結果を用いて成績の評定を行ったり、進学や就職などの資料として役立てたりする機能のことである。"}, {"q": "教育評価における方法のうち、目標への到達の程度に基づいて評価する方法と、所属集団内での相対的位置によって評価する方法をそれぞれ何と呼ぶか。", "a": "絶対評価・相対評価", "exp": "絶対評価は、目標基準準拠評価や到達度評価とも呼ばれるものである。一方、相対評価は、集団準拠評価とも呼ばれる。"}, {"q": "上記の2つの評価方法のうち、評価の指標として偏差値を用いるのがより適切なのはどちらか。", "a": "相対評価", "exp": "偏差値のほかにも、パーセンタイル順位など、集団内の位置を示す数値が、相対評価の指標として用いられる。"}, {"q": "評価の基準を、子ども一人一人の個人基準に設定する評価を何と呼ぶか。", "a": "個人内評価", "exp": "個人内評価には、子どもの中でどの科目が得意・不得意かなどのプロフィールによって評価を行う横断的評価と、以前に比べてどれくらい進歩したかという時間的変化の評価を行う縦断的評価がある。"}, {"q": "勉強がよくできる子どもは、性格も良いと教師から判断されやすくなるような現象のことを何というか。", "a": "ハロー効果（後光効果、光背効果）", "exp": "ハローとは後光の意味であり、ハロー効果とは、他者が何か望ましい（あるいは望ましくない）特徴を持っているときに、その人物の別の側面まで望ましい（あるいは望ましくない）と評価されやすくなる現象のことである。"}, {"q": "ローゼンタールら（Rosenthal, R. et al.）の実験で知られる、教師の生徒に対する肯定的な期待によって、実際に生徒の成績が向上する現象を何というか。", "a": "ピグマリオン効果（教師期待効果）", "exp": "期待を持つことによって、教師の生徒に対するかかわり方が変容することがこの効果の本質である。逆に、否定的な期待によって成績の低下が起こる現象をゴーレム効果と呼ぶ。"}, {"q": "学習に際し、課題全体をまとめて学習する方法と、課題を分割し、部分ごとに学習を行っていく方法を、それぞれ何というか。", "a": "全習法・分習法", "exp": "これは、学習内容の配分による分類である。また、学習時間の配分による分類としては、続けて課題へ取り組む集中学習と、休憩をはさみながら行う分散学習がある。"}, {"q": "書道を習うことで鉛筆による筆記も上達するなどのように、前に学習したことが、その後の学習に影響を及ぼすことを何というか。", "a": "転移", "exp": "問題文のように、前に学習したことが、その後の学習に良い影響を与えることを正の転移、妨害的に働くことを負の転移という。なお、精神分析における転移とは別の概念である。"}, {"q": "潜在的な学習能力（知能）に対して、著しく学業成績の悪い者、反対に著しく学業成績の良い者をそれぞれ何というか。", "a": "アンダー・アチーバー／オーバー・アチーバー", "exp": "アンダー・アチーバーは、潜在的な能力を十分に発揮できていない状態であることを示すため、どういった要因が学業を低下させているのかを同定し、支援を行う必要がある。"}, {"q": "加盟国を中心として、学習到達度調査（PISA）を実施している国際機関は何か。", "a": "OECD（経済協力開発機構）", "exp": "OECDが実施しているPISAは、単なる知識の量だけでなく、知識を活用する問題解決能力などもとらえようとするものであり、わが国の教育政策でもしばしば注目されている。"}, {"q": "知能の2因子説を提唱したのは誰か。", "a": "スピアマン（Spearman, C. E.）", "exp": "2因子説とは、語学や音楽、数学など、すべての知的活動に寄与する一般因子と、各活動個別に寄与する特殊因子の2種類があるとする説である。"}, {"q": "知能の多因子説を提唱したのは誰か。", "a": "サーストン（Thurstone, L. L.）", "exp": "多因子説とは、2因子説のような一般因子は想定せず、主要な因子を複数想定する説である。サーストンは、因子分析を用いた研究に基づき、記憶や推理などを含む7つの知能因子があるとしている。"}, {"q": "知能の3次元構造モデルを提唱したのは誰か。", "a": "ギルフォード（Guilford, J. P.）", "exp": "ギルフォードは当初、内容×所産×操作という3つの次元から、知能について120個の因子を想定した。"}, {"q": "一般知能として流動性知能と結晶性知能の2つを提唱したのは誰か。", "a": "キャッテル（Cattell, R. B.）", "exp": "流動性知能とは、計算や記憶、類推など新しい場面での適応を必要とする際に働く知能であり、結晶性知能とは、言葉の理解や知識のように、文化や教育などの学習経験によって得られる能力のことである。"}, {"q": "流動性知能と結晶性知能のうち、加齢による衰退がより顕著なのはどちらか。", "a": "流動性知能", "exp": "流動性知能は、能力のピークが10代後半から20代前半頃までであるとされ、加齢に伴う衰退が顕著である。一方結晶性知能は、能力のピークがより遅く、加齢に伴う衰退も緩やかである。"}, {"q": "知能構造に関する数多くの研究を再分析し、知能が一般知能を含む3層の構造を持つとしたのは誰か。", "a": "キャロル（Carroll, J. B.）", "exp": "キャロルの分析結果はキャッテルの理論と統合され、CHC理論として知られている。"}, {"q": "1905年にビネー（Binet, A.）とともに知能検査を開発したフランスの精神科医は誰か。", "a": "シモン（Simon, T.）", "exp": "1905年にビネーは、シモンと共同で世界初となる知能検査を開発した。これは当初障害児の早期発見と適切な教育を行う目的で開発された。"}, {"q": "知能指数の概念を提唱したのは誰か。", "a": "シュテルン（Stern, W.）", "exp": "シュテルンは輻輳説の提唱者としても有名である。"}, {"q": "ビネー式知能検査を改訂し、知能指数を取り入れたスタンフォード・ビネー式知能検査を開発したのは誰か。", "a": "ターマン（Terman, L. M.）", "exp": "ターマンは大規模な検査の標準化を行い、これがビネー式知能検査を広める大きなきっかけとなった。"}, {"q": "スタンフォード・ビネー式知能検査において、生活年齢が3歳0か月の子供の精神年齢が4歳6か月であった場合、知能指数はいくつになるか。", "a": "150", "exp": "スタンフォード・ビネー式知能検査では、知能指数は以下の式によって求められる（小数第1位を四捨五入）。\n知能指数(IQ) = (精神年齢(MA) / 生活年齢(CA)) × 100"}, {"q": "田中寛一がビネー式知能検査をもとに考案した知能検査法を何と呼ぶか。", "a": "田中ビネー法", "exp": "田中ビネー法による知能検査は時代を追って改訂が重ねられており、2016年現在の最新版は田中ビネー知能検査Vである。"}, {"q": "ウェクスラー（Wechsler, D.）は幼児、児童、成人を対象とした別個のウェクスラー式知能検査を開発したが、それぞれの検査を何というか。", "a": "WPPSI・WISC・WAIS", "exp": "それぞれWechsler Preschool and Primary Scale of Intelligence、Wechsler Intelligence Scale for Children、Wechsler Adult Intelligence Scaleの略である。"}, {"q": "ウェクスラー式知能検査では、知能指数の算出法が当初のビネー式とは異なっている。ウェクスラー式における知能指数の種類を何と呼ぶか。", "a": "偏差知能指数（DIQ）", "exp": "偏差知能指数とは、同年齢集団における相対的な位置で知能を表すものである。また田中ビネー知能検査Vでも、偏差知能指数が取り入れられている。"}, {"q": "イリノイ大学のカークら（Kirk, S. A. et al.）が学習障害児の診断のために開発した言語学習能力を測定するための検査は何か。", "a": "ITPA", "exp": "ITPAは言語学習能力を回路、過程、水準という3つの次元からとらえ、個人内差を把握するために用いられる。"}, {"q": "カウフマン夫妻（Kaufman, A. S. & Kaufman, N. L.）によって開発された、認知機能をとらえるための検査は何か。", "a": "K-ABC", "exp": "K-ABCでは、認知機能を継次処理と同時処理という視点から子どもの認知の特性を把握することで、個々の子どもに適した教育支援を行うために用いられている。"}, {"q": "1932年に「小児検査、1歳から6歳までの発達検査」を公刊したのは誰か。", "a": "ビューラーとヘッツァー（Bühler, C. & Hetzer, H.）", "exp": "現在使用されている多くの発達検査の原型となっている。"}, {"q": "「小児検査、1歳から6歳までの発達検査」では、知能指数における知能指数や精神年齢に相当する指標をそれぞれ何と呼ぶか。", "a": "発達指数（DQ）・発達年齢（DA）", "exp": "ビネー式の知能検査と同様に下記の式で算出する。\n発達指数(DQ) = (発達年齢(DA) / 生活年齢(CA)) × 100"}, {"q": "1949年に刊行された「小児検査、1歳から6歳までの発達検査」の日本語版は何という名称か。", "a": "乳幼児精神発達検査", "exp": "牛島義友らによって作成されたものである。それ以前にも「ウキシマ式テスト法」という名の日本語版が存在したが、牛島らによって本格的な再標準化が行われた。"}, {"q": "「乳幼児発達診断法」を開発したのは誰か。", "a": "津守真・稲毛教子", "exp": "0歳〜7歳までを対象とした、質問紙形の発達検査である。"}, {"q": "「乳幼児発達診断法」は誰による発達検査をもとにしたものか。", "a": "ゲゼルとアマツルダ（Gesell, A. L. & Amatruda, C. S.）", "exp": "わが国では「発達診断学：小児の正常発達と異常発達」という名で邦訳されている。ビューラーによる発達検査と同様、多くの発達検査の原型となったものである。"}, {"q": "遠城寺宗徳が開発した乳幼児向けの発達スクリーニング検査は何か。", "a": "遠城寺式乳幼児分析的発達検査", "exp": "乳幼児向けの発達スクリーニング検査としてはわが国初のものであるとされる。"}, {"q": "1951年に京都市児童院で開発された発達検査は何か。", "a": "新版K式発達検査", "exp": "本検査は、新版K式発達検査2001、新版K式発達検査2020へと改訂が行われ、現在も使用されている。"}, {"q": "上田礼子らによって1980年に公表された発達スクリーニング検査は何か。", "a": "日本版デンバー式発達スクリーニング検査", "exp": "フランケンバーグ（Frankenburg, W. K.）とドッツ（Dodds, J. B.）による「デンバー式発達スクリーニング検査」の日本版である。現在では、改訂日本版デンバー式発達スクリーニング検査が用いられている。"}, {"q": "グッドイナフ（Goodenough, F.）が1926年に報告した、動作性の知能検査を何というか。", "a": "グッドイナフ人物画知能検査（DAM）", "exp": "子どもの描いた人物画を、各部分の描かれ方や、大きさの比率などによって評価し、精神年齢を算出するものである。"}, {"q": "DSM-5では、知的能力障害などの疾患は何というカテゴリーに分類されているか。", "a": "神経発達症群", "exp": "一般に発達障害とされる多くの疾患は、先天的な神経発達上の障害によるものである。"}, {"q": "DSM-5では、知的能力障害（知的発達症）は重症度が4つの段階に分類されるが、それぞれを何と呼ぶか。", "a": "軽度、中等度、重度、最重度", "exp": "知的能力障害（知的発達症）は、DSM-IV-TRでは精神遅滞と呼ばれ、知能指数が分類の基準となっていたが、DSM-5では、知的機能と適応機能に基づいて分類が行われる。"}, {"q": "かつて自閉症の原因は親の育て方にあるとする見方があった。冷淡な態度の母親を「冷蔵庫マザー」と呼び、自閉症の原因であると主張したのは誰か。", "a": "ベッテルハイム（Bettelheim, B.）", "exp": "自閉症の症例報告から約20年間、自閉症は後天性の精神疾患と考えられ、絶対受容などの対応が推奨されていたが、1960年代には、先天的な障害であることが明らかになっている。"}, {"q": "1943年に自閉症の症例報告を行った米国の精神医学者は誰か。", "a": "カナー（Kanner, L.）", "exp": "カナーによって早期小児自閉症として11人の児童が報告されたことが、自閉症が注目されるきっかけとなった。"}, {"q": "1944年に自閉性精神病質として子どもの症例報告を行ったオーストリアの小児科医は誰か。", "a": "アスペルガー（Asperger, H.）", "exp": "アスペルガーが報告した症例は、カナーによる症例と若干異なり、言語面の遅れが見られないという特徴がある。これは、後にアスペルガー症候群と名づけられた。"}, {"q": "自閉症における基本的な障害である「3つ組」を提唱したのは誰か。", "a": "ウィング（Wing, L.）", "exp": "3つ組とは社会性の障害、コミュニケーションの障害、想像力の障害の3つである。またウィングは、Q117のアスペルガー症候群という言葉の提唱者でもある。"}, {"q": "自分や他者の目的・意図・信念・思考などの心の状態を理解する枠組みのことを何というか。", "a": "心の理論", "exp": "バロン＝コーエン（Baron-Cohen, S.）らによるサリー・アン課題などが有名である。自閉症児における社会性の障害は、この心の理論が十分に備わっていないためであると考えられている。"}, {"q": "DSM-IV-TRにおける自閉性障害やアスペルガー障害は、DSM-5では何と呼ばれているか。", "a": "自閉スペクトラム症（ASD）", "exp": "かつての自閉性障害やアスペルガー障害は、社会的コミュニケーションや対人的相互作用反応の障害と限定された反復的な行動、興味、または活動の様式という2つの症状を中心とする連続的な疾患であるとされている。"}, {"q": "DSM-5における注意欠如・多動症（ADHD）を特徴づける2つの症状は何か。", "a": "不注意、多動性および衝動性", "exp": "DSM-IV-TRでは注意欠陥・多動性障害と呼ばれていた疾患である。2つの症状のいずれかが優勢な群と、両方が混合している群とに分類される。多動性および衝動性については、発達に伴い軽減されることも多い。"}, {"q": "DSM-5における限局性学習症は、どのような能力の障害であるとされるか。", "a": "読字、書字、算数", "exp": "DSM-IV-TRでは学習障害（LD）と呼ばれていた疾患である。知的能力障害ではうまく説明されない、特定の能力の低さを特徴としている。"}, {"q": "以下はわが国における発達障害者支援法に定められている発達障害の定義である。文中の空欄に入る語句は何か。\n「自閉症、アスペルガー症候群その他の広汎性発達障害、学習障害、注意欠如多動障害その他これに類する（　）の障害であってその症状が通常低年齢において発現するものとして政令で定めるものをいう。」", "a": "脳機能", "exp": "ここで挙げられている障害の名称がDSM-5と異なっていることからもわかるように、発達障害の基準や用語の意味などは、医療領域や教育領域などによって異なることがあるため、注意が必要である。"}, {"q": "特別支援教育が実施される以前に、わが国で実施されていた障害など特別なニーズを持つ子どもたちへの教育を何というか。", "a": "特殊教育", "exp": "特別支援教育では、個別の教育支援計画や関連機関の連携による地域での総合的な支援を理念としている。また、対象がLDやADHDの子どもなどにも拡大された。"}, {"q": "わが国において特別支援教育が施行されたのは何年か。", "a": "2007（平成19）年", "exp": "なお、実施に先立つ学校教育法の改正自体は2006（平成18）年に行われている。"}, {"q": "文部科学省による定義では、どのような能力の習得と使用に困難を示す場合に学習障害とされるか。", "a": "聞く、話す、読む、書く、計算する又は推論する能力", "exp": "文部科学省の定義と、DSM-5における限局性学習症とでは、障害に含む能力が異なっている。また文部科学省における学習障害では、基本的に「全般的な知的発達に遅れはない」としている点も、DSM-5と異なる部分である。"}, {"q": "特別支援教育において、教育的支援を行う人や機関との間の連絡・調整を行うために、各学校に置かれている役割を何というか。", "a": "特別支援教育コーディネーター", "exp": "教員や保護者だけでなく、地域の医療・福祉等の機関との間で連携・協力を行うことが期待されている。"}, {"q": "特別支援教育において、教育支援に関連する部局・機関の連携協力を円滑にするためのネットワークとして、都道府県に設置される仕組みを何というか。", "a": "特別支援連携協議会（広域特別支援連携協議会）", "exp": "特別支援教育では、子どもや保護者への継続的な支援のために、地域での多分野・多職種による支援ネットワークが重視されており、さらにネットワーク間の連携・協力も推奨されている。"}, {"q": "軽度の障害を持つ児童生徒が、通常の学級に在籍し特別な場で指導を受けることができる制度を何というか。", "a": "通級（通級による指導）", "exp": "通常の教育課程による学習がおおむね可能である水準の児童生徒が通級指導教室で指導を受けるものであり、1993（平成5）年に制度化された。"}, {"q": "障害など、特別な支援を必要とする児童生徒のために、小・中学校に設置されている学級のことを何というか。", "a": "特別支援学級", "exp": "従来特殊学級と呼ばれていたものである。通級とは違い、児童生徒はこの特別支援学級に在籍することになる。"}, {"q": "特別支援教育の実施に伴い、盲学校、聾学校、養護学校は新たに何という名前でスタートしたか。", "a": "特別支援学校", "exp": "特別支援学校は、地域全体の指導・支援にかかわるセンター的機能も期待されている。"}, {"q": "スクールカウンセリングにおける、3つの主要な援助活動は何か。", "a": "カウンセリング・コンサルテーション・コーディネーション", "exp": "コンサルテーションとは、教師や親など、子どもを援助する立場の人々に対して、子どもの援助を目的として行われる相談援助活動である。またコーディネーションとは、教員や保護者、学外の専門機関との間の連携を仲介する活動である。"}, {"q": "ロジャーズ（Rogers, C. R.）などの取組みによって発展した、グループでの相互作用を通して、自己成長をめざす活動を何というか。", "a": "エンカウンター・グループ", "exp": "ロジャーズによるベーシック・エンカウンター・グループなどの活動の総称である。学校現場では構成的グループエンカウンターという形で実施されることがある。"}, {"q": "生徒を対象に、仲間の相談に乗ったり、援助したりするなどの援助能力を身につける訓練を行い、生徒どうしの援助関係を促進するための取組みのことを何と呼ぶか。", "a": "ピア・カウンセリング（ピア・サポート）", "exp": "ピア・カウンセリングの実施形式はさまざまであり、クラスの生徒全体に訓練を行う場合もある。また、イギリスやカナダではいじめ防止のためにも役立てられている。"}, {"q": "個人や集団を対象として行う、適切な自己主張の訓練のことを何というか。", "a": "アサーション・トレーニング（主張訓練）", "exp": "アサーション・トレーニングとは、単に自分の言いたいことを言うのではなく、周囲への配慮を伴う適切な自己主張を身につけるための訓練である。"}, {"q": "人間関係を効果的に行うための技術・能力のことを何というか。", "a": "ソーシャルスキル（社会的スキル）", "exp": "ソーシャルスキルを身につけるため、個人あるいは集団を対象として行われる訓練を、ソーシャルスキルトレーニング（SST）と呼ぶ。"}, {"q": "自己効力感という概念を提唱したのは誰か。", "a": "バンデューラ（Bandura, A.）", "exp": "自己効力感（セルフ・エフィカシー）とは、自分がある行動を適切かつ効果的に実行できるという感覚のことであり、ソーシャルスキルの実行や学習行動などを適切に実行するために必要であるとされる。"}, {"q": "モレノ（Moreno, J. L.）が提唱した、集団の心理的な特徴を数学的に扱う理論を何というか。", "a": "ソシオメトリー", "exp": "学校現場では学級集団を対象に、集団内の関係を把握するソシオメトリック・テストを実施することがある。"}, {"q": "DSM-5において、特定の場面でのみ一貫して話すことができずに、コミュニケーションや適応の妨げとなる疾患を何と呼ぶか。", "a": "選択性緘黙（場面緘黙）", "exp": "選択性緘黙の子どもは“話さない”のではなく“話せない”のであり、子ども自身も困っていることが多い。学校では、単におとなしい子として見落とされることがあるため注意が必要である。"}, {"q": "DSM-5において、愛着を持っている人物からの分離に対して、過剰な恐怖を示す疾患を何と呼ぶか。", "a": "分離不安症（分離不安障害）", "exp": "正常な分離不安とは異なり、発達的に不適切であり、かつ生活機能に障害が生じている状態が一定期間以上持続した場合に診断される。なおDSM-5では、選択性緘黙とともに不安症群に分類されている。"}, {"q": "突発的、急速で、反復性、非律動性の運動、または発声のことを何というか。", "a": "チック", "exp": "特に、運動チックと音声チックが1年以上持続するものをDSM-5ではトゥレット症という。むやみに指摘すると悪化することも多く、周囲の適切な対応が必要となる。"}, {"q": "DSM-IV-TRにおける反応性愛着障害は、DSM-5において反応性愛着障害と何とに分割して扱われているか。", "a": "脱抑制型対人交流障害", "exp": "DSM-IV-TRにおける反応性愛着障害の2つの下位分類が、DSM-5ではそれぞれ独立して扱われるようになった。"}, {"q": "遊びを通して、子どもに対して行われる心理療法を何というか。", "a": "遊戯療法（プレイセラピー）", "exp": "子どもは、言語能力が十分でないため、言葉を用いた心理療法には適さない。しかしながら、遊びの中に豊かな心の世界が表現されるため、遊びを通して子どもへの心理的援助を行うのが、遊戯療法である。"}, {"q": "各市区町村の教育委員会が、不登校の児童生徒の学習や学校復帰を支援するために運営している教室のことを何というか。", "a": "適応指導教室（教育支援教室）", "exp": "自治体によっては設置していない場合や名称が異なる場合もあるが、適応指導教室という名称が一般的である。近年では「教育支援教室」と言い換えられることも多い。"}, {"q": "発達の研究を行う際に、ある特定の時期において、年齢の異なる群からデータを集め、比較をするというような研究法を何と呼ぶか。", "a": "横断的研究法（横断法）", "exp": "横断的研究法は、1地点で調査が可能であるため、比較的に調査協力者を集めやすいというメリットがあるが、年齢の異なる群の間で見られる差が、発達によるものなのかを同定しにくいというデメリットもある。"}, {"q": "特定の集団を対象として1歳の時点と2歳になった時点でデータを集め、比較をするというような研究法を何呼ぶか。", "a": "縦断的研究法（縦断法）", "exp": "縦断的研究法は、同一の対象から継続的にデータを集めるため、実際の発達の変化を検討しやすいというメリットがあるが、一方で時間（コスト）がかかることや、継続的に調査に参加できる調査協力者を集めにくいというデメリットもある。"}, {"q": "発達研究において、「同時期に同じような経験をした人々」のことを何と呼ぶか。", "a": "コホート", "exp": "たとえば、幼少時が戦争や災害等で栄養不足だった世代と、そうでない世代とでは、同じ年齢時点で発育の状況が異なる。こうした「同時期に同じような経験をした人々」のことをコホートと呼ぶ。"}, {"q": "双子における遺伝子の類似性を利用し、ある特性がどの程度遺伝の影響を受けるのか調べるための発達研究法を何呼ぶか。", "a": "双生児法", "exp": "双生児の遺伝子は、一卵性双生児では100%、二卵性では平均50%が共有される。この関係を利用して、発達や個人差における遺伝的影響の程度を調べる方法である。"}, {"q": "棒の手前に箱がある刺激（下図A）を乳児に提示し、刺激に十分馴れた後に、箱を取り除いてaあるいはbを提示すると、乳児はbが提示されたときに刺激をより長く注視する。このことから、乳児は箱の向こう側で棒がつながっていると認知していたことがわかる。これは何という現象を利用したものか。\n[図A：箱に一部隠された1本の棒]\n[図a：箱を退けると1本の棒がつながっている]\n[図b：箱を退けると中央が切れた2本の棒になっている]", "a": "馴化・脱馴化（視覚的馴化法）", "exp": "馴化とは、強化を伴わずに同一の刺激が繰り返し提示されることで、刺激に対する反応が減少していくことである。一方脱馴化は、新奇な刺激に対して再び反応が喚起されることである。乳児は、考えていることや感じていることを言語で報告することはできないが、この馴化と脱馴化を利用すれば、乳児が外の世界をどのように認知しているのかを調べることができる。"}, {"q": "2つの図を提示し、どちらの図を長く注視するか調べることで、乳児の興味や視覚能力を調べる方法を何と呼ぶか。", "a": "選好注視法（フェンツの選好注視法）", "exp": "ファンツら（Fantz, R. L. et al.）によって開発された。乳児の注視行動をとらえることで、どのような図形を好むのかや、どの程度図形を弁別できるのかといったことを調べることができる。"}], "第4章_社会・感情・性格": [{"q": "19世紀末に、自己を「知る者としての自己（主我）」と「知られる者としての自己（客我）」の2つに分類して自己の重要性を提唱した心理学者は誰か。", "a": "ジェームズ（James, W.）", "exp": "「知られる者としての自己」をさらに「物質的自己」「精神的自己」「社会的自己」の3つの領域に分類した。"}, {"q": "「自己は他者や周囲の状況とは区別され独立した存在である」といった欧米社会で優秀な文化的自己観のことを何というか。", "a": "相互独立的な自己観", "exp": "主に東アジア社会で優秀な「相互協調的な自己観」と、欧米社会で優秀な「相互独立的な自己観」の2つの主要な文化的自己観が提唱されている。"}, {"q": "人には自分の意見や能力を正しく評価したいという欲求があるために、自分と他者を比較する傾向があるとした、フェスティンガー（Festinger, L.）が提唱した理論は何か。", "a": "社会的比較理論", "exp": "自己高揚動機に基づいて、自尊心を上昇させるために自分よりも悪い状況の人と比較する行為を「下方比較」という。また、自己向上動機に基づいて自分より良い状態の人と比較する行為を「上方比較」という。"}, {"q": "自己評価を維持・高揚するために、外集団との境界を明確にしたり、自身の所属する内集団を高く評価したりするとした、タジフェルとターナー（Tajfel, H. & Turner, J. C.）による自己と集団間関係の関連を説明した理論は何か。", "a": "社会的アイデンティティ理論", "exp": "自分がどのような社会集団に所属しているかという自覚に基づいた自己概念のことを社会的アイデンティティという。この自己概念を維持・高揚するために、自身の環境を認知したり、変容するように働きかけたりする。"}, {"q": "リアリー（Leary, M. R.）のソシオメーター理論において、対人関係や社会集団において受容・拒否されている状況を示すために機能しているとされた感情は何か。", "a": "自尊感情", "exp": "自尊感情は自分自身を肯定的に評価しているかを示す感情である。ソシオメーター理論では、社会的環境を監視して他者からの拒絶を察知すると、自尊感情の低下によって危険性を示し、対応をとるように動機づけると考えている。"}, {"q": "自尊感情と文化的世界観（自分の所属する文化における価値観・信念への同一化）が、死に対する不安や恐怖を緩衝する機能を果たしているとした理論は何か。", "a": "存在脅威管理理論（恐怖管理理論）", "exp": "自尊感情や文化的世界観を強く保てているときは、死などの自分の存在を揺るがす恐怖は感じにくいと仮説されている。また、自分の存在を揺るがす恐怖を強く感じると、自尊感情や文化的世界観を高めたいと求める。"}, {"q": "自己効力感（セルフ・エフィカシー）の概念を提唱したカナダの心理学者は誰か。", "a": "バンデューラ（Bandura, A.）", "exp": "そのほかに社会的学習理論を提唱したことでも知られている。"}, {"q": "テッサー（Tesser, A.）の自己評価維持（SEM）モデルにおいて、人が自尊心を保つためにとる行為は「他者との比較（比較過程）」ともう一つは何か。", "a": "栄光浴（反映過程）", "exp": "栄光浴とは、高く評価された他者と自分自身を結びつけることを主張・意識することで、自己評価を上げる行為のことである。自己評価維持モデルは、他者と自己の心理的距離、課題の自己関連性、他者の遂行レベルの3つの要因から構成されている。"}, {"q": "自己呈示の方略の一つで、評価を受ける課題の前に、その遂行に不利な状況を作ることで失敗したときの言い訳の材料を用意する行為を何というか。", "a": "セルフ・ハンディキャッピング（自己ハンディキャップ化）", "exp": "自己呈示は、積極的にポジティブな印象を与えようとする主張的方式（下表）と、ネガティブな印象を低減しようとする防衛的方式があり、セルフ・ハンディキャッピングは後者に該当する。\n[表：主張的方式（主体的行動、取り入り、威嚇、自己宣伝、示範、哀願）]"}, {"q": "自己の内面的な事柄を他者に対して伝える行為を何というか。", "a": "自己開示", "exp": "自己開示は、抑制された感情を発散したり、自身の感情や考えを整理したり、他者との関係性を親密化するなど、さまざまな機能を果たすことが指摘されている。"}, {"q": "マーカス（Markus, H. R.）によって提唱された概念で、自己がかかわる情報処理を行う際に枠組みとして用いられる、体制化された自己知識のことを何というか。", "a": "自己スキーマ", "exp": "自己スキーマと関連する情報は、処理の速度や判断が速くなり、記憶もされやすい。自分に関連づけて物事を記憶すると記憶成績が向上する現象を、自己関連づけ効果という。"}, {"q": "ヒギンズ（Higgins, E. T.）が提唱した理論で、現実自己と理想自己・当為自己の葛藤やずれによって不快感情が生じるとした理論を何というか。", "a": "セルフ・ディスクレパンシー理論（自己不一致理論）", "exp": "現実自己と理想自己の葛藤が生じると不満や悲しみが生じ、現実自己と当為自己の葛藤が生じると罪悪感や不安が生じるとされている。"}, {"q": "自己複雑性が高い人は一般に、ストレッサーによるネガティブな影響や感情の変動が大きいといえるか、それとも小さいといえるか。", "a": "小さい", "exp": "リンヴィル（Linville, P. W.）によると、多様な自己側面を持つことで、一部の自己側面への脅威が生じても、全体の自己側面への影響は小さくなるとされている。"}, {"q": "下図のモデルは、認知の主体（P）と他者（O）と認知の対象（X）の間の態度（矢印）が、ポジティブ（＋）かネガティブ（ー）かを示している。以下のモデルを用いて3者以上の態度の整合性に関する理論を提唱した心理学者は誰か。\n[図：均衡のとれた関係／不均衡な関係]", "a": "ハイダー（Heider, F.）", "exp": "ハイダーは、特に訓練されていない普通の人（naive psychologist）が日常の出来事をどのように理解しているかを明らかにすることを目的とした素朴心理学の立場をとった。図の理論はバランス理論（認知の均衡理論、P-O-Xモデル）である。"}, {"q": "個人が複数の矛盾する認知を同時に持っていると、不快な緊張状態が生じ、それを解消しようと試みると説明した、フェスティンガーが提唱した理論は何か。", "a": "認知的不協和理論", "exp": "認知的不協和が生じると、この緊張を解消しようとし、時には不合理な行動や認知をとる場合もある。"}, {"q": "人は、自分の行動や周囲の状況などを手がかりにして自分を観察することで、自分の態度や感情を推測することが多いとした、ベム（Bem, D. J.）の提唱した理論は何か。", "a": "自己知覚理論", "exp": "自身の内面的手がかりが乏しいときには、自分の内面的状態の推測は他者の内面的状態を知る過程と同じであるととらえた。"}, {"q": "原因帰属のANOVAモデル（共変モデル）を提唱した米国の心理学者は誰か。", "a": "ケリー（Kelley, H. H.）", "exp": "ある事象の原因は、実態（行為の対象）・人（行為の主体）・時／様態（状況）のいずれかに帰属され、そのとき合致性・合意性・一貫性の3つの情報の組合せが基準となって原因の帰属先が決定されると理論化されている。"}, {"q": "基本的な帰属の錯誤において、他者の行為の原因は、状況などの外的要因と、行為者の性格や能力などの内的要因のどちらに帰属されやすいとしているか。", "a": "内的要因", "exp": "外的要因の影響力に比較して、行為者の内的要因を過大評価する傾向がある。また、他者の行動を状況に帰属する傾向を行為者-観察者バイアスという。"}, {"q": "自分にとって良い出来事は自分自身の性格や能力といった内的要因に原因帰属し、悪い出来事は自分の責任ではなく状況や環境などの外的要因に帰属する傾向を何というか。", "a": "セルフサービング・バイアス（自己奉仕バイアス）", "exp": "自己奉仕バイアスともいう。自尊感情の維持・高揚のために生じるという説明や、自身の努力と成功の関連を知覚しやすいために生じるという説明がなされている。
