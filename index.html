<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>心理学検定 究極マスター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: #eef2f5; display: flex; justify-content: center; padding: 20px; color: #2c3e50; }
        #app { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h1 { font-size: 1.5rem; text-align: center; color: #34495e; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-bottom: 25px; }
        .btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border: none; border-radius: 12px; cursor: pointer; font-size: 1.05rem; transition: 0.2s; font-weight: bold; }
        .category-btn { background: #3498db; color: white; box-shadow: 0 4px #2980b9; text-align: left; padding-left: 20px; }
        .category-btn:hover { background: #2980b9; transform: translateY(-2px); }
        .choice-btn { background: #fff; border: 2px solid #dfe6e9; text-align: left; padding-left: 20px; line-height: 1.4; font-weight: normal; }
        .choice-btn:hover { background: #f0f7ff; border-color: #3498db; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60 !important; font-weight: bold; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b !important; font-weight: bold; }
        .hidden { display: none; }
        
        #upload-box { border: 2px dashed #bdc3c7; padding: 40px 20px; text-align: center; border-radius: 15px; background: #f8f9fa; margin-bottom: 20px; transition: 0.3s; }
        #upload-box:hover { border-color: #3498db; background: #f0f7ff; }
        #upload-box input { display: none; }
        #upload-label { background: #2ecc71; color: white; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; transition: 0.2s; }
        #upload-label:hover { background: #27ae60; }
        
        #stats { text-align: right; color: #7f8c8d; font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; }
        #feedback-area { margin-top: 25px; padding: 18px; border-radius: 10px; display: none; }
        .feedback-title { font-weight: bold; font-size: 1.25rem; margin-bottom: 10px; text-align: center; }
        .explanation-text { font-size: 0.95rem; line-height: 1.6; color: #34495e; background: #f9f9f9; padding: 15px; border-left: 5px solid #3498db; border-radius: 4px; }
    </style>
</head>
<body>

<div id="app">
    <h1>心理学検定 究極マスター</h1>
    
    <div id="upload-screen">
        <p style="text-align:center; font-weight:bold; margin-bottom:10px;">作成したExcelファイル（.xlsx）を1つ選択してください</p>
        <p style="text-align:center; font-size:0.85rem; color:#e74c3c; margin-bottom:20px;">※シート分けされた5つの章を自動で読み込みます</p>
        <div id="upload-box">
            <label id="upload-label" for="excel-file">📁 Excelファイルを選択</label>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
            <p id="file-name" style="margin-top: 15px; color: #7f8c8d; font-size: 0.9rem;">ファイルが選択されていません</p>
        </div>
    </div>

    <div id="menu-screen" class="hidden">
        <p style="text-align:center; font-weight:bold; color:#555; margin-bottom:20px;">学習する章を選択してください（ランダム20問）</p>
        <div id="chapter-buttons"></div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="stats">問題 <span id="q-num">1</span> / <span id="q-total">20</span></div>
        <div id="question" style="font-size: 1.15rem; margin: 20px 0; font-weight: bold; line-height: 1.6; min-height: 3em;"></div>
        <div id="choices"></div>
        
        <div id="feedback-area">
            <div id="feedback-result" class="feedback-title"></div>
            <div id="explanation" class="explanation-text"></div>
            <button id="next-btn" class="btn" style="background:#3498db; color:white; margin-top:20px;" onclick="nextQuestion()">次の問題へ ➔</button>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2>テスト終了！</h2>
        <p style="font-size: 1.2rem; margin-top:20px;">あなたのスコア</p>
        <p style="font-size: 4rem; color: #e67e22; font-weight: bold; margin: 10px 0;"><span id="score">0</span> / <span id="total-score">20</span></p>
        <p id="comment" style="font-weight:bold; font-size:1.2rem; margin-bottom:30px;"></p>
        <button class="btn" style="background:#2ecc71; color:white;" onclick="backToMenu()">メニューに戻る</button>
    </div>
</div>

<script>
let database = {}; 
let currentQuestions = [];
let currentIndex = 0;
let currentScore = 0;
let activeChapter = "";

// 予備のダミー（問題数が少ないシート用）
const fallbackDummies = ["精神分析", "行動療法", "認知心理学", "ゲシュタルト心理学", "古典的条件づけ", "オペラント条件づけ", "アイデンティティ", "自己中心性", "基本的帰属の誤り", "ハロー効果", "防衛機制", "投影法"];

document.getElementById('excel-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    document.getElementById('file-name').innerText = file.name + " を解析中...";
    
    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            database = {};
            const chapterContainer = document.getElementById('chapter-buttons');
            chapterContainer.innerHTML = "";
            
            // Excel内のすべてのシート（タブ）を順番に処理
            workbook.SheetNames.forEach(sheetName => {
                // シートを2次元配列（行・列）として読み込む（空白行もスルーするため）
                const range = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {header: 1, defval: ""});
                const validQuestions = [];
                
                let qIdx = -1, aIdx = -1, eIdx = -1;
                
                for (let i = 0; i < range.length; i++) {
                    const row = range[i];
                    if (!row || row.length === 0) continue;
                    
                    // まだ「問題文」「正解」の列が見つかっていない場合、列名を探す
                    if (qIdx === -1 || aIdx === -1) {
                        for (let j = 0; j < row.length; j++) {
                            const cellVal = String(row[j]).trim();
                            if (cellVal.includes('問題') || cellVal.toLowerCase() === 'q') qIdx = j;
                            if (cellVal.includes('正解') || cellVal.includes('解答') || cellVal.includes('答') || cellVal.toLowerCase() === 'a') aIdx = j;
                            if (cellVal.includes('解説') || cellVal.includes('説明') || cellVal.includes('解')) eIdx = j;
                        }
                    } else {
                        // 列名が見つかった以降の行はデータとして抽出
                        const qText = String(row[qIdx] || "").trim();
                        const aText = String(row[aIdx] || "").trim();
                        const expText = (eIdx !== -1 && row[eIdx]) ? String(row[eIdx]).trim() : "（解説はありません）";
                        
                        // タイトル行自体を問題として拾わないように除外条件を設定
                        if (qText !== "" && aText !== "" && !qText.includes('問題文') && !aText.includes('正解')) {
                            validQuestions.push({ q: qText, a: aText, exp: expText });
                        }
                    }
                }
                
                // そのシートに有効な問題があればボタンを作成
                if (validQuestions.length > 0) {
                    database[sheetName] = validQuestions;
                    const btn = document.createElement('button');
                    btn.className = 'btn category-btn';
                    btn.innerText = `📖 ${sheetName} (全${validQuestions.length}問)`;
                    btn.onclick = () => startQuiz(sheetName);
                    chapterContainer.appendChild(btn);
                }
            });
            
            // ボタンが1つも作られなかった場合のエラー処理
            if (Object.keys(database).length === 0) {
                alert("データを正しく読み込めませんでした。Excel内のシートに「問題文」「正解」という項目名があるか確認してください。");
                document.getElementById('file-name').innerText = "エラー：問題が見つかりません";
                return;
            }
            
            // 画面を切り替えてボタンを表示
            document.getElementById('upload-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            
        } catch (error) {
            alert("Excelファイルの解析中にエラーが発生しました。");
            console.error(error);
        }
    };
    reader.readAsArrayBuffer(file);
});

function startQuiz(chapterName) {
    activeChapter = chapterName;
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    
    const allQuestions = database[chapterName];
    // ランダムにシャッフルして最大20問抽出
    let shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
    currentQuestions = shuffled.slice(0, 20);
    
    currentIndex = 0;
    currentScore = 0;
    showQuestion();
}

function showQuestion() {
    const qInfo = currentQuestions[currentIndex];
    const allQuestionsInChapter = database[activeChapter];
    
    document.getElementById('q-num').innerText = currentIndex + 1;
    document.getElementById('q-total').innerText = currentQuestions.length;
    document.getElementById('question').innerText = qInfo.q;
    document.getElementById('feedback-area').style.display = "none";
    
    const choicesDiv = document.getElementById('choices');
    choicesDiv.innerHTML = "";
    
    // 他の正解からダミーを3つ引っ張ってくるAI機能
    let dummySet = new Set();
    let attempts = 0;
    while(dummySet.size < 3 && attempts < 200) {
        let randomRow = allQuestionsInChapter[Math.floor(Math.random() * allQuestionsInChapter.length)];
        let randomAns = randomRow.a;
        if(randomAns && randomAns !== qInfo.a) {
            dummySet.add(randomAns);
        }
        attempts++;
    }
    
    // 万が一ダミーが足りない場合は予備から追加
    let dummyArray = Array.from(dummySet);
    while(dummyArray.length < 3) {
        let fallback = fallbackDummies[Math.floor(Math.random() * fallbackDummies.length)];
        if(fallback !== qInfo.a && !dummyArray.includes(fallback)) dummyArray.push(fallback);
    }
    
    // 正解とダミーを混ぜてシャッフル
    const allChoices = [qInfo.a, ...dummyArray].sort(() => Math.random() - 0.5);
    
    allChoices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'btn choice-btn';
        btn.innerText = choice;
        btn.onclick = () => checkAnswer(btn, choice, qInfo.a, qInfo.exp);
        choicesDiv.appendChild(btn);
    });
}

function checkAnswer(btn, selected, correct, exp) {
    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach(b => b.disabled = true);
    
    const resDiv = document.getElementById('feedback-result');
    const expDiv = document.getElementById('explanation');
    
    if (selected === correct) {
        btn.classList.add('correct');
        resDiv.innerText = "⭕ 大正解！";
        resDiv.style.color = "#2ecc71";
        currentScore++;
    } else {
        btn.classList.add('wrong');
        resDiv.innerText = "❌ 惜しい！";
        resDiv.style.color = "#e74c3c";
        // 本当の正解を緑色にする
        btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
    }
    
    expDiv.innerHTML = `<strong>正解のキーワード：${correct}</strong><br><br>${exp}`;
    document.getElementById('feedback-area').style.display = "block";
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    
    const total = currentQuestions.length;
    document.getElementById('score').innerText = currentScore;
    document.getElementById('total-score').innerText = total;
    
    let comment = "";
    const rate = currentScore / total;
    if (rate === 1) comment = "完璧！全問正解です！この章の知識は本番もバッチリですね！🏆";
    else if (rate >= 0.8) comment = "素晴らしい！心理学検定2級の合格ラインを余裕で超えています！✨";
    else if (rate >= 0.6) comment = "合格圏内です！間違えた問題の解説をよく読み直してみましょう。";
    else comment = "もう一度この章にチャレンジして、基礎を固めましょう！📖";
    
    document.getElementById('comment').innerText = comment;
}

function backToMenu() {
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('menu-screen').classList.remove('hidden');
}
</script>
</body>
</html>
