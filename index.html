"}, {"q": "たとえば占いなどで「実は弱い側面を持つ」「好きなことには集中できる」といったように、実際には誰にでも当てはまるような言葉に対して「当たっている」と感じてしまう現象を何というか。", "a": "バーナム効果", "exp": "フォラー効果ともいう。占いを当たっていると感じる他の理由として、自身の都合の良い情報（当たっている結果）ばかりに注意が向く傾向（確証バイアス）もある。"}, {"q": "以下のような2種類の特性語のリストを用いて、ある人物の性格特性として順に提示して印象を問う実験を行い、その結果から、印象形成のゲシュタルト説を提唱した心理学者は誰か。\nリストA [ 聡明な→器用な→勤勉な→温かい→決断力のある→実際的な→用心深い ]\nリストB [ 聡明な→器用な→勤勉な→冷たい→決断力のある→実際的な→用心深い ]", "a": "アッシュ（Asch, S. E.）", "exp": "全体印象の成立には個々の特性語が均等に寄与せず、「温かい」「冷たい」のように主となる印象形成の機能を果たす特性（中心特性）と、そうでない特性（周辺特性）があることを示した。"}, {"q": "他者の印象を形成する情報について、望ましい情報と望ましくない情報が提示されたとき、望ましくない情報を重視して、それに基づいた印象を形成する傾向を何というか。", "a": "ネガティブ・バイアス（否定性効果）", "exp": "人は損失を避けたいと思う傾向が強く、ネガティブな情報に敏感であるため生じる。"}, {"q": "他者のある特徴に対して良い印象を形成していると、その人物の他の側面に対してまで良い印象を適用してしまう現象を何というか。", "a": "ハロー効果（光背効果、後光効果）", "exp": "良い印象・評価だけでなく、悪い印象・評価も全体に適用されることがある。"}, {"q": "偏見や社会的差別などの否定的影響を伴いうる客観的属性のことを何というか。", "a": "スティグマ", "exp": "奴隷や犯罪者などに記された「烙印」が語源である。"}, {"q": "自分がステレオタイプ的な扱われ方をされる可能性があるときに、それを意識することで生じる不快感や、ステレオタイプに沿ったような行動をとってしまう現象を何というか。", "a": "ステレオタイプ脅威", "exp": "自己成就予言の一種とも位置づけられる。"}, {"q": "ブルーナーら（Bruner, J. S. et al.）が提唱した、自身の経験や価値観をもとに、人間のパーナリティについて信念体系を形成しているという理論を何というか。", "a": "暗黙のパーソナリティ理論（IPT）", "exp": "「口調が荒い人は深もろい」「色白の人はおとなしい」など、複数の特性間に関連性を仮定して信念化する。なお特定のカテゴリーに対する固定的な特性の信念がステレオタイプである。"}, {"q": "フィスクとニューバーグ（Fiske, S. T. & Neuberg, S. L.）の印象形成の連続体モデルにおいては、カテゴリー依存型処理とピースミール依存型処理のどちらが先に行われると仮定されているか。", "a": "カテゴリー依存型処理", "exp": "連続体モデルでは、まず印象形成の対象となる人物の該当するカテゴリー情報に基づいて印象を形成し（カテゴリー依存型処理）、その後、必要があれば対象人物の断片的な情報から精査して印象を形成し直す（ピースミール依存型処理）。"}, {"q": "概念間の連合強度を反応時間実験によって測定することで、ある事象に対する潜在的な態度を調べる手法を何というか。", "a": "IAT（潜在的連合検査）", "exp": "IAT（Implicit Association Test）とは、顕在化された態度ではなく、人が意識せずに所有している潜在的な態度を連合強度から測定する手法である。"}, {"q": "繰り返し経験する事象や何度も目にしたものに対して好意や親しみを感じる現象を何というか。", "a": "単純接触効果", "exp": "ザイアンス（Zajonc, R. B.）による説である。モアランド（Moreland, R. L.）は実験により、対人魅力にも単純接触効果が生じることを検証した。"}, {"q": "社会的交換理論において、以下のように自身と相手の報酬とコストの比のバランスから二者の関係性を定式化したモデルは投資モデル・衡平モデル・互恵モデルのうちどれか。\n[ 自分の報酬 / 自分のコスト = 相手の報酬 / 相手のコスト ]", "a": "衡平モデル", "exp": "好意や行動や金品などの交換の側面から対人関係をとらえて分析する理論を社会的交換理論という。投資モデルは主に恋愛関係を説明するものであり、現在の関係満足度、それまでの投資、代替関係の有無によって、関係への関与度が決まるとしている。互恵モデルは、「相手から報酬を獲得→関係満足度上昇→相手への投資」といった相互循環過程により二者関係を説明したモデルである。"}, {"q": "リー（Lee, J. A.）の恋愛の6類型において、相手の利益だけを考え、相手のために自分自身を犠牲にすることもいとわないタイプを何というか。", "a": "アガペ", "exp": "マニア（狂気的な愛）、エロス（美への愛）、アガペ（愛他的な愛）、ストーゲイ（友愛的な愛）、プラグマ（実利的な愛）、ルダス（遊びの愛）の6つである。"}, {"q": "対人関係の発展を段階的に説明したマースタイン（Murstein, B. I.）のSVR理論において、関係の中期に重要とされている要因は何か。", "a": "価値観（Value）", "exp": "SVR理論は配偶関係の進展に関するモデルである。関係の初期には相手から受ける刺激（Stimulus）、中期は相手との価値観（Value）の共有、後期は互いの役割（Role）の適合性が重要とされる。"}, {"q": "対人関係の進展は自己開示を行うことで徐々になされていき、関係が親密化すると自己開示の内容が深く広くなっていくとした、アルトマンとテイラー（Altman, I. & Taylor, D. A.）の説を何というか。", "a": "社会的浸透理論", "exp": "自己開示には返報性があり、相手の自己開示に対して、同様の深さの自己開示を返すといった、暗黙の規範が存在しているとされた。"}, {"q": "多数の人が個人の利益を追求した結果、集団全体として好ましくない事態が発生するような葛藤状況を何というか。", "a": "社会的ジレンマ", "exp": "オリヴァーら（Oliver, P. E. et al.）は限界質量の理論を提唱し、一定水準の人数が協力的な態度をとると協力率が拡大し、社会的ジレンマの解消につながるとしている。"}, {"q": "シェリフら（Sherif, M. et al.）の「泥棒洞窟実験」では少年を2グループに分けて、さまざまな競争課題を与えたところ、相手集団に対する敵意や攻撃行動が生じた。しかし、（　）を設定したところ、協力的な行動が増え、敵意が減少した。空欄に当てはまる語句は何か。", "a": "上位目標", "exp": "上位目標とは、複数の下位集団が協力することで達成できる共通の目標である。この実験では「食料を積んだトラックが溝にはまり、全員が協力しないと食料を得られない」といった課題を用いた。"}, {"q": "キティ・ジェノヴィーズ事件のように、目撃者が多数存在するにもかかわず誰も行動を起こさないような現象を（ A ）と呼ぶ。その発生原因として、否定的な結果の責任分散、行動や結果に対する周囲からの評価懸念、他者が積極的に行動しないことから事態は緊急でないと考える（ B ）が挙げられる。空欄A・Bに入る語句は何か。", "a": "A：傍観者効果\nB：多元的無知（多数の無知）", "exp": "傍観者効果とは、ある事件に対して自分以外の他者（傍観者）が存在すると率先した行動が抑制される現象である。ラタネとダーリー（Latané, B. & Darley, J. M.）によって実験的に検証された。キティ・ジェノヴィーズ事件とは、1964年にニューヨークで起こった殺人事件であり、目撃者が多数いたにもかかわらず、誰も助けに入ったり通報したりしなかったとして話題となった。"}, {"q": "報酬を期待することなく、他者のために自発的になされる社会的行動のことを何というか。", "a": "援助行動（向社会的行動）", "exp": "他者に利益をもたらす行動全般を向社会的行動という。援助行動の中でも、自分の利益よりも他者の幸福を大切とする価値観に基づいて行われる行動を利他行動という。"}, {"q": "以下の空欄A〜Dに当てはまる語句をa〜dから選べ。\n複雑な作業は、一人で作業を行う場合に比べて、同じ作業を行ったり作業を見ていたりする他者が存在している場合は作業効率が（ A ）するが、単純な作業は作業効率が（ B ）する。前者の現象を（ C ）、後者の現象を（ D ）と呼ぶ。\n[ a.上昇  b.下降  c.社会的促進  d.社会的抑制 ]", "a": "A：b (下降)\nB：a (上昇)\nC：d (社会的抑制)\nD：c (社会的促進)", "exp": "一般に単純な課題のときは社会的促進が生じ、複雑な課題のときは誤反応が増えて社会的抑制が生じる。ザイアンスは、他者の存在によって覚醒水準が上昇するため、習熟した課題は反応が促進されるが、未熟な課題は誤反応が増えるために上記のような現象が生じると説明した（動因説）。"}, {"q": "集団で課題を遂行する際に、人数が多くなるほど1人当たりの努力量や貢献度が小さくなる現象のことを何というか。", "a": "社会的手抜き（社会的手抜き現象）", "exp": "社会的手抜きは、個人の貢献度がわかりにくい場合や、課題の魅力が低い場合、成員の関与度が低い場合に生じやすい。逆に努力量を高める現象は社会的補償という。"}, {"q": "観察者の存在が個人の課題遂行に与える影響力の強さを説明した社会的インパクト理論を提唱した米国の心理学者は誰か。", "a": "ラタネ（Latané, B.）", "exp": "社会的インパクト理論では、観察者の存在が個人の遂行に与える影響力は、観察者が持つ勢力、観察の直接性・近接性、観察者と被観察者の人数によって規定されるとしている。\n[図4.1 多数が1人を観察（影響が集中）／ 1人が多数を観察（影響が分散）]"}, {"q": "集団で話し合いを行って意思決定を行うと、単独での意思決定に比べて決定内容がより極端なものになりやすい現象を何というか。", "a": "集団極性化（集団分極化）", "exp": "決定内容がより安全志向に傾くことをコーシャスシフト、リスクの高い志向に傾くことをリスキーシフトという。なおこの現象は集団凝集性の高い集団ほど生じやすい。"}, {"q": "下図のような標準線図形を用いて、線分の長さを比較判断するという単純な課題の実験から同調現象を検証した心理学者は誰か。\n[図：標準刺激 ─ 比較刺激(A B C)]", "a": "アッシュ（Asch, S. E.）", "exp": "「標準刺激の線分と同じ長さのものは比較刺激の3本のうちどれか」という極めて簡単な課題にもかかわらず、他の実験参加者（サクラ）全員が同一の誤った回答をすると、その回答に引きずられて誤った回答をするという現象が生じた。集団において、その成員をさまざまな一致に向かわせようとする現象を集団斉一性の原理という。"}, {"q": "「アイヒマン実験」とも呼ばれる実験によって、人は権威者から下された命令にどこまで服従するかを調べた米国の心理学者は誰か。", "a": "ミルグラム（Milgram, S.）", "exp": "この実験から、人は状況によっては反道徳的な行動もとりうることを示した。ジンバルドー（Zimbardo, P. G.）もまたスタンフォード監獄実験から、人は与えられた役割に沿って行動するうちに非道道的な行為もいとわなくなる可能性を示唆した。"}, {"q": "群衆の中にいる状況で、自分を個別の存在としてとらえず、集団の一部に自己を埋没させてしまうことを何というか。", "a": "没個性化", "exp": "この状況だと自己規制力が低下し、反社会的な行動が起きやすくなる。例としてサッカーのフーリガンや集団リンチなどが挙げられる。"}, {"q": "以下の空欄A・Bに当てはまる語句は何か。\nフレンチとレイヴン（French, J. R. P., Jr. & Raven, B. H.）は社会的勢力を5つに分類している。たとえば、後輩は先輩に従わなければならないという規範がある場合、先輩は（ A ）勢力といえる。一方で後輩が先輩に憧れを抱いており積極的に先輩の影響を受けたいという場合、先輩は（ B ）勢力といえる。", "a": "A：正当\nB：参照（準拠）", "exp": "社会的勢力とは他者（被影響者）の行動や態度を変容させる能力のことである。フレンチとレイヴンは社会的勢力の基盤を、①被影響者に報酬を与えることができる賞（報酬）勢力、②被影響者に罰を与えることができる罰（強制）勢力、③影響者が専門的な知識や技術を持つ専門勢力、④文化的な規範や権利により影響を与える正当勢力、⑤影響者への理想的同一視による参照（準拠）勢力の5つに分類した。"}, {"q": "以下の空欄A・Bに当てはまる語句をa〜dから選べ。\n集団討議場面において、集団極性化や同調は（ A ）が高いほど生じやすい。このような状況では多数派の影響が優勢となりやすいが、少数派は（ B ）のある態度をとることで影響力を高める可能性がある。\n[ a.集団凝集性  b.課題への関与  c.感受性  d.一貫性 ]", "a": "A：a (集団凝集性)\nB：d (一貫性)", "exp": "集団凝集性とは、その集団のまとまりの良さや、集団成員としての動機づけの高さの総体のことである。集団凝集性が高いほど集団極性化や同調は起こりやすくなる。また、集団討議において個人の課題への関与が低いほど、集団極性化や同調の傾向は高くなる。少数派は一貫した態度をとることで影響力が高くなりうる。"}, {"q": "以下で示されるような、ジャクソン（Jackson, J. M.）の提唱した集団規範を量的に測定するモデルは何というか。\n[図：行動次元(高←望ましさ→低) × 最大リターン点/許容範囲]", "a": "リターン・ポテンシャル・モデル", "exp": "行動次元を横軸に取り、望ましさの評価を縦軸に取ったグラフにより、その集団の許容される行動の範囲と最適点を導くことができる。"}, {"q": "以下のAとBの説得技法の名称は何か。\nA：先に小さな要請に対して承諾をさせ、その後大きな要請を行う。\nB：先に大きな要請をしてわざと拒絶させ、その後目的にする比較的小さな要請をする。", "a": "A：フット・イン・ザ・ドア・テクニック\nB：ドア・イン・ザ・フェイス・テクニック", "exp": "それぞれ「段階的要請法」「譲歩的要請法」ともいう。フット・イン・ザ・ドア・テクニックは一貫した行動をとりたい欲求を利用した技法であり、ドア・イン・ザ・フェイス・テクニックは、譲歩の互換性を利用した技法といえる。そのほかにローボール・テクニック（承諾先取り法）といった説得技法もある。"}, {"q": "一般に、説得者の信憑性が高いと説得力は高くなるが、説得メッセージを受け取ってから時間が経過すると説得者の信憑性による説得力の差は小さくなる。この現象を何というか。", "a": "スリーパー効果（仮眠効果）", "exp": "信憑性は専門性と信頼性の2つからなる。信憑性の効果が時間経過によって弱くなるのは、説得内容と送り手の記憶が徐々に分離するためである（手がかり分離仮説）。"}, {"q": "説得メッセージの受け手の情報処理の動機づけと能力によって、説得メッセージの情報処理過程が異なることを示した、ペティとカシオッポ（Petty, R. E. & Cacioppo, J. T.）の提唱した理論は何か。", "a": "精緻化見込みモデル", "exp": "説得メッセージの受け手の情報処理の動機づけや能力が高い場合は、メッセージ内容を熟慮して判断が行われる（中心ルート）が、情報処理の動機づけや能力が低い場合は、熟慮せずにメッセージの内容以外の情報から判断が行われる（周辺ルート）。"}, {"q": "以下の空欄A・Bに当てはまる語句は何か。\nリーダーシップ理論の代表的なものに、三隅二不二のPM理論とフィードラー（Fiedler, F. E.）の（ A ）モデルがある。PM理論ではリーダーシップの機能として目標達成機能（P）と（ B ）機能（M）を挙げている。（ A ）モデルでは集団の状況に応じて効果的なリーダーシップの形が異なることを示している。", "a": "A：条件（状況）即応モデル\nB：集団維持", "exp": "どちらも目標達成（課題志向）型の機能と、集団維持（人間関係志向）型の機能を扱ったリーダーシップ理論である。条件即応モデルでは、低LPC（課題志向）型は集団を完全に統制した状況もしくはまったく統制できていない状況で効果的であり、高LPC（人間関係志向）型は中程度の状況で効果的だとしている。"}, {"q": "説得者の意図した方向とは逆に被説得者の態度が変容することを何というか。", "a": "ブーメラン効果", "exp": "高圧的な説得を受けると、被説得者は自由が侵害されたと感じ、反発したり態度を硬化させたりする傾向がある（心理的リアクタンス）。"}, {"q": "ノエル＝ノイマン（Noelle-Neumann, E.）が提唱した世論形成過程の仮説で、少数派は否定や孤立を恐れるために意見の表明を抑制し、多数派の意見ばかりが表明されていく過程を何というか。", "a": "沈黙の螺旋現象（世論形成の公共化モデル）", "exp": "多数派への同調行動から振り返り、多数派の意見ばかりが強調されていくと考えられる。"}, {"q": "自分自身はマスコミュニケーションの影響をそれほど受けていないが、世間一般の他者はマスコミュニケーションの影響を受けているととらえる傾向を何というか。", "a": "第三者効果", "exp": "デイヴィソン（Davison, W. P.）が提唱した理論である。マスコミュニケーションの自分への影響は過小評価し、他者への影響は過大評価する傾向がある。"}, {"q": "選挙の事前報道の際に優勢と報じられた候補者へさらに票が集まったり、逆に苦戦と報じられた候補者へ同情票や激励票が集まったりと、報道がその対象に影響を与えてしまうことを何というか。", "a": "アナウンス効果", "exp": "優勢と報じられた候補者にさらなる票が集まるような現象をバンドワゴン効果（勝ち馬効果）と呼び、苦戦と報じられた候補者へ同情票や激励票が集まることをアンダードッグ効果（負け犬効果）と呼ぶ。"}, {"q": "著書「デマの心理学」で流言現象を個人間情報伝達としてとらえ、また、流言の流布量を内容の重要度と内容の曖昧さの積として定式化した米国の心理学者は誰か。", "a": "オールポート（Allport, G. W.）", "exp": "オールポートはパーソナリティ心理学の分野でも活躍しており、特性論の立場から個人のパーソナリティ構造を分析している。なお、兄（Allport, F. H.）も社会心理学者である。"}, {"q": "感情は動物の生存にとって必要であったために、進化の過程を経て持続し洗練されてきたと考えた19世紀のイギリスの自然科学者は誰か。", "a": "ダーウィン（Darwin, C. R.）", "exp": "ダーウィンは人間の表情と動物の表情の間の共通性を明らかにし、それらの表情は進化の過程で発達・適応していったと仮定した。"}, {"q": "「悲しいから泣くのではなく、泣くから悲しい」といった、身体的反応がフィードバックされ、前頭葉腹内側部での直観的な意思決定に影響を与えるとする、脳内環境のバランスを一定に保つ機能（ホメオスタシス）を担っているとする説を何というか。", "a": "ジェームズ＝ランゲ説（感情の末梢説）", "exp": "ジェームズは、刺激が大脳皮質で知覚されると、内臓や骨格筋などに変化が生じ、その身体的反応が脳に伝えられて、それを知覚することで感情が発生すると主張した。同時期にランゲ（Lange, C.）も同様の説を提唱した。この2人の説をまとめてジェームズ＝ランゲ説と呼ぶ。"}, {"q": "視床和大脳皮質の信号のやり取りにより感情体験が生じ、また同時に視床下部から末梢身体にも情報が送られ身体的な反応が引き起こされるとした、感情発生メカニズムの理論を何というか。", "a": "キャノン＝バード説（感情の中枢説）", "exp": "キャノン（Cannon, W. B.）は共同研究者のバード（Bard, P.）とともに実験的研究を実施し、情動経験と情動発現それぞれ発生メカニズムについて検討して、ジェームズ＝ランゲ説を批判した説を提唱した。"}, {"q": "感情は、自律神経系の活性化による生理的覚醒と、その状況をもとに生理的覚醒の原因や理由の解釈（ラベリング）によって決定されるとした、シャクターとシンガー（Schachter, S. & Singer, J.）による感情発生メカニズムの理論を何というか。", "a": "感情の2要因理論（情動の2要因説）", "exp": "シャクターらの実験では、実験参加者にアドレナリンを注射して生理的覚醒を高め、快感情を喚起するような状況を観察させると快感情が生じ、不快感情を喚起するような状況だと不快感情が生じていた。"}, {"q": "感情の認知理論の立場をとるアーノルド（Arnold, M. B.）の理論において、感情生起過程で対象への接近-回避行動の決定の前に生じる過程は何か。", "a": "評価（認知的な評価）", "exp": "アーノルドは感情生起過程において、まず対象の評価（good-bad）が行われ、それに基づいて生じる接近-回避の行動傾向が感情だとしている。"}, {"q": "以下の空欄に当てはまる語句は何か。\n単純接触効果を提唱した（　）は、認知と感情は独立した体系であり認知過程を経なくても感情を生み出すことができると主張して、感情の認知理論を批判し、ラザルス（Lazarus, R. S.）と論争を広げた。", "a": "ザイアンス（Zajonc, R. B.）", "exp": "ザイアンスは感情生起過程において認知的評価を必要としないと主張した。一方でラザルスは不快感情生起において、その刺激の対処可能性を評価（二次的評価）する過程を経ると論じた。"}, {"q": "一般的に、感情が生起するとそれに応じて表情が変化するが、その一方で、表情を変化させるとそれに応じて感情も変化しうるという仮説を何というか。", "a": "表情（顔面）フィードバック仮説", "exp": "顔面の筋肉の活動が中枢に影響を与えるという説である。身体的情報の情報が脳に伝えられて感情が生じるという点で、ジェームズ＝ランゲ説と類似している。"}, {"q": "ダマシオ（Damasio, A. R.）が主張した、感情生起に伴って生じる身体的反応がフィードバックされ、前頭葉腹内側部での直観的な意思決定に影響を与えるとする仮説を何というか。", "a": "ソマティック・マーカー仮説", "exp": "ダマシオは、危険などに直面した時に身体に起こる反応を脳に伝える信号をソマティック・マーカーと呼んでいる。"}, {"q": "感情と関連する生理反応を生み出す自律神経系のうち、活性化することで心拍数や呼吸数を上昇させたり瞳孔を拡大させたりする機能を持つのは、交感神経系と副交感神経系のどちらか。", "a": "交感神経系", "exp": "自律神経系は内臓の筋肉や分泌腺などを支配する神経系であり、体内環境のバランスを一定に保つ機能（ホメオスタシス）を担っている。休息中や睡眠中は副交感神経系が優位に働く。"}, {"q": "トリプトファンから生合成されるモノアミンで、不足すると抑うつ状態や怒り感情を引き起こす原因となりうる神経伝達物質は何か。", "a": "セロトニン", "exp": "セロトニンは情動的衝動や行動的衝動の抑制に関与しており、うつ病や強迫性障害（強迫症）などの特徴としてセロトニンの低下が見られる。"}, {"q": "以下の空欄に当てはまる語句は何か。\n（　）はアドレナリンやノルアドレナリンの前駆体でもある神経伝達物質である。（　）の分泌は幸福感などの快感をもたらすが、分泌が過剰となると統合失調症やトゥレット症の病因となりうる。", "a": "ドーパミン", "exp": "ドーパミンは快感情を司る神経伝達物質である。ドーパミンは、主に怒り・不安・恐怖に影響を与えるノルアドレナリン（ノルエピネフリン）と、主に感情安定に影響を与えるセロトニンと合わせて、感情や記憶などの重要な機能と深く関連していることから三大神経伝達物質と呼ばれる。"}, {"q": "大脳辺縁系の中で特に強く視床と結合を持ち、恐怖感情などの感情活動に大きく関与しているとされ、右図のAで示した部位は何というか。\n[図：脳の断面図、側頭葉の内側奥にあるアーモンド形の部位A]", "a": "扁桃体（扁桃核）", "exp": "大脳辺縁系を構成する部位で、視床に対して交感神経系の信号を伝達している。感情や記憶の働きに重要な機能を果たしている。"}, {"q": "表情研究から、表情や感情は文化依存的ではなく人類に普遍的な特徴であり、怒り・嫌悪・恐れ・幸福・悲しみ・驚きといった6種類（近年は軽蔑も加えて7種類とした）の基本感情があると提唱した心理学者は誰か。", "a": "エクマン（Ekman, P.）", "exp": "エクマンは顔面筋肉から客観的に表情を分類するためのシステム（FACS：Facial Action Coding System）を考案している。またエクマンは、基本的な感情と表情の関連は普遍的であっても、どのような場面でどのような表情をするかは集団によって異なるとした神経文化説を提唱した。"}, {"q": "ラッセル（Russell, J. A.）の感情円環モデルでは、感情は2次元上に配置されるとしている。その次元とは「快-不快」ともう1つは何か。", "a": "覚醒-睡眠（活性-不活性）", "exp": "ラッセルは下図のように2次元上に感情の分類を示した。\n[図：横軸が快―不快、縦軸が覚醒―睡眠の円環グラフ。快側に安心、興奮、不快側に抑うつ、苦悩など]"}, {"q": "ルイス（Lewis, M.）は羞恥心や罪悪感などの感情を、一次的感情と二次的感情のどちらとしているか。", "a": "二次的感情", "exp": "ルイスは喜び・恐れ・怒り・悲しみ・嫌悪・驚きなどの基本的な感情を一次的感情と呼び、自己意識の認知が関与して発生する感情を二次的感情と呼んでいる。また自己意識を介することから自己意識的感情とも呼んでいる。"}, {"q": "チクセントミハイ（Csikszentmihalyi, M.）が提唱した概念で、ある行為に完全に没入して、精力的に集中している包括的な感覚を得ている状態のことを何というか。", "a": "フロー", "exp": "内発的動機づけ研究において提唱された概念である。注意が対象に向き、自分の意識と行為が融合し、自己への意識感覚が希薄になるといった特徴がある。"}, {"q": "「他人の不幸は蜜の味」といった、他者の不幸や悲しみ、苦しみ、失敗に対して生じる快感情のことを何というか。", "a": "シャーデンフロイデ", "exp": "下方比較によって生じる感情である。"}, {"q": "以下の空欄A・Bに当てはまる語句は何か。\n微笑は養育者に対して正の興味を向けさせる機能を担っており、養育者との絆を作り上げるために重要な役割を果たしていると考えられている。乳児は3か月頃には自発的に周囲の他者に対して働きかけを行うために微笑を向ける。この微笑を（ A ）という。一方で、生後数時間から観察される、必ずしも快感情とは結びついていないとされる本能的な微笑を（ B ）という。", "a": "A：社会的微笑\nB：生理的微笑（新生児微笑、自発的微笑）", "exp": "【解説文より補足】微笑は養育者に対して正の興味を向けさせる機能を担っており、養育者との絆を作り上げるために重要な役割を果たしていると考えられている。"}, {"q": "攻撃性は、自己破壊衝動である死の欲求（タナトス）の破壊エネルギーが他者に向けられたものであるととらえた精神分析学者は誰か。", "a": "フロイト（Freud, S.）", "exp": "フロイトの立場は内的衝動説（本能説）と呼ばれる。そのほかにローレンツ（Lorenz, K.）も内的衝動説の立場である。"}, {"q": "ダラードら（Dollard, J. et al.）の攻撃行動の理論は、攻撃は「（　）」が生じると、それを低減させるために攻撃が発生すると捉えている。空欄に当てはまる語句は何か。", "a": "欲求不満（フラストレーション）", "exp": "ダラードらの理論はフラストレーション-攻撃仮説と呼ばれる。バーコヴィッツ（Berkowitz, L.）はダラードらの後に、欲求不満だけでなく不快感情全般が攻撃行動を喚起するという認知的新連合理論を提唱した。"}, {"q": "攻撃行動は主に観察学習により社会的に学習された行動であるととらえたカナダの心理学者は誰か。", "a": "バンデューラ（Bandura, A.）", "exp": "バンデューラの立場は社会的学習説と呼ばれる。"}, {"q": "攻撃行動の過程を、個人差要因と状況要因が内的な状況（認知・感情・覚醒）に影響を及ぼし評価に基づいて衝動的攻撃や戦略的攻撃の実行に至るとした、アンダーソンとブッシュマン（Anderson, C. A. & Bushman, B. J.）の理論は何か。", "a": "一般攻撃モデル", "exp": "攻撃行動を衝動的なものと戦略的なものに分類した理論には、大別思考の攻撃の二過程モデルもある。攻撃行動を不快な感情を発散させるための反応だとする情動発散説の立場と、攻撃行動は制御された問題解決反応だとする社会的機能説の立場の両方を反映している。"}, {"q": "ポジティブな感情のときにはポジティブな出来事を記憶・想起しやすく、ネガティブな感情のときにはネガティブな出来事を記憶・想起しやすい現象を何というか。", "a": "感情（気分）一致効果", "exp": "図4.3はバウアー（Bower, G. H.）の実験結果である。この実験結果から、楽しい気分のときには楽しい物語を記憶しやすく、悲しい気分のときには悲しい物語を記憶しやすいことが示されている。\n[図4.3 バウアーの実験結果の交差折れ線グラフ]"}, {"q": "ポジティブな感情のときに覚えた出来事はポジティブなときに想起しやすく、ネガティブな感情のときに覚えた出来事はネガティブなときに想起しやすい現象を何というか。", "a": "感情（気分）状態依存効果", "exp": "感情（気分）一致効果とは違い、覚える出来事の感情的性質は関係がなく、覚えたときと思い出すときの感情状態の一致により記憶成績が良くなるという現象である。"}, {"q": "感情を強く揺さぶられるような出来事があると、その出来事が鮮明かつ詳細に記憶されることがある。このような記憶を何というか。", "a": "フラッシュバルブメモリー（閃光記憶）", "exp": "心的外傷後ストレス障害（PTSD）のフラッシュバックとも関連する現象である。"}, {"q": "恐怖や嫌悪を引き起こす刺激の種類はある程度生得的に決まっている。ガルシアら（Garcia, J. et al.）の発見によりガルシア効果と呼ばれている嫌悪感情の条件づけに関する現象は、内臓感覚情報と何の知覚情報の条件づけか。", "a": "味覚", "exp": "ガルシアらの実験により、胃腸障害や嘔吐を引き起こす体験と未経験の味覚とは容易に条件づけが生じ、以降はその味覚物の摂取を回避することが明らかになっている。この過程を味覚嫌悪条件づけという。"}, {"q": "シフネオス（Sifneos, P. E.）の提唱した概念で、失感情症、感情言語化困難症とも呼ばれる、自身の感情への気づきや表現が困難な、心身症で見られやすい特徴を何というか。", "a": "アレキシサイミア（失感情症）", "exp": "アレキシサイミアの特徴として、想像力や空想力が乏しい、自分の感情を上手く言語化できない、事実関係は説明できるが感情の表現が伴わない、コミュニケーションが困難で機械的な対応が多い、といった点が挙げられる。"}, {"q": "気分障害の中の一つとされ、大うつ病エピソードと躁病エピソードの両方の特徴を持つ症状を何というか。", "a": "双極性感情障害（双極性障害、双極症）", "exp": "気分障害は、気分の高揚や抑うつといった気分変化を主な症状とした精神医学的障害を総称した概念である。"}, {"q": "ある特定の考えや想像が繰り返し生じ、複数回の確認や必要以上の手洗いといった不合理な行為の反復により日常生活が困難となることを特徴とした精神障害を何というか。", "a": "強迫性障害（強迫症、強迫迫症）", "exp": "アメリカ精神医学会によるDSMでは、かつては不安障害（不安症群）の中に分類されていたが、DSM-5では独立の群へと移った。"}, {"q": "強度のストレス体験により発症し、出来事のフラッシュバックや持続的な過覚醒、感覚の麻痺などの症状が1か月以上続くものを何というか。", "a": "（心的）外傷後ストレス障害（PTSD）", "exp": "PTSDと略されることが多い。症状が1か月以内のものを急性ストレス障害（ASD）と呼ぶ。"}, {"q": "古代ギリシア時代にヒポクラテス（Hippocrates）は、人間の身体に流れる体液の種類と混合具合によって異なる病気が発症するという説を提唱した。この説を踏まえてガレノス（Galenos）が提唱した類型論では、人間の性質をいくつに分類したか。", "a": "4つ", "exp": "四気質説と呼ばれる。ヒポクラテスは血液、黄胆汁、黒胆汁、粘液の4種類の体液と病気の関連を提唱した。ガレノスはこの体液との関連から多血質（陽気）、胆汁質（短気）、憂鬱質（消極的）、粘液質（冷静沈着）の4つの類型を提唱した。"}, {"q": "体格と性格との関連に着目し、「細長型」「筋肉質型（闘士型）」「肥満型」の3種の体格に類型化したドイツの精神医学者は誰か。", "a": "クレッチマー（Kretschmer, E.）", "exp": "クレッチマーによれば、細長型は分裂気質と呼ばれ内気で真面目な性格で統合失調症になりやすいとされた。筋肉質型は粘着気質と呼ばれ真面目だが融通が利かない性格で、てんかんと関連があるとされた。肥満型は循環気質と呼ばれ社交的で明るいが気分が変化しやすく、躁うつ病になりやすいとされた。"}, {"q": "パーソナリティはエス（イド）、自我、超自我の3領域から構成されるとした精神構造論を提唱したオーストリアの精神分析学者は誰か。", "a": "フロイト", "exp": "フロイトは精神分析の立場から精神構造論を提唱した。無意識下にあるエス（イド）の快楽原則に基づく衝動と超自我の抑制を、意識下の自我がコントロールすると論じた。"}, {"q": "リビドーと呼ばれる精神的エネルギーの方向性を挙げ、外向型と内向型にパーソナリティを類型化したスイスの精神科医は誰か。", "a": "ユング（Jung, C. G.）", "exp": "ユングは、無意識を抑圧された存在ではなく、意識に先立って存在する心の本質であると考え、集合的無意識を重視した。"}, {"q": "ライフサイクル理論（漸成説）を提唱し、生涯発達の視点からパーソナリティの発達と適応を論じた米国の心理学者は誰か。", "a": "エリクソン（Erikson, E. H.）", "exp": "エリクソンは乳児期の信頼感の獲得から、青年期のアイデンティティの獲得、老年期の統合感の獲得に至るまでの発達と心理的危機の過程を提唱した。"}, {"q": "アイゼンク（Eysenck, H. J.）のパーソナリティ理論における2次元は、神経症傾向ともう1つは何か。", "a": "外向性（内向性-外向性）", "exp": "アイゼンクは図4.4のように2次元上にパーソナリティを示している。各傾向は四気質説とも対応している。\n[図4.4 アイゼンクによる2つの特性と四気質説の対応（外向性・内向性 × 神経症傾向高・低。憂鬱質、粘液質、多血質、胆汁質を配置）]"}, {"q": "シュプランガー（Spranger, E.）は独自の類型論を提唱し、ある認知的特徴から人間を6つに類型化している。シュプランガーが注目した特徴は何か。", "a": "価値観（価値型）", "exp": "シュプランガーは、価値観こそが人間の生き方を決定づけるものであり、人生の意味において重要であるとした。\n【シュプランガーの価値観の6類型】理論型、経済型、権力型、芸術型、宗教型、社会型"}, {"q": "次のA〜Cの記述はすべてある人物のことをさしている。この人物は誰か。\nA：パーソナリティの特性論を主張し、類型論を批判した。\nB：辞書から約18,000語のパーソナリティや人間の行動に関する用語を抜き出し、カテゴリー化した。\nC：個人の持つ性格特性の様子を図に表した心誌（サイコグラム）を作成した。", "a": "オールポート（Allport, G. W.）", "exp": "オールポートは特性論を提唱し、個人のパーソナリティにおける優秀な特性は何かを検討している。"}, {"q": "以下の空欄に当てはまる語句は何か。\nマレー（Murray, H. A.）の理論では、人間の行動は（　）によって内的に方向づけられていると考え、（　）とそれを阻害する外的要因（圧力）との相互作用の個人差を重視した。", "a": "欲求（ニーズ）", "exp": "マレーの理論は欲求-圧力理論と呼ばれている。マレーはTAT（主題統覚検査）を作成したことでも知られている。"}, {"q": "マズロー（Maslow, A. H.）の欲求5段階説において、最上位に位置づけられている欲求は何か。", "a": "自己実現欲求", "exp": "マズローは欲求階層を下層から、生理的欲求、安全欲求、所属・愛情欲求、自尊（尊重）欲求、自己実現欲求に分類している。"}, {"q": "生活空間の概念から人間の行動を説明しようとし、「場の理論」を提唱したゲシュタルト学派の心理学者は誰か。", "a": "レヴィン（Lewin, K.）", "exp": "レヴィンは、集団内における個人の行動はその集団の性質や成員によって影響を受けると考え、グループ・ダイナミクス（集団力学）を提唱した。"}, {"q": "ケリー（Kelly, G. A.）の提唱した社会認知論的なパーソナリティ理論で、個人が事象をどう認識・解釈・予測するかからパーソナリティを説明した理論を何というか。", "a": "パーソナル・コンストラクト理論", "exp": "ケリーは事象の認識・解釈・予測に用いる認知的構成体のことをコンストラクトと呼んだ。ケリーはこの理論をもとに、役割コンストラクト・レパートリー・テストを作成している。"}, {"q": "相互作用論の立場や精神分析理論の立場の研究者で生じた人間-状況論争のきっかけを作った人物で、パーソナリティ特性と行動の相関が低いことから、パーソナリティの一貫性に対して疑問を呈した心理学者は誰か。", "a": "ミシェル（Mischel, W.）", "exp": "ミシェルは特性論を批判し、人間-状況論争のきっかけをつくった。"}, {"q": "ビッグ・ファイブ（主要性格特性5因子）に該当する因子は、開放性、外向性、調和性、神経症的傾向と、あと1つは何か。", "a": "誠実性（勤勉性、統制性）", "exp": "ビッグ・ファイブは性格特性を主要な5因子で示しており、それぞれの因子には6つの下位次元がある。5つの因子の頭文字を取って「OCEANモデル」とも呼ばれる。\n【因子の英語名】Openness(開放性), Conscientiousness(誠実性), Extraversion(外向性), Agreeableness(調和性), Neuroticism(神経症的傾向)"}, {"q": "双生児研究から得られた知見から、パーソナリティへの影響力が最も弱いと考えらえるのは、遺伝要因・共有環境要因・非共有環境要因のうちどれか。", "a": "共有環境要因", "exp": "双生児研究によると、親の影響や家庭の影響といった共有環境要因はパーソナリティにほとんど影響しておらず、独自の非共有環境要因の影響力のほうが強い。"}, {"q": "「優生学」を提唱して人間の才能の遺伝的影響を研究し、また、平均への回帰や相関係数の概念を提唱するなど、統計学にも貢献したイギリスの研究者は誰か。", "a": "ゴールトン（Galton, F.）", "exp": "『遺伝的天才』という著書を発表し、人間の才能はほとんどが遺伝によって受け継がれると主張した。"}, {"q": "MMPI、P-Fスタディ、TAT、YG性格検査のうち、投影法に当たるものをすべて選べ。", "a": "P-Fスタディ、TAT", "exp": "投影法は曖昧な刺激に対する自由な反応から個人の特徴を分析する手法である。MMPI（ミネソタ多面人格目録）とYG性格検査（矢田部ギルフォード性格検査）は質問紙法の検査であり、P-FスタディとTATは投影法検査である。"}, {"q": "交流分析理論をもとに自我状態を測定するために作成された質問紙検査は何か。", "a": "エゴグラム（東大式エゴグラム:TEGなど）", "exp": "交流分析はバーン（Berne, E.）が開発した心理療法の体系であり、自我状態やラケット感情、人生脚本といった特徴的な概念を提出している。"}, {"q": "SCT、内田クレペリン検査、バウムテスト、ロールシャッハテストのうち、作業検査法はどれか。", "a": "内田クレペリン検査（内田クレペリン精神作業検査）", "exp": "一定時間連続計算を行わせ、その作業量や作業の質からパーソナリティの測定を行う検査を作業検査法という。ほかに、ベンダー・ゲシュタルト・テストもここに含まれる。"}, {"q": "EPPS、MPI、NEO-PI-R、WAIS、NEO-FFIのうち、ビッグ・ファイブを測定する検査はどれとどれか。", "a": "NEO-PI-R、NEO-FFI", "exp": "NEO-PI-RとNEO-FFIがビッグ・ファイブの検査である。EPPSはマレーの欲求理論に基づいて作成された検査である。MPI（モーズレイ性格検査）はアイゼンクのパーソナリティ特性理論に基づいて作成された検査である。WAISはウェクスラー（Wechsler, D.）による成人用知能検査であり、ほかに児童用のWISC、幼児用のWPPSIがある。"}, {"q": "投影法に関するA〜Dの記述で誤っているものをすべて選べ。\nA：質問紙法の検査に比べて量的な分析が行いやすい\nB：実施と結果の解釈には熟練が必要である\nC：検査の信頼性や妥当性の高さが保証されている\nD：測定する内容が被検者に伝わりにくい", "a": "A、C", "exp": "投影法は質問紙法に比べて量的な分析を主としない。実施と解釈にはトレーニングが必要である。測定内容が伝わり Committed（意図的に防衛的反応を歪めること）が難しいため、被検者が意図的に反応を歪めることが難しいとされている。"}, {"q": "テストが一貫・安定して特定の何かを測定している程度を示す指標は、信頼性と妥当性のどちらか。", "a": "信頼性", "exp": "パーソナリティ検査の質を保証するためには信頼性と妥当性を検討する必要がある。信頼性は測定の一貫性を意味し、再検査信頼性、評定者間信頼性、内的一貫性などにより確認する。"}, {"q": "α係数（クロンバックのα）は、何の側面から信頼性を検討するために用いられるか。", "a": "内的一貫性", "exp": "α係数（クロンバックのα）は内的一貫性を示す簡便な指標である。"}, {"q": "関連のあるテストとの相関の高さから検討される妥当性は、内容的妥当性、基準関連妥当性、構成概念妥当性のうちどれか。", "a": "基準関連妥当性（併存的妥当性／予測的妥当性）", "exp": "妥当性は測定したい概念が実際に測定できている程度を意味し、内容的妥当性、基準関連妥当性、構成概念妥当性などが問題となる。"}, {"q": "次のA〜Dのすべてに該当するような行動パターンを何というか。\nA：心筋梗塞や狭心症を発症しやすい行動パターンである。\nB：時間的な切迫感を感じやすい。\nC：他者との共同作業を好まない。\nD：早い口調や断定的な言い方など、話し方にも特徴が見られる。", "a": "タイプA行動パターン（タイプA）", "exp": "タイプA行動パターンは、時間的切迫感と焦燥、競争を伴う達成努力、敵意性と攻撃性を特徴とする。フリードマンとローゼンマン（Friedman, M. & Rosenman, R. H.）により、これらの行動特徴は冠状動脈性心臓疾患の発症リスクを高めると指摘された。"}, {"q": "対人関係において他の人々を操作しようとする傾向で、反社会的パーソナリティの一種ともとらえられる特性を何というか。", "a": "マキャベリアニズム", "exp": "イタリア・フィレンツェの政治思想家マキァベリ（Machiavelli, N.）の著書「君主論」で、目標達成のために冷淡な手段を用いることを辞さないなどの思想が説かれており、これになぞらんだパーソナリティ特性である。"}, {"q": "冷淡さ、自分や他者の感情への希薄さ、利己性、無責任、計画性のなさといった特徴を持つ反社会的パーソナリティを何というか。", "a": "サイコパシー（サイコパス）", "exp": "フランスの精神医学者ピネル（Pinel, P.）が提案した。犯罪行為と強く関連するパーソナリティであるとされている。"}, {"q": "出来事を理解し、対処ができ、対処することは意味があるという感覚を一貫して持っている傾向を何というか。", "a": "センス・オブ・コヒーレンス（SOC:首尾一貫感覚）", "exp": "首尾一貫感覚ともいい、ストレスに対する強さを示す個人特性である。"}, {"q": "逆境に陥ったときに、それを克服して回復（回復）できる力を何というか。", "a": "レジリエンス", "exp": "精神的回復（回復）力ともいい、ストレスに対する強さを示す個人特性である。"}, {"q": "ストレスの高い状況でも健康を保てる人が持つ、コミットメント、コントロール、チャレンジからなる性格傾向を何というか。", "a": "ハーディネス（頑健性）", "exp": "頑健性ともいい、ストレスに対する強さを示す個人特性である。"}, {"q": "行動や出来事の原因が自分にあると考えやすいか、それとも自分以外の要因によるものだと考えやすいかといった、自分の統制力の信念のことを何というか。", "a": "ローカス・オブ・コントロール（統制の所在）", "exp": "自分の行動や周囲の出来事の原因を自分にあると考えやすい内的統制型と、環境や状況に原因があると考えやすい外的統制型とに区分される。"}], "第5章_臨床・障害": [{"q": "精神分析および精神分析療法の創始者は誰か。", "a": "フロイト（Freud, S.）", "exp": "フロイトは神経組織学を専攻していたが、フランスへの留学以降ヒステリーに関心を持つようになり、催眠や浄化法を用いて治療を行っていた。やがて治療の成否は患者の医師に対する関係に依存することに気づき、次の一問一答にある自由連想法を確立させていった。"}, {"q": "心に浮かぶことを省くことなく治療者に話すという、精神分析において用いられる方法を何と呼ぶか。", "a": "自由連想法", "exp": "精神分析療法では、たとえ不快なことであったり、とりとめのないことであったりしても、一度心に浮かんだことはすべて治療者に話すという自由連想法が用いられる。"}, {"q": "幼児期の対人関係に由来する非現実的な感情を、被分析者が治療者に対して向けることを何というか。", "a": "転移", "exp": "転移は幼児期の体験や精神生活の反映であると考えられるため、その性質や強さを分析することによって被分析者の心理力動の深い理解が可能になる。なお、治療者が幼児期の対人関係に由来する感情を被分析者に向ける場合、これを逆転移という。"}, {"q": "精神分析療法では、連想を拒否して沈黙するなど無意識への到達を妨げるような被分析者のすべての言言動を何と呼ぶか。", "a": "抵抗", "exp": "抵抗は、話題の回避、沈黙、行動化などさまざまな現れ方をする。精神分析療法において抵抗の分析は転移の分析とともに進展した。"}, {"q": "下図の心的装置の空欄に当てはまる語句は何か。\n[図：上から 知覚-意識、前意識的自我、( ① )、無意識的自我、( ② ) ]", "a": "①：超自我\n②：エス（イド）", "exp": "フロイトは意識・前意識・無意識の3領域からなる心の局所論を発展させ、自発・自我・エス（イド）・超自我の3層構造を想定した構造論を提唱した。エスはすべての精神的エネルギーの根源であると考えられている。"}, {"q": "主に両親のしつけを通して取り込まれた良心あるいは道徳的禁止の機能を持つ心的構造の一部を何というか。", "a": "超自我", "exp": "主に両親のしつけという形で本能的欲求の禁止を取り入れて内在化し、自我の監視役となるのが超自我である。"}, {"q": "下図は心理（精神）-性的発達の段階を示したものである。空欄に当てはまる段階は何と呼ばれるか。\n[ (　) → 肛門期 → 男根期 → 潜伏期 → 性器期 ]", "a": "口唇期", "exp": "口唇期は生後から1歳半頃までの時期であり、乳を吸う活動を中核として心身が発達する。"}, {"q": "不安や葛藤などに対処し、現実に適応するために自我が働かせる、抑圧や退行などの機制を何というか。", "a": "防衛機制（防衛の概念）", "exp": "フロイトが先に示した「防衛」の概念について、娘のアンナ・フロイト（Freud, A.）が防衛機制という言葉を用いて分類、整理した。代表的なものに、抑圧、退行、反動形成、置き換え、投影、隔離、合理化などがある。"}, {"q": "クライン（Klein, M.）は対象との関係のあり方として2種のポジション（態勢）を提唱したが、妄想分裂ポジションともう一つは何か。", "a": "抑うつポジション", "exp": "抑うつポジションでは、良い部分と悪い部分の両方を持つ存在として対象を認識し、対象との全体的なかかわりが優位となる。"}, {"q": "毛布やぬいぐるみなど、乳幼児が特別な愛着を寄せるようになる、主に無生物の所有物を移行対象と名づけたのは誰か。", "a": "移行対象", "exp": "ウィニコット（Winnicott, D. W.）によれば、移行対象は母子未分化な状態から分化した状態への移行を促進させるものである。母親とのほどよい関係を基盤に生じると考えられている。"}, {"q": "下図は、マーラー（Mahler, M. S.）の提唱した分離-個体化過程のうち、分離-個体化期の4つの発達段階を示したものである。空欄に当てはまる時期は何と呼ばれるか。\n分化期（生後5〜9か月頃） → 練習期（9〜14か月頃） → (　)（14〜24か月頃） → 個体化期（対象恒常性の萌芽期：25〜36か月頃）", "a": "再接近期", "exp": "マーラーは乳幼児の発達を母子の分離-個体化の過程としてとらえた。マーラーによれば、乳幼児の発達段階は、正常な自閉期、正常な共生期、分離-個体化期の3期に区分され、さらに分離-個体化期は、分化期、練習期、再接近期、個体化期（対象恒常性の萌芽期）に区分される。再接近期では、自律への衝動と母親との再結合願望との間で葛藤が生じると考えられている。"}, {"q": "分析心理学を提唱したのは誰か。", "a": "ユング（Jung, C. G.）", "exp": "ユングはフロイトの後継者として国際精神分析学会の初代会長に指名されたが、やがて無意識やリビドーの考え方に異論を唱え、独自の分析心理学を確立させた。"}, {"q": "ユングは心の構造を3層に分けて考えた。意識と個人的無意識と、あと一つは何か。", "a": "普遍的（集合的）無意識", "exp": "普遍的（集合的）無意識は個人の心の基礎であり、その心的内容は人類に共通して認められると仮定されている。"}, {"q": "ユングの提唱した類型論では、根本的態度を内向と外向に分類しているが、主体の認識ないし見解を重視するといった特徴がある場合、内向と外向のどちらに当てはまるか。", "a": "内向", "exp": "一方で、外向は、主体の要求と外界の要求を比較する際、外界の要求を重視するという特徴を持つ。"}, {"q": "アニマ・アニムスなどに代表される、普遍的（集合的）無意識の内容を何と呼ぶか。", "a": "原型", "exp": "原型にはこのほかに、ペルソナ、影、自己、グレートマザー、トリックスタなどがある。"}, {"q": "分析心理学では、無意識の領域に存在する、耐えがたい不快な主観的体験を中核とした心的な複合体を何と呼ぶか。", "a": "コンプレックス", "exp": "ユングは、言語連想テストにおいて見られる反応の遅れや再生不能などの現象から、コンプレックスの存在を見出した。"}, {"q": "分析心理学では、無意識を統合しつつ本来の個性に随って心理的成長を遂げていく過程を何と呼ぶか。", "a": "個性化（個別化の過程）", "exp": "ユングは、無意識を統合しつつ本来の個性に随って成長していく自己実現の過程を、個性化の過程としてとらえた。"}, {"q": "行動療法は（ A ）理論を基盤に置き、（ B ）による行動変容を主要な手段としている。この両方の空欄に当てはまる心理学の用語は何か。", "a": "学習", "exp": "行動療法では不適応行動を、適切な行動が学習されていない結果、もしくは誤った学習の結果ととらえる。"}, {"q": "ウォルピ（Wolpe, J.）が逆制止の原理を導入して開発した技法は何か。", "a": "系統的脱感作法", "exp": "系統的脱感作法は、不安や緊張が生じている場面で、不安や恐怖と相いれない反応（主にリラクゼーション反応）を引き起こすことにより、不安や恐怖を段階的に消去する手続きをとる。"}, {"q": "目標となる行動の獲得に向け、その過程をスモールステップに分けて、達成が容易なものから順に取り組む技法は何と呼ばれるか。", "a": "シェイピング", "exp": "シェイピングはオペラント技法の一つであり、各ステップを達成した際に強化を行う手続きを繰り返すことで、最終目標となる行動を形成する。"}, {"q": "直接に経験しなくても、他者（モデル）の行動を観察することによって行動が身につくことを何というか。", "a": "観察学習（モデリング）", "exp": "バンデューラ（Bandura, A.）が提唱した社会的学習理論の中核に置かれたのが観察学習（モデリング）である。"}, {"q": "観察学習の過程において、モデルの行動に対して与えられた報酬や罰を観察することにより、観察者の行動が間接的に強化・弱化されることを何というか。", "a": "代理学習（代理強化）", "exp": "代理学習に基づいた予期に従い、観察学習された行動の遂行が左右される。"}, {"q": "ソーシャルスキルトレーニングにおいて、モデリングの段階で提示された行動と同じように行い、必要なスキルを身につけるよう導く練習を何と呼ぶか。", "a": "行動リハーサル", "exp": "ソーシャルスキルトレーニング（SST）は、主に対人関係の問題を改善・予防するために、必要なスキルを学習する目標である。必要なスキルを身につけて適切な行動をとる練習のことを、行動リハーサルと呼ぶ。"}, {"q": "認知療法の創始者は誰か。", "a": "ベック（Beck, A. T.）", "exp": "ベックは認知のあり方が精神状態と関連していることを見いだし、非適応的な認知を修正することによって、症状の軽減や問題解決を図る認知療法を提唱した。"}, {"q": "認知療法において、ある状況下で瞬間的に生じる考えやイメージを何と呼ぶか。", "a": "自動思考", "exp": "認知療法では、認知の歪みは自動思考とスキーマという2つのレベルに現れると考える。自動思考は比較的意識の表層にあるため、注意を向けさせれば意識化できる。一方、スキーマは自動思考の背景に存在する心的態度や心的規則などであり、対人関係様式や行動・思考のパターンに現れると考えられている。"}, {"q": "ABC理論を基礎理論とする心理療法は何か。", "a": "論理療法（REBT）", "exp": "論理療法はエリス（Ellis, A.）によって創始された心理療法であり、論理情動行動療法、合理情動療法、REBTとも表現される。"}, {"q": "下図はABC理論を示したものである。Bの空欄に当てはまる語句は何か。\n[ A：出来事 → B：(　) → C：結果 ]", "a": "信念（ビリーフ）", "exp": "ABC理論では、出来事（A）が情動的・行動的結果（C）である反応を直接引き出すのではなく、出来事をどう受け止めるかという信念（B）から反応が引き出されると考える。論理療法では、問題や悩みに関連する非合理的な信念（イラショナルビリーフ）を、合理的な信念（ラショナルビリーフ）に修正することで解決を図る。"}, {"q": "クライエントが自分自身に適切な教示を与えることによって、適応的な行動を身につけることをねらった認知行動療法の治療技法は何か。", "a": "自己教示訓練", "exp": "自己教示訓練は、マイケンバウム（Meichenbaum, D.）によって体系化された、言葉の持つ行動調節の機能に着目した治療技法である。"}, {"q": "クライエント中心療法の創始者は誰か。", "a": "ロジャーズ（Rogers, C. R.）", "exp": "ロジャーズは新しい心理療法として非指示的心理療法を創始したが、非指示的な技法として語られるようになり、その修正として、カウンセラーの態度を中核に据えたクライエント中心療法という名称を用いた。"}, {"q": "ロジャーズが論文「治療の人格変化の必要十分条件」の中で示した、セラピストの態度に関する3条件は何か。", "a": "一致・無条件の肯定的関心・共感的理解", "exp": "一致、無条件の肯定的関心、共感的理解はまとめて中核条件とも表現される。一致は純粋性、無条件の肯定的関心は無条件の肯定的配慮、共感的理解は感情移入的理解などとも呼ばれる。"}, {"q": "自己構造と経験が一致しているなど、有機体としての人間が最高に実現された状態をロジャーズは何と呼んでいるか。", "a": "十分に機能する人間", "exp": "十分に機能する人間はセラピーの目標ともされ、自分の体験に開かれている、自己構造と経験が一致しているなどの特徴を有している。"}, {"q": "下図はマズロー（Maslow, A. H.）の欲求階層説を示したものである。空欄に当てはまる語句は何か。\n[ 上から (　[成長動機] ) → 尊重(承認・自尊心) → 所属・愛情 → 安全 → 生理的満足 [欠乏動機] ]", "a": "自己実現欲求", "exp": "マズローによれば、人間の欲求には階層があり、生理的欲求や安全欲求、所属・愛情欲求、尊重欲求が満たされると、自己実現へと向かう成長動機が生じる。生理的欲求、安全欲求、所属・愛情欲求、尊重欲求は欠乏動機、自己実現欲求は成長動機といわれる。"}, {"q": "パールズ（Perls, F. S.）が提唱した心理療法は何か。", "a": "ゲシュタルト療法", "exp": "ゲシュタルト療法は、「今・ここ」での気づきを重視し、統合を志向する人格への変容を目的としている。ホット・シート、夢のワーク、エンプティ・チェアなどの技法がある。"}, {"q": "エンカウンターグループにおいて、メンバーの表現を促進させる役割を持つ者は何と呼ばれるか。", "a": "ファシリテーター", "exp": "ファシリテーターは、グループメンバーの心理的安全を保証し、メンバー自身の感情や思考の表現を通じて、メンバー間の相互作用を促進させるなどの役割を担う。"}, {"q": "フォーカシングを開発したのは誰か。", "a": "ジェンドリン（Gendlin, E. T.）", "exp": "ジェンドリンは体験過程の概念を提唱し、体験過程に直接触れるための方法として、フォーカシングを開発した。"}, {"q": "下図はフォーカシングの6段階の流れを示したものである。空欄に当てはまる語句は何か。\n空間を作る → (　) → ハンドル（見出しをつける） → 共鳴させる → 尋ねる → 受け取る", "a": "フェルトセンス", "exp": "フェルトセンスとは、ある事柄や状況などを想像した際の、すぐには言葉にならないような不明確な意味を含んだ身体の感覚をさす。フェルトセンスは志向性を持つ。"}, {"q": "催眠暗示への反応のしやすさは何と呼ばれるか。", "a": "催眠感受性", "exp": "催眠感受性は被催眠性とも表現される。運動や動作に関する暗示への反応は、催眠感受性が低くても比較的生じやすいが、知覚や認知にかかわる暗示への反応は、催眠感受性が高くなければ生じにくいといわれる。"}, {"q": "自律訓練法の創始者は誰か。", "a": "シュルツ（Schultz, J. H.）", "exp": "シュルツは、催眠下では共通して身体の重たい感じや温かい感じが体験されることに気づき、これらの感覚を自己暗示によって生じさせるための練習法として、自律訓練法を作り上げた。"}, {"q": "自律訓練法を練習する際に重視される、公式に関連した身体部位への特殊な注意の向け方は何と呼ばれるか。", "a": "受動的注意集中", "exp": "言語公式に関連した身体部位へ注意を向けるときに、変化を起こそうと能動的に注意を向けるのではなく、感覚の変化を自然に待つようなさりげない注意集中のあり方を受動的注意集中という。受動的注意集中は、自律訓練法の習得において重要な鍵となる。"}, {"q": "下表は自律訓練法の標準練習を示している。空欄に当てはまる語句は何か。\n[ 背景公式：安静練習 / 第1公式：四肢重感練習 / 第2公式：(　) / 第3公式：心臓調整練習 / 第4公式：呼吸調整練習 / 第5公式：腹部温感練習 / 第6公式：額部涼感練習 ]", "a": "四肢温感練習", "exp": "自律訓練法の中心となる標準練習は、リラクゼーションが進行する際に生じる、心理・生理的変化の自然な流れに従って段階的に構成されている。自律訓練法は、一定の言語公式を繰り返し練習し、段階的に積み上げていくことで習得していく。"}, {"q": "モレノ（Moreno, J. L.）によって考案された、個人の自発性を刺激して創造性を引き出すことを重視した心理療法は何か。", "a": "心理劇（サイコドラマ）", "exp": "心理劇（サイコドラマ）はモレノによって考案された、即興劇の形式を用いた集団心理療法である。モレノは創造性を重視し、心理劇は個人の自発性を刺激して創造性を引き出すための有効な手段であると考えた。"}, {"q": "ローウェンフェルド（Lowenfeld, M.）によって創始された、箱庭療法の元となった技法は何か。", "a": "世界技法", "exp": "ローウェンフェルドは、子どものための心理療法として、準備されたミニチュアを用いて、自分の世界を箱の中に表現していく世界技法を考案した。カルフ（Kalff, D.）はこれを、ユングの理論をベースとして箱庭療法に発展させ、適用範囲を成人にも拡大させた。"}, {"q": "性格検査はその理論的背景によって3つに大別される。質問紙法と残りの2つは何か。", "a": "投影法、作業検査法", "exp": "性格検査は、①質問紙法、②投影法、③作業検査法に分類される。このうち投影法は、特定の反応を引き出すことのないような曖昧な刺激を提示し、その刺激に対する反応からパーソナリティを推測するという手続きをとる。"}, {"q": "ロールシャッハテスト、モーズレイ性格検査（MPI）、絵画統覚検査（TAT）、風景構成法のうち、投影法に分類されないものはどれか。", "a": "モーズレイ性格検査（MPI）", "exp": "ロールシャッハテストは、インクブロットを刺激素材として、何に見えるかを連想する手続きをとる、ロールシャッハ（Rorschach, H.）によって考案された検査である。絵画統覚検査（主題統覚検査）は、場面設定 of 曖昧な絵を見てつくる空想物語の内容から、パーソナリティをとらえる。マレー（Murray, H. A.）によって開発された。風景構成法は、画用紙に遠景から順に風景を描いていく、心理療法と投影法検査との両方の側面を持つ技法である。モーズレイ性格検査（MPI）は質問紙法に分類されるため投影法ではない。"}, {"q": "コッホ（Koch, K.）が考案した、投影法に分類される性格検査は何か。", "a": "バウムテスト", "exp": "バウムテストでは、（実のなる）樹木を一本描く描画課題が用いられる。さまざまな指標を用いて描画を解釈し、パーソナリティを推測するという手続きをとる。"}, {"q": "ハサウェイとマッキンレイ（Hathaway, S. R. & McKinley, J. C.）によって完成された、550項目から構成される性格検査は何か。", "a": "ミネソタ多面人格目録（MMPI）", "exp": "ミネソタ多面人格目録（MMPI）は質問紙法に分類される検査で、心気症、抑うつ、ヒステリーなどの各傾向を測定する臨床尺度のほかに、妥当性尺度や追加尺度（特殊尺度）がある。"}, {"q": "顕在性不安尺度（MAS）、P-Fスタディ、文章完成テスト（SCT）、HTPテストのうち、質問紙法に分類される検査はどれか。", "a": "顕在性不安尺度（MAS）", "exp": "テイラー（Taylor, J. A.）が不安の測定を目的として、MMPIの中から抽出した50項目をもとに作成した尺度が、顕在性不安尺度である。P-Fスタディ、文章完成テスト、HTPテストは、いずれも投影法に分類される。"}, {"q": "モーズレイ性格検査（MPI）を作成したのは誰か。", "a": "アイゼンク（Eysenck, H. J.）", "exp": "モーズレイ性格検査は、外向性-内向性（E尺度）と神経症傾向（N尺度）との2次元を用いて測定する。モーズレイとはアイゼンクが所属していた病院の名称である。"}, {"q": "クレペリン（Kraepelin, E.）によって発案された連続加算法を、内田勇三郎が心理検査として発展させた性格検査は何か。", "a": "内田クレペリン精神作業検査（内田クレペリン検査）", "exp": "内田クレペリン精神作業検査は、一列に並んだ数値を連続で加算する作業課題を用い、作業速度の変動の様子から個人の性格特性を理解しようとする。作業検査法に分類される代表的な検査である。"}, {"q": "ビネーとシモン（Binet, A. & Simon, T.）によって開発された知能検査が、ターマン（Terman, L. M.）によって改訂されてスタンフォード・ビネー検査へと引き継がれた。その際導入された、知能指数の算出式を次の中に示した。空欄に当てはまる語句は何か。\n知能指数（IQ） = ( [   ] / 生活年齢（CA） ) × 100", "a": "精神年齢（MA）", "exp": "ターマンは精神年齢と、実際の年齢である生活年齢（暦年齢）との比率により、知能指数として結果を表示する改訂を行った。ビネーとシモンが開発した知能検査と、その基本的な考え方と方式を踏襲して作られた知能検査を総称して、ビネー式知能検査と呼ぶ。"}, {"q": "年齢段階に応じたウェクスラー式知能検査には、成人用の（ A ）、児童用の（ B ）、幼児用の（ C ）がある。空欄A〜Cに当てはまる略称は何か。", "a": "A：WAIS\nB：WISC\nC：WPPSI", "exp": "ウェクスラー（Wechsler, D.）によって考案された知能検査である。WAISはWechsler Adult Intelligence Scaleの略称であり、同様にWISCはWechsler Intelligence Scale for Children、WPPSIはWechsler Preschool and Primary Scale of Intelligenceの略称である。"}, {"q": "ウェクスラー式知能検査で採用されている知能指数は、比率IQに対して何と称されるか。", "a": "偏差知能指数（偏差IQ）", "exp": "偏差知能指数は、知能水準を同一年齢集団の平均値からのずれ（偏差）で表そうとするものであり、どの年齢集団においても平均が100、標準偏差が15となる。"}, {"q": "測定しようとしている心理的特性に対して、用意された項目が十分であるか、内容は適切であるか、内容や範囲に偏りがないかなど、複数の専門家の主観的判断を通して評価される妥当性は何と呼ばれるか。", "a": "内容的妥当性（面面的妥当性）", "exp": "心理検査や尺度の妥当性には、ほかに構成概念妥当性や基準関連妥当性などがある。"}, {"q": "同一の対象者に対して、時間をおいて同一 of 質問項目群を2回実施し、1回目と2回目の得点の相関係数から信頼性係数（信頼性の高さを表す係数）を推定する方法は何と呼ばれるか。", "a": "再検査法", "exp": "心理検査や尺度の信頼性係数を推定する方法は、ほかに平行検査法、折半法、内的一貫性に基づく方法などがある。"}, {"q": "面接法は、質問内容や手続きの構造化の程度や、被面接者の語る自由度によって、3つに分類される。そのうち、主な質問内容や手続きは決まっているが、話の流れに応じて質問を追加したり変更したりする面接法は、何と呼ばれるか。", "a": "半構造化面接", "exp": "半構造化面接のほかに、あらかじめ設定された質問内容と質問順序に従って行う構造化面接、自由回答形式の質問のみ用意されている、あるいは決められた質問項目を用意せずに進める非構造化面接がある。"}, {"q": "心理臨床のインテーク面接で行われる、目標や進め方、費用などに関する合意を何と呼ぶか。", "a": "治療契約", "exp": "治療契約は、治療構造を規定するうえでも、インフォームド・コンセントの面でも重要である。"}, {"q": "国際疾病分類（ICD）の改訂を行っている機関はどこか。", "a": "世界保健機関（WHO）", "exp": "以前、国際死因分類とされていたものを国際疾病分類としてWHOが所管し、改訂を重ねている。ICDはInternational Classification of Diseasesの略称である。"}, {"q": "アメリカ精神医学会が作成した精神疾患の診断基準の、アルファベット3文字での略称は何か。", "a": "DSM", "exp": "DSM（Diagnostic and Statistical Manual of Mental Disorders）はアメリカ精神医学会（APA）が提示した精神疾患の診断・統計マニュアルである。ICDと並び、精神疾患の操作的診断基準として、現在広く用いられている。"}, {"q": "クレペリン（Kraepelin, E.）が早発性痴呆という名称を用いたことで知られる、精神疾患は何か。", "a": "統合失調症", "exp": "19世紀終わり頃、クレペリンが現在の統合失調症に相当する早発性痴呆という疾病概念を示し、後にブロイラー（Bleuler, E.）がSchizophreniaという名称を用いた。従来Schizophreniaには精神分裂病という訳語が使われていたが、現在は統合失調症に名称統一されている。"}, {"q": "統合失調症を特徴づける症状を整理し、一級症状と呼んだドイツの精神医学者は誰か。", "a": "シュナイダー（Schneider, K.）", "exp": "一級症状には、考想化声、思考奪取、させられ体験などを含めた。また、精神病質者の類型化も行った。"}, {"q": "妄想、幻覚、むちゃ食い、陰性症状のうち、DSM-5における統合失調症の診断基準に含まれていないものはどれか。", "a": "むちゃ食い", "exp": "DSM-5の統合失調症の診断基準は、①妄想、②幻覚、③まとまりのない発話、④ひどくまとまりのない、または緊張病性の行動、⑤陰性症状、のうち2つ以上が1か月間ほとんど存在し、仕事、対人関係、自己管理は発病前の水準から著しく低下し、障害の持続的な徴候が少なくとも6か月間存在すること、である。"}, {"q": "躁うつ病は、DSM-IVおよびICD-10では気分障害に位置づけられてきたが、DSM-5では独立した2つのカテゴリーになっている。双極性障害群ともう一つは何か。", "a": "抑うつ障害群", "exp": "DSM-5では、躁病エピソード・軽躁病エピソード・うつ病エピソードの各基準に従い、双極Ⅰ型障害・双極Ⅱ型障害・うつ病／大うつ病性障害等が診断される。"}, {"q": "不眠または過眠や、死についての反復思考が診断基準に含まれるのは、うつ病エピソードと躁病エピソードのどちらであるか。", "a": "うつ病エピソード", "exp": "うつ病エピソードの基準にはほかに、抑うつ気分、有意の体重減少または増加、疲労感または気力の減退、無価値感または過剰であるか不適切な罪責感、などがある。"}, {"q": "かつて神経症の一種とされていた、解離症状や転換症状を来す疾患の、子宮を意味するギリシャ語からの命名による呼び方は何か。", "a": "ヒステリー", "exp": "ヒステリーは、女性に多いところからの誤解からこの名前がついた。フロイトが精神分析を着想、発展させるきっかけになった疾患でもある。なお、易怒性の表れを示す俗語の「ヒステリー」とはまったく別物である。"}, {"q": "精神医学における解離と抑圧との違いを説明するために、水平の壁・垂直の壁という表現が用いられることがあるが、解離をさす表現はどちらであるか。", "a": "垂直の壁", "exp": "抑圧は無意識という下方へ押し込めておく「水平の壁」で、意識に上らない位置にとどめるが、解離は別の意識として区切られ、切り離されていると考える。"}, {"q": "解離性健忘のうち、その影響範囲が最も広範な状態で、自分のこれまでの人生すべてが思い出せなくなっている場合を何と呼ぶか。", "a": "全生活史健忘", "exp": "解離性健忘では、出てこない記憶は消えてなくなっているとは限らず、後で戻っていることも多い。また、人生すべてにわたる全生活史健忘の場合でも、獲得された言語や動作スキルは影響されにくい。"}, {"q": "強いストレスや過労、幻覚剤の使用などによって起こる、自分が自分ではなくなる、自分が抜け出してしまっているなどといった不快な感じを何と呼ぶか。", "a": "離人感（離人症性障害）", "exp": "他の精神疾患等に伴うものではない形でこれが続く場合を、DSM-5は離人症性障害としている。"}, {"q": "心的外傷後ストレス障害（PTSD）という診断名を初めて採用した、1980年に発表された診断基準は何か。", "a": "DSM-III", "exp": "DSMはアメリカ精神医学会による診断基準である。この1980年改訂版は、操作的診断基準を採用したことで知られ、PTSDの定義もその考え方に準拠して作られた。"}, {"q": "第一次世界大戦に従軍した兵士に現れた、戦傷とは別におこる心理的な不調を来す症状に、砲弾ショックという呼称を用いたイギリスの心理学者は誰か。", "a": "マイヤーズ（Myers, C. S.）", "exp": "当時は、砲弾の爆発による衝撃が神経系などに悪影響を生じたものと理解されていた。後に、戦闘ストレス反応や、包括的な概念であるPTSDの考え方へとつながった。"}, {"q": "シャピロ（Shapiro, F.）によって考案された、対象としたイメージや認知に眼球運動を伴わせる技法が特徴的な心理療法は何か。", "a": "EMDR", "exp": "EMDRは、PTSDへの著効性でよく知られる。眼球運動を、一般には左右方向に行わせることが特徴的だが、標準プロトコルは8段階からなり、そのうち第4〜第6段階で眼球運動が用いられる。"}, {"q": "かつて不安神経症と呼ばれたものの一種で、心拍や呼吸数の増加、発汗、めまいや死の恐怖などに襲われる発作を繰り返し、また発作が起こるのではという予期不安や、そのため外出への困難を生じる疾患を、DSM-5では何と呼ぶか。", "a": "パニック症（パニック障害）", "exp": "かつての不安神経症は、パニック症と全般不安症とに相当する。パニック症の主要症状である特徴的な発作は、パニック発作と呼ばれる。自閉症における、こだわりに対抗する事態で起こるパニックとはまったく別物である。"}, {"q": "ワトソンとレイナー（Watson, J. B. & Reyner, R.）による「アルバート坊や実験」は、どのような精神疾患の形成に関する研究か。", "a": "恐怖症（限局性恐怖症）", "exp": "ある11か月児を対象として、古典的条件づけの手続きによって恐怖反応を学習させ、般化も認められるとした事例研究である。"}, {"q": "恐怖症の治療に有効である、安全を十分に確保したうえで、病的な恐怖を起こす刺激にあえて直面させる心理療法は何か。", "a": "フラッディング", "exp": "行動療法の一種に位置づけられ、系統的脱感作法よりも早く使えるが、強力な恐怖を喚起するため対応に注意が必要である。ほかに、強迫症に対しても奏効する。"}, {"q": "強迫症の症状である強迫観念と強迫行為との関係を、下図のように表現した場合、A・Bにはそれぞれどちらが入るか。\n[ A ] ─(不快・苦痛)→ [ B ] ─(解消)→ [ Aの低減 ]", "a": "A：強迫観念\nB：強迫行為", "exp": "不合理な考えが、不合理とわかるのに繰り返し浮かび頭から離れなくなるのが強迫観念。それによる不安や苦痛の解消のために不合理とわかりながら行われる行動が強迫行為である。行動後に苦痛が解消されることで、強迫行為には負の強化が起こることになる。"}, {"q": "DSM-5が記述するパーソナリティ障害のうち、見捨てられるのではという不安、空虚感、自傷や自殺企図などを特徴とするものは何か。", "a": "境界性パーソナリティ障害", "exp": "境界という表現は、かつての力動精神医学が、精神病と神経症との境界の水準だと考えたことに由来する。これはB群に属するパーソナリティ障害であるが、不安に特徴のあるパーソナリティ障害としては、C群とされる回避性、依存性、強迫性の各パーソナリティ障害もある。"}, {"q": "心身症患者に見られやすい、自身の感情についての気づきや表出、内省や想像力に乏しい特徴を、シフネオス（Sifneos, P. E.）は何と呼んだか。", "a": "アレキシサイミア（失感情症）", "exp": "アレキシサイミアでは、このような特徴のために、ストレスをあまり避け得ないまま身体に不調を来し、かつ伝統的な心理療法が効きにくいと考えられている。"}, {"q": "摂食障害の有病率には明確な性差があるが、男性と女性のどちらに多く見られるか。", "a": "女性", "exp": "摂食障害の男女比は1：9か、それ以上に女性に偏るとされる。なお、国・地域での偏りも顕著で、先進国に集中し、途上国ではまれである。"}, {"q": "DSM-5における摂食障害のうち、摂食制限型と過食・排出型とに二分されるのは、神経性やせ症と神経性過食症とのどちらか。", "a": "神経性やせ症", "exp": "排出は、自己誘発性嘔吐や下剤等の使用をさす。過食・排出型の神経性やせ症（AN）と神経性過食症（BN）とは見分けにくいが、前者の基準には著しい低体重や体型認知の異常が含まれる。"}, {"q": "不眠を入眠困難、中途覚醒、早朝覚醒に分けた場合、比較的に弱い睡眠薬での対応が最も行いやすいのはどれか。", "a": "入眠困難", "exp": "入眠困難では、寝つきが悪いが、いったん眠りに入れば後は問題ないので、薬物療法はそこだけで効けば足りる。"}, {"q": "性別違和（性同一性障害）へ適用される、本人の性自認と合致するような方向へと身体の形状を変える手術を何と呼ぶか。", "a": "性別適合手術", "exp": "性自認を基準にして、身体を適合させることからこの名称がある。本人にとっての性別は術前から変わらないため、「性転換手術」という表現は不適切である。"}, {"q": "古典的なうつ病といわゆる「新型うつ病」との身体的症状の傾向を下表のように対比して表現した場合、A・Bはそれぞれどちらであるか。\n[ 睡眠：古典的＝( A )、新型＝過眠 ]\n[ 食欲：古典的＝低下、新型＝( B ) ]", "a": "A：不眠\nB：良好", "exp": "「新型うつ病」を疾患単位として認めるか、うつ病の一種に位置づけてよいか、どのような呼称が適切かなどには議論があるものの、近年社会問題化しつつある。「新型」では自分がうつ病であると明言し、病因は周囲にあると主張する。一方で、この表のような身体症状や、気分反応性があり楽しいことや好きなことでは一転して元気になることから、疑わしくも見られがちである。"}, {"q": "病気不安症、自己臭恐怖症、醜形恐怖症、抜毛症のうち、DSM-5の身体症状症および関連症群に含まれるものはどれか。", "a": "病気不安症", "exp": "病気不安症は、DSM-IVまでは心気症と呼ばれていた。他の3疾患はいずれも、強迫症および関連症群に属する。"}, {"q": "かつて三大精神病と呼ばれていたのは、統合失調症、躁うつ病と、もう一つは何か。", "a": "てんかん", "exp": "てんかんは、機序が明らかになるにつれて精神病からは外されるようになった。今日では、てんかん自体はDSMにも含まれていない。"}, {"q": "認知症とせん妄とで比較した場合に、より日内変動が目立ち、夕方から夜に向けて症状が顕著になるのはどちらか。", "a": "せん妄", "exp": "認知症は安定的で進行し、本質的には戻ることがないが、せん妄は比較的急速に出現し、数日から数週間で治まり、日内変動もあるなど、安定しない。"}, {"q": "原因疾患から見た認知症の種類のうち、最も割合が大きいとされるのは何か。", "a": "アルツハイマー型認知症（アルツハイマー病）", "exp": "一般に、認知症のうち半数がアルツハイマー型認知症といわれている。"}, {"q": "知的障害の原因を、生理的要因、病理的要因、心理・社会的要因に分けた場合、ダウン症候群はどれに当たるか。", "a": "病理的要因", "exp": "病理的要因には、ダウン症候群などを起こす染色体異常や、周産期の感染症、脳外傷、脳腫瘍やその治療などが含まれ、重い知的障害にも至りやすい。"}, {"q": "精神疾患の原因に関する外因、心因、内因の3類型のうち、長期にわたる飲酒習慣に起因するコルサコフ症候群はどれに当てはまるか。", "a": "外因", "exp": "外因、心因、内因の3類型は、「心」を基準にして考えるので、外因はその外、脳を含む身体に原因がある場合である。心因はストレスに相当し、内因は原因が見えないのでもともと内側にあったはずだと考えたものである。"}, {"q": "パーキンソン病の四大症状は、筋強剛、無動、姿勢反射障害ともう一つは何か。", "a": "安静時振戦", "exp": "意図せず起こる体の震えを振戦と呼び、動作をしたり決まった体勢をとったりした際に生じるものが多いが、安静時振戦はむしろ何もしていない状態で震えが起こる。パーキンソン病の初期から見られやすいとされる。"}, {"q": "認知症や高次脳機能障害で見られる、現在の自分自身や置かれている状況の判断が適切に行えなくなる症状を何と呼ぶか。", "a": "見当識障害（失見当識）", "exp": "今が何年何月何日か、あるいは季節や時間帯、自分の年齢、今いる場所や住所などがわからなくなる。MMSEやHDS-Rは、冒頭に見当識障害を検出する項目を含む。"}, {"q": "アクスライン（Axline, V. M.）による遊戯療法の8原則において、最後の第8原則は、必要な何を設けるとしているか。", "a": "制限", "exp": "アクスラインは、クライエント中心療法の立場から遊戯療法を発展させた。「アクスラインの8原則」にはその人間観が強くうかがえるが、最後の第8原則のみ異質である。"}, {"q": "クライエントとの間で、一方によるなぐり描きをもう一方が連想に基づいて絵にする作業を行っていく技法を何と呼ぶか。", "a": "スクイグル法（スクリブル法）", "exp": "ウィニコットが開発した。小さな子どもでも使いやすい技法ではあるが、一人で行っていくスクリブル法と同様、子どもにしか使えないわけではない。"}, {"q": "他者の人権や社会規範を侵害する攻撃的で反抗的な行動パターンが、年齢相応な程度を超えたレベルで続くもののうち、DSM-5では何と呼ぶか。", "a": "素行症（素行障害）", "exp": "以前は「行為障害」と呼ばれていた。18歳以上で診断される反社会性パーソナリティ障害の前段階として理解されることが多い。"}, {"q": "文部科学省の調査において、小中学生の長期欠席の理由として最も多いのは、病気、経済的理由、不登校のうちどれか。", "a": "不登校", "exp": "児童生徒の問題行動・不登校等生徒指導上の諸課題に関する調査によると、年間30日以上の欠席である長期欠席のうち、不登校は7割強に当たる約18万1,000人（令和元年度）となっている。"}, {"q": "児童虐待において、身体的な暴力のようにあってはならないことをするのではなく、必要な養育行為を欠乏させる形をとるタイプの虐待を何というか。", "a": "ネグレクト（育児放棄）", "exp": "児童虐待を4類型でとらえる考え方では、身体的虐待、心理的虐待、性的虐待はあってはならないことをするタイプで、ネグレクトはその逆となる。"}, {"q": "自閉症や関連するコミュニケーションの障害を抱える子どもに対しての、環境の構造化に特徴のある、米国ノースカロライナ州で体系化された支援プログラムは何か。", "a": "TEACCH（ティーチ）", "exp": "TEACCHは「自閉症および関連のコミュニケーション障害のある子どもに対する治療と教育」の略で、ティーチと読む。"}, {"q": "親子で来所したクライエントに、親と子とで別々の面接者をつけて、個別に進められるような面接を何と呼ぶか。", "a": "並行面接", "exp": "面接自体は個別でも、面接者間でのチームワークは重要である。児童分析における母子並行面接は、アンナ・フロイトとクラインとの間での論争のテーマとなった。"}, {"q": "人類学者ベイトソン（Bateson, G.）が統合失調症と関連づけた、ある否定的なコミュニケーションと、それと矛盾するメタ・コミュニケーションとが重ねられて逃れられない状態を何と呼ぶか。", "a": "ダブルバインド（二重拘束）", "exp": "一方にこたえるともう一方に反し、矛盾を強いられることが統合失調症を生じると解釈されたが、今日では疑問視されている。一方、ミルトン・エリクソン（Erickson, M. H.）は、このような矛盾を用いた治療的ダブルバインドの技法を考案している。"}, {"q": "ボーエン（Bowen, M.）が導入した、多世代派家族療法において、自己の感情に巻き込まれた行動をとらず、知性と感情を区別して自律している程度をあらわす概念を何と呼ぶか。", "a": "自己分化", "exp": "自己分化が十分でないと、自身の感情に巻き込まれた行動が起こりやすく、これが他の家族成員を巻き込んで、問題が世代間で伝播すると考えられている。"}, {"q": "システム論に基づく家族療法で好まれる、一般の心理療法でいうクライエントに当たる家族成員をさす表現は何か。", "a": "IP（患者とみなされた人）", "exp": "Identified Patientの略で、家族システム全体の病理が現れる位置にある成員であると考える。"}, {"q": "交流分析における自我状態を下図のように表現した場合、右下の空欄Aに入るアルファベット2文字の用語は何か。\n[図：上から CP / NP → 大人の領域 → FC / ( A ) ]", "a": "AC（順応した子ども）", "exp": "交流分析は、バーン（Berne, E.）が精神分析の影響を受けて創始した心理療法である。構造分析では大きく3種、分けて5種の自我状態を想定し、ACは自分を周囲に合わせることを優先する、自制ができて適応性が高いが消極的な傾向を表す。"}, {"q": "独学で身につけ発展させた、自身の名をつけて呼ばれることも多い催眠技法を展開し、ブリーフセラピーの成立に大きな影響を与えた米国の心理学者は誰か。", "a": "ミルトン・エリクソン（Erickson, M. H.）", "exp": "ミルトン・エリクソンは、身体障害を抱えながらも、独特の観察力や言語感覚でコミュニケーションを扱った。エリクソン催眠で知られる。漸成的発達論を唱えた精神科医エリク・エリクソン（Erikson, E. H.）とは別人である。"}, {"q": "コミュニティ心理学の出発点とされる「地域精神衛生に携わる心理学者の教育に関する会議」は、開催地名からどのような通称で呼ばれるか。", "a": "ボストン会議", "exp": "1965年に米国マサチューセッツ州ボストンで開催され、ここでコミュニティ心理学という用語が公式に定義され用いられたとされる。"}, {"q": "近年わが国でも導入が進みつつある、社会福祉学に基づく援助を学校において行う、SSWと略される専門職は何か。", "a": "スクールソーシャルワーカー", "exp": "スクールカウンセラー（SC）が基盤とする学校心理学も福祉的な要素を含むが、スクールソーシャルワーカー（SSW）は社会福祉の専門職である。"}, {"q": "統合失調症が寛解して地域復帰した人の、再発を抑えるための援助は、一次予防、二次予防、三次予防のうちのどれに当たるか。", "a": "三次予防", "exp": "コミュニティ心理学は、予防を重視する立場を早くからとってきた。一次予防は問題発生をあらかじめ防ぐという狭義の予防で、二次予防は早期発見・早期対処。三次予防は再発防止である。"}, {"q": "コンサルテーションにおいて、コンサルタントからの助言に基づいてクライエントへの援助を直接的に行う、下図のAの立ち位置を何と呼ぶか。\n[ コンサルタント ─助言→ A ─直接援助→ クライエント ]", "a": "コンサルティ", "exp": "コンサルテーションを行う側の、クライエントには間接的な援助を行う立ち位置がコンサルタントで、直接的な援助のためにコンサルテーションを受ける側がコンサルティである。"}, {"q": "コミュニティ心理学がめざす方向性を、人と（　）との適合と表現する場合、空欄に入る語句は何か。", "a": "環境", "exp": "コミュニティ心理学は、当事者の内面の修正や成長を目標とする伝統的な臨床心理学とは異なり、環境に働きかけることも同様に重視することになる。"}, {"q": "家族の死など、重要な対象を失った場合に起こる、悲嘆反応の後に何段階かを経て受容へと向かう、一連の心理的過程を何と呼ぶか。", "a": "喪の作業（悲嘆の仕事、グリーフワーク）", "exp": "フロイトが提唱した概念で、精神分析では内的な対象喪失の過程について論考が進められた。また、自己の死期や中途障害の受容、災害時の心理的ケアなどにも関連が深い。"}, {"q": "集団療法の起源とされることの多い、米国の医師プラット（Pratt, J. H.）による患者学級は、どのような疾患の患者を対象としたものであったか。", "a": "結核", "exp": "抗生物質が発見されるまで、結核は先進国でも多くの入院患者を生じる病気であった。患者学級で治るわけではないが、心理的な支援としての意味を持った。"}, {"q": "ソシオメトリック・テストを考案したのは誰か。", "a": "モレノ（Moreno, J. L.）", "exp": "モレノは、心理劇（サイコドラマ）の創始者でもある。集団力学をとらえる枠組みとしてのソシオメトリーに基づき、行われる手法がソシオメトリック・テストで、その結果を表に整えるとソシオマトリクス、図示するとソシオグラムとなる。"}, {"q": "ベーシック・エンカウンターの創始者は誰か。", "a": "ロジャーズ", "exp": "ロジャーズは、クライエント中心療法の創始者でもあり、カウンセリングから集団技法へと関心を移していった。"}, {"q": "構成的グループ・エンカウンター（SGE）において、エクササイズの後に、エクササイズで感じたことや考えたことを述べ合う活動を何と呼ぶか。", "a": "シェアリング", "exp": "思いを共有（シェア）することからこう呼ぶ。SGEは、ベーシック・エンカウンターに比べて自由度が低い分、決まった時間で計画的に行え、学級場面で人気がある。"}, {"q": "米国で始まったアルコール依存症者の自助グループで、匿名参加者どうしがそれぞれの体験を語るものは何か。", "a": "アルコホーリクス・アノニマス（AA）", "exp": "アノニマスは匿名という意味である。スピリチュアルなメッセージである12ステップも特徴的な活動である。一方、日本の断酒会は実名参加である。"}, {"q": "音楽療法のうち、音楽を聴くことによるものが受容的音楽療法と呼ばれることに対して、歌唱や演奏によるものは何と呼ばれるか。", "a": "能動的音楽療法", "exp": "受容的音楽療法は、受動的音楽療法とも表記される。能動的音楽療法は、集団療法として、福祉施設や入院病棟などで実施されている。"}, {"q": "治療の効果の存在や程度を示す科学的根拠に基づいて治療方針を定める考え方を、アルファベット3文字で何と表現するか。", "a": "EBM", "exp": "エビデンス・ベースド・メディスンの略で、エビデンスは客観的、科学的に十分な方法で検証された効果の証拠をさす。"}, {"q": "エビデンスの水準を示した、システマティック・レビュー、コホート研究、ランダム化比較試験。上から入る順に並べるとどうなるか。\n[ 🥇 ( A ) ➔ 🥈 ( B ) ─➔ 🥉 ( C ) ➔ ケースコントロール研究 ➔ ケースシリーズ/事例報告 ➔ 専門家の意見 ]", "a": "A：システマティック・レビュー\nB：ランダム化比較試験（RCT）\nC：コホート研究", "exp": "コホート研究は、ある集団の中で介入を受けた場合と受けなかった場合とを追って比較するもので、介入の有無を研究者側から操作できないことが難点である。ランダム化比較試験（RCT）は、ある介入を行う群と行わない群とに対象者を無作為に分けて比較する研究手法である。その研究知見を収集して統合するのが、システマティック・レビューである。"}, {"q": "ある疾患やその症状について示唆を得るために、健常者ないしは一般の人々の個人差として現れている、その疾患や症状と同様の特徴を持つ特性や状態を扱う研究手法を何呼ぶか。", "a": "アナログ研究（非臨床アナログ研究）", "exp": "アナログとは、類似物、連続性のあるものという意味である。臨床群から十分なサイズの均質なデータを集めることは労力を要するが、そうでない対象者からであればはるかに研究がしやすくなる。"}, {"q": "投影法検査において行われるのある、被検者に関する情報のない状態で検査結果のみを解釈することを何と呼ぶか。", "a": "目隠し分析", "exp": "投影法検査の解釈には熟練を要するため、その訓練や、卓越した技能の披露として、目隠し分析（ブラインド分析）が行われる。臨床現場では、臨床家の期待や予測が解釈に影響することを防ぐ効果がある一方で、危険だと見て嫌う人も多い。"}, {"q": "カウンセリングの技法を具体的な要素に細分して階層化し、効果的な修得や理解に活用できるように、アイヴィ（Ivey, A. E.）によって体系化されたものは何か。", "a": "マイクロカウンセリング", "exp": "これはカウンセリングの一種ではなく、カウンセリングの総体をマイクロ技法へと分けることで、順次修得していきやすくしたものである。"}, {"q": "カウンセラーやセラピストがクライエントとの間に形成する、心の通い合う信頼関係を何と呼ぶか。", "a": "ラポール（ラポート）", "exp": "どんな臨床心理学的援助の効果にも寄与する、重要な共通要因である。"}, {"q": "内観法（内観療法）の開発者は誰か。", "a": "吉本伊信", "exp": "内観法（内観療法）には、集中内観と日常内観という2つの形態がある。「していただいたこと」「して返したこと」「迷惑をかけたこと」の3項目について個人で内省を行う。"}, {"q": "森田療法の創始者は誰か。", "a": "森田正馬", "exp": "森田療法では、ヒポコンドリー性基調（神経質性格）を持つ者が、注意を自身の身体的精神的変化に向けるようになり、感覚がより鋭敏になることによって、注意がさらに固着し（精神交互作用）、森田神経質と呼ばれる状態が生じると考える。"}, {"q": "以下は森田療法の入院治療を4期に分けて示したものである。空欄に当てはまる時期は何と呼ばれるか。\n[ 第1期：( 　 ) ➔ 第2期：軽作業期 ➔ 第3期：重作業期 ➔ 第4期：生活訓練期 ]", "a": "絶対臥床期", "exp": "入院後最初の1週間は絶対臥床期であり、一切の活動が禁じられる。不安への直面など自己内省を促す目的がある。以後は軽作業期、重作業期、生活訓練期を経ることによって、不安に囚われていた気分本位の状態から、目的・行動本位の状態へと変換を図ることがねらいとなる。"}, {"q": "成瀬悟策が開発した、身体に着目した独自の心理療法は何か。", "a": "臨床動作法（動作法）", "exp": "臨床動作法は、児童の脳性麻痺による肢体不自由の改善をめざした動作訓練を発端として、成瀬悟策によって作り上げられた。動作の体験を通して、クライエントの生活体験をより望ましい方向へ変化させることを意図した心理療法である。"}]};
let currentQuestions = [];
let currentIndex = 0;
let currentScore = 0;
let activeChapter = "";
const fallbackDummies = ["精神分析", "行動療法", "認知心理学", "ゲシュタルト心理学", "古典的条件づけ", "オペラント条件づけ", "アイデンティティ", "自己中心性", "基本的帰属の誤り", "ハロー効果", "防衛機制", "投影法"];

window.onload = () => {
    const chapterContainer = document.getElementById('chapter-buttons');
    const chapterNames = Object.keys(database).sort();
    chapterNames.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'btn category-btn';
        btn.innerText = `📖 ${name} (全${database[name].length}問)`;
        btn.onclick = () => startQuiz(name);
        chapterContainer.appendChild(btn);
    });
};

function startQuiz(chapterName) {
    activeChapter = chapterName;
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    
    const allQuestions = database[chapterName];
    let shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
    currentQuestions = shuffled.slice(0, 20);
    
    currentIndex = 0;
    currentScore = 0;
    showQuestion();
}

function showQuestion() {
    const qInfo = currentQuestions[currentIndex];
    const allQuestionsInChapter = database[activeChapter];
    
    document.getElementById('q-num').innerText = currentIndex + 1;
    document.getElementById('q-total').innerText = currentQuestions.length;
    document.getElementById('question').innerText = qInfo.q;
    document.getElementById('feedback-area').style.display = "none";
    
    const choicesDiv = document.getElementById('choices');
    choicesDiv.innerHTML = "";
    
    let dummySet = new Set();
    let attempts = 0;
    while(dummySet.size < 3 && attempts < 200) {
        let randomRow = allQuestionsInChapter[Math.floor(Math.random() * allQuestionsInChapter.length)];
        let randomAns = randomRow.a;
        if(randomAns && randomAns !== qInfo.a) dummySet.add(randomAns);
        attempts++;
    }
    
    let dummyArray = Array.from(dummySet);
    while(dummyArray.length < 3) {
        let fallback = fallbackDummies[Math.floor(Math.random() * fallbackDummies.length)];
        if(fallback !== qInfo.a && !dummyArray.includes(fallback)) dummyArray.push(fallback);
    }
    
    const allChoices = [qInfo.a, ...dummyArray].sort(() => Math.random() - 0.5);
    allChoices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'btn choice-btn';
        btn.innerText = choice;
        btn.onclick = () => checkAnswer(btn, choice, qInfo.a, qInfo.exp);
        choicesDiv.appendChild(btn);
    });
}

function checkAnswer(btn, selected, correct, exp) {
    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach(b => b.disabled = true);
    
    const resDiv = document.getElementById('feedback-result');
    const expDiv = document.getElementById('explanation');
    
    if (selected === correct) {
        btn.classList.add('correct');
        resDiv.innerText = "⭕ 大正解！";
        resDiv.style.color = "#2ecc71";
        currentScore++;
    } else {
        btn.classList.add('wrong');
        resDiv.innerText = "❌ 惜しい！";
        resDiv.style.color = "#e74c3c";
        btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
    }
    
    expDiv.innerHTML = `<strong>正解：${correct}</strong><br><br>${exp}`;
    document.getElementById('feedback-area').style.display = "block";
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    
    const total = currentQuestions.length;
    document.getElementById('score').innerText = currentScore;
    document.getElementById('total-score').innerText = total;
    
    let comment = "";
    const rate = currentScore / total;
    if (rate === 1) comment = "完璧！この章は本番もバッチリですね！🏆";
    else if (rate >= 0.8) comment = "素晴らしい！合格ラインを余裕で超えています！✨";
    else if (rate >= 0.6) comment = "合格圏内です！解説をよく読み直してみましょう。";
    else comment = "もう一度チャレンジして、基礎を固めましょう！📖";
    
    document.getElementById('comment').innerText = comment;
}

function backToMenu() {
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('menu-screen').classList.remove('hidden');
}
</script>
</body>
</html>
